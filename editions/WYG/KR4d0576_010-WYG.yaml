body:
  text: 清閟閣全集巻十元倪瓚撰雜著拙逸齋詩稾序詩必有謂而不徒作吟咏得乎性情之正斯為善矣然忌矜持不勉而自中不為沿襲剽盜之言尤惡夫辭艱深而意淺近也三百五篇之詩刪定出乎聖人之手後人雖不聞金石絲竹詠歌之音煥乎六義四始之有成說後人得以因辭以求志至其風雅之變發乎情亦未嘗不止乎禮義也詩亡既久變而為騷為五言為七言雜體去古益以逺矣其於六義之㫖固在也屈子之於騷觀其過於忠君愛國之誠其辭繾綣惻怛有不能自已者豈偶然哉五言若陶靖節韋蘇州之冲淡和平得性情之正杜少陵之因事興懐忠義激烈是皆得三百五篇之遺意者也夫豈流連光景歲鍛月鍊而為縟麗誇大之辭者所可比哉周正道甫生當明時僑寓吳下求友從師不憚千里其學本之以忠信孝友而滋之以詩書六藝其為文若詩如絲麻粟穀之急於世用不為鏤冰刻楮之徒費一巧也兵興三十餘年生民之塗炭士君子之流離困苦有不可勝言者循致至正十五年丁酉高郵張氏乃來據吳人心惶惶日以困悴正道甫自壯至其老遇事而興感因詩以紀事得雜體詩凡若干首不為縟麗之語不費鏤刻之工詞若淺易而寄興深逺雖志浮識淺之士讀之莫不有惻怛羞惡是非之心仁義油然而作也夫子曰詩可以興可以觀可以羣可以怨又曰詩三百一言以蔽之曰思無邪若夫聞之者善足以訓不善足以省今之為詩雖異乎古之詩言茍合義聞者有以感發而興起與古人何間焉歲癸丑十一月廿五日撰秋水軒詩序或謂詩無補於學是殆不然風雅之音雖已久亡而感發怨慕之情比興美刺之義則無時而不在也子朱子謂陶栁冲淡之音得吟咏性情之正足為學之助矣廬山陳君惟允好為歌詩凡得若干首讀之悠然深逺有舒平和暢之氣雖觸事感懐不為迫切憤激之語如風行波生煥然成文蓬然起於太空寂然而遂止自成天籟之音為可尚矣若夫祖述摹擬無病呻吟視陳君不既逺乎茍窮源於風雅取則於六義情感於中義見乎辭誦之者可以興起則陶韋杜韓豈他人哉是猶有望於陳君也甲辰歲七月序謝仲野詩序詩亡而為騷至漢為五言吟咏得性情之正者其惟淵明乎韋栁冲淡蕭散皆得陶之㫖趣下此則王摩詰矣何則富麗窮苦之詞易工幽深閒逺之語難造至若李杜韓蘇固已烜赫焜煌出入今古踰前而絶後校其情性有正始之遺風則間然矣延陵謝君仲野居亂世而有怡愉之色隠居教授以樂其志家無瓶粟歌詩不為愁苦無聊之言染翰吐詞必以陶韋為準則己酉春攜所賦詩百首示余於空谷無足音之地余為諷咏永日飯瓦釡之粥麋曝茅簷之初日怡然不知有甲兵之塵形骸之累也余疑仲野為有道者非歟其得於義熙者多矣荆溪圖序載宜興縣志東坡先生嘗曰一入荆溪便覺意思豁然欲買田其間種橘作小亭名以楚頌卒不遂其志杜樊川作水榭正當荆溪之上其遺址僧結菴以居至今歴歴可考見盖荆溪山水之勝善權離墨銅官諸山岡壠之起伏雲霞之吞吐具區匯於其左苕霅引於其前凡仙佛之所宫高人逸流之所宅殆不可以數記也樵海詩集小引古人有言詩貴眼前句又曰詩忌矜持若夫莫赤匪狐莫黒非烏眼前句乎昔我徃矣楊栁依依今我來思雨雪霏霏豈有矜持者乎至於離騷九辨建安以逮乎陶鮑李杜韓韋未有一言之不由乎實而事乎虛文者也國朝趙虞既歌咏其太平之盛兵興幾四十年鮮有不為悲憂困頓之辭者秦君文仲則不然處窮而能樂顛沛而能正其一言一字皆任真而不乖其守聞之者足以懼而勸非其中所守全而有以樂不能也富貴而驕淫貧賤而餒乏吾見累矣與夫無病而呻吟矯飾而無節又詩人之大病其人亦不足道也秦君不汲汲於富貴不戚戚於貧賤孝友而忠信外柔而中剛非强以自全又烏知其言之㫖哉詩以吟咏性情淵明千載人也當晉宋之間諷詠其詩寧見其困苦無聊耶四月一日倪瓚小引陳惟寅僦屋疏陳惟寅甫與弟惟允閒居養親棲隠吳市不恥貧賤不樂仕進熙怡恬淡與物無忤雖過朱門如遊蓬户也世本蜀人其大父居五老峰下父天倪先生因遊吳愛錫麓洞有好流水家於惠山之陽久之有少日同舎生趙從事招徃館於其家遂復留吳市焉兵後棲無定居江右同邑人饒介之為之僦屋使得以安菽水之奉而僦屋之資則非一人所辦饒君素清苦又不欲以外事累人也僕遂為之一言世豈無急人之急憂人之憂解衣推食指廩借宅豪傑倜儻如古之人者哉老杜所謂安得廣厦千萬間大庇天下寒士俱歡顔者請為諸君誦之至正壬寅十二月九日倪瓚言題良常草堂疏余捐捨趙榮禄正書一巻昔王録事寄少陵之資近代趙文敏干岳氏之助皆有實效不事虛文今德常欲構草堂所求者柯張杜三君或宿諾而寒盟或解嘲以調笑遄求其實則罔所知數年之間三君已矣草堂適成載覽標題重増嗟悼捐予珍秘永鎮新居懶遊窩記昔司馬子長遊涉萬里壯麗奇偉之觀前賢徃聖之迹有以泄其懐古感今憤懣鬱律之氣史記之書既成藏之名山以俟後聖君子也宗少文壯歲好遊晚以所歴名山盡畫屋壁曰老疾俱至名山恐難徧覩惟澄懐觀道卧以遊之子長雄奇之文少文神妙之畫善而猶有待又烏覩神馬車輪與造物遊鴻濛之外者哉若夫登化人之居遊華胥之國是皆神遇豈復有待乎金君安素高卧林居慕楊許得尸解上道乃怡神葆和内視密盼煥標霞之孤暎朗性月之獨照因名其齋曰懶遊焉噫尸居而龍見不出户知天下善行無轍迹盖神遊無方非拘拘局於區域逐逐困於車塵馬足之間安素仙仙乎道矣王方平嘗與麻姑言比不來人間五百年蓬萊作清淺流海中行復揚塵耳熟邯鄲之黄粱歸華表之白鶴人間紛紛如絮時一飛神遊盼吾固知安素不與悠悠世人同一悲慨也忠靖王廟迎享送神辭併序至順元年春吳楚薦饑天災流行連數郡道殣相望沴氣薰襲為瘥為札錫之民咸被漸染大小惴惴無所請命邦之􅂄老相與言吾邦西山之陽有嶽祠祠有明神焉曰忠靖王胙爵東平生能奮忠死有遺烈赫聲濯靈福我錫民自有年矣在昔宋季大疫用禱於神變沴為祥德載歌咏民病亟矣宜從故事乃合羣謀籲衆慼率從祠下鐃鼓鏜鈜旗纛晻靄導駢駕以臨城闉香雲漲空耄稚奔走衆心推誠祈祀惟謹惟神顧歆來格來享若沐神水若濯泠風敺攘妖氛民疾用瘳丕燀神化無逺弗暨隣邑之民祈者踵接環句吳四封所活幾萬人焉是神有大造於吾民也禮神能禦大菑捍大患者則祀之矧威烈若此是宜尸祝而社稷之舊祠􅛚於火未幾民更興復其制瓚常以母病至禱立愈因作迎享送神辭二章刻諸山阿俾錫民歌以祀之辭曰靈皇皇兮岱宗神之來兮駕蜚龍赫蒼顔兮朱髮如火紛羽衞兮岳祗嶫峨青霓旍兮白容裳降大荒兮祓不祥敺野仲兮逐游光惠我民兮神樂康羅帳兮雲幄湛寒泉兮瑟蘭勺撫偃蹇兮龡參差薦芳馨兮神享之靈娛娛兮奈何樹紫檀兮山之阿匪斯今兮福斯土沐神休兮千萬古神之去兮驂雲螭風剡剡兮吹靈旗怳臨風兮延佇悵神游兮難駐神游兮翩翩撫一氣兮周八埏朝騰駕兮西山夕弭節兮東魯噫神徃兮莫我顧民有籲兮載福斯祜折瓊花兮遲神歸歲復歲兮神寧我違石戔戔兮流水壽我民兮報祀無已尺牘答張藻仲書瓚比承命俾畫陳子桱剡源圖敢不承命惟謹自在城中汨汨畧無少情思今日出城外閒静處始得讀剡源事跡圖寫景物曲折能盡狀其妙趣盖我則不能之若草草㸃染遺其驪黄牝牡之形色則又非所以為圖之意僕之所謂畫者不過逸筆草草不求形似聊以自娛耳近迂遊偶來城邑索畫者必欲依彼所指授又欲應時而得鄙辱怒罵無所不有寃矣乎詎可責寺人以髯也是亦僕自有以取之耶與耕雲書中秋日與耕雲於東軒静坐羣山相繆空翠入户庭桂盛發清風遞香衡門晝閉徑無來跡塵喧之念浄盡如在世外人間紛紛如帑曠然不與耳目接戲寫近詩呈耕雲以當笑談耳倪瓚頓首與周正道七月三日偶入城郭獲承教益又辱館遇之者兼旬賢父子親愛而骨肉之可謂備至僕將何以報稱哉令嗣遜學已啓行未耶恐尚未行幸為道謝奉别忽四日想惟𤣥黙成帷坐進此道世慮消盡如浮雲之浄掃也僕隨世浮沈業縁未了如君之有佳子可謂萬事足他何憂哉但囑其早還勿為所留切祝與介石四月偶過吳淞率易上謁不能如禮次日即還笠澤又不得詣謝以别惶恐何限比來不審何似伏惟吉德所臨風俗為厚望進此道寵辱俱忘履候多福僕罪釁所積而我室人亦成長徃哀摧哽塞大不可言日月不居奄踰兩月依依故物觸事損心奈何奈何以世縁言之悲歎何能有已若以法眼觀之則我此身誠亦無有此宗少文所以三復至教方能遣哀耳襄事粗畢大山長林之思此心已羣於鹿豕間矣兹因令嗣德機徵君省侍輒附狀以承動静恐欲知僕近况遂併及之末由趨侍臨楮無任瞻依歲事峥嶸所冀為道自重不備又瓚以七月末得㿃疾卧病兼旬幽憂無聊因賦詩以自解云耳辱執事及德常縣宰書教俾寫學門石記記文特古淡可愛鄭翁傑思也繆書不由講學㸃畫不能遒媚結體還更俗惡又頗工於小不工於大縣宰欲流傳於久逺宜屬之工於書人品異俗者乃於文稱耳繆書那能副高意耶瓚非飾辭切告相體幸甚又奉别後從蘭陵東郭門外人家少憇三日待荆溪發行李來即歸田舎到家稍稍休歇而州縣科差迫促騷然因歎那能復以憒憒從彼之榛榛乎便命扁舟入吳寓邨落中調氣静坐得以少抒其中磊磊者一日從一二林下人登靈巖山覽觀天池石壁之勝尋姑胥臺古迹若司馬子長蘇長公悲世憤俗有不勝其哀後百世而不及見古人則求古迹觀以自解惜不肖非其人回望太湖之西諸山依約指㸃數螺若芥舟泛泛杯水中者當是銅官山因並吾寄止公政著白雲滅没處杜門著書降屈其心志不能以道表見於當世真為之泣下沾襟也閏月末暫還繫舟江渚傍稍治夏衣將復至吳而過荆溪附此上問陰雨浸淫不審何似伏惟樂道閒居履候多福瓚招愆内尤豈非以自内致之耶復何敢怨天尤人常自疚耳其每動心於明公者則非一悲感而已窮居蕭然並無一物為寄偶尋得書室中聖濟總録若干册聞見善録一册可助常行檢閱唐𤣥宗𨽻書孝經石刻四拓本墨紙頗佳又青白舊磁碗各一隻用奉左右聊寓不忘之意不直一笑耳末由參侍臨書惘惘千萬慎交自愛不備又瓚啟經宿不面旦來想體力佳也此時早餉已久能同德機先生緩步過蝸牛廬中一啜日注茶觀陸探微寫宗茂深像否德機處不别書也又今日聞有失女之悲幸勿過咽一二日當一杯解悶也真人碑未曽冩否明日送紙却乃可下筆耳明日試步一出尤佳堇兹啟不具瓚再拜又瓚再拜新春伏惟履候多福欲徃展賀村野居人不出耳昨有數字與令嗣想曾過目畫匣倘要用當送去無用則已先公竹杖脚爐小巾倘有之希尋以見惠無則不煩也元度入城何日還為致意謹承候匆匆不具又瓚偶入城郭其所以承惠益擾厨傅兼之以寓館頮櫛可謂溷擾不一而足自非故舊之誼何以得此於左右哉兩日不面伏想台候多福坡書天際鳥飛雲含雨重巻子能攜一觀僧房迂談半日政自不惡但不知執事厭此迂濶清事否不可則已謹咨啟不具又瓚經宿不面旦來想惟履候勝常心逺鍊師有一二種物留允同處幸折中倒地將欲他之矣齋閣中有沈香求一兩許不必入藥用者如允同前大片之類劈取少許亦不妨不可則已不可求也小子物在闕者隨以與人不較隨以所需不怠錢價大小及不在手則無可奈何非若他人靳惜其微而不較其大也呵呵又昨日承過我又得約齋翁共坐遂有終晷之清談足下固甚佳猶未的然於所取舎耳夜來二巻思之尚有一二字未是幸攜至改定并幽林思同示借閱幽林思乃以重刻瘞鶴銘唐塞豈有是哉僕血氣雖衰未嘗貪得若而翁索人物也瓚再拜又瓚再拜前日打破慳囊令人不安雖然亦子所願固不深以為憂矣真人碑昨日改定數語且未可即寫尚有少議頃面以既不宣又瓚啟去秋獲一聚首深慰悶懐不意復還里第而羣冦未息官府事繁山林饑寒徃而不返者似未為都無所見也近知移家暫住余宅與僕南渚相去甚邇良用慰愜九月廿六日欲與潘翁共載詣謁恐舎館未定故不敢前長至前後當專造也兹先走一力上問乍冷伏惟履候多福令伯環慶丈人令叔子明司丞天明先生賢父子想皆安勝亦不知尚留何許力還希回示數字以慰悁切謹上承動静不宣瓚頓首拜線雞一隻鱖魚二尾謾上又瓚再拜忽然卧病江渚將復兼旬藉庇雖已獲安氣猶未復耳因偶出行李中乏香燒用高齋雜香零碎者求少許燒置卧内以浄穢氣由是親求倘無則已不須芥蔕也令婿歸告為鄭重意謹咨啟不具又連日憒憒獨坐無聊三月一日忽然開霽風景固佳而悽悽有念舊思賢之感因成此詩咏歎無已泣涕沾襟而吾德機徵君雖近在百里不得與之周旋即寫此詩以寄當亦為我惻然也彞齋高士賢父子彦衡賢良守謙廣文雅集次各為道瞻企也彦衡齋閣中有好香為須少許彞齋雖有之而靳惜如金僕數日中入城亦欲一徃謝而未敢必彦衡君酒量無敵是所畏也比來想佳當不為酒困耳匆匆不具伯昂橘忩想日有晏談之樂冀道問訊又瓚適徃候謁值從者不在而還近乏墨用寓所必賸有宜興墨分惠一挺不可則已去年徃寓所欲爇小餅吳潔香作供想已忘之一笑又承桐露兄見還銅佛像深感至意旦夕致一佳物少答厚情也此盖師像非班卜物像也未寄至時深怪銅佛像在新宅西照堂房内那縁得在水中已而果非也辱彞齋先生寄馬脯乾魚尤佩盛心瀼西草堂專待隨寓先生來何遂杳然耶又三月十二日早行不獲候别賢翁婿乗興徃謁朋成兄十三日過江渚而錢石君待僕之歸二日矣脫廑專信教墨與羊腔酒榼俱至物豐意厚拜賜之辱因得與錢石君厭飫信還輒成五言律一首以道謝私并致謝彦衡親契也舊陸筆三枝頗可用謹附上比欲焚吳潔小餅作供想忘之矣二月盡舟檝必能踐約一來吳渚也與彞齋學士先生瓚近辱見過寓所窮居荒落不能具雞黍之奉愧悚何限别來匆匆兼旬瞻咏殊劇仲夏未暄不審復何似伏計履候多福瓚獲交於高門幾二十年矣深愧迂繆麄疎與世俯仰但受知於賢父子則深耳英嗣得婚於陸氏非止齋則不可成止齋之推精察詳雖瓠齋徃來數數非止齋猶不能决然為準瓚於斯時適寓溪上目見其周折而瓚又深知高門禮義之素且承賢父子見囑令具書於止齋瓚敢靳於言乎人事好乖固定議於止齋之手乃成婚於其捐舘之後今兹英嗣夫婦父母之間並怡然無間言寧非止齋之德是亦天之所造就古人所謂有德於我背之不祥豈虚言哉閣下使英嗣得所託但不忘止齋足矣於不肖何與焉兹乃辱盛德惠羊腔珍果精縑酒器瓚何謂而當此也古人取與辭受之間不可狥俗而違禮也茍辭受不當於義是亦不能固窮所謂小人窮斯濫矣瓚非主婚之親長又非媒妁之女𨽻乃妄加盛禮於不肖甚無謂也非獨不肖取譏於識者於閣下盛譽亦有損焉耳塵坌汨汨遂稽留盛使多日不能即令璧以歸悚恐而已兹謹以還納於下執事幸留置之倘不以不肖之言為誠而再遣斷不敢拜賜之辱徒勞徃返耳瓚非壟斷者也切冀體悉倘能借我蓮葉硯試用數日足矣亦非敢為乾没為鼠竊之事只欲與小齋一二硯比試高下耳能信此言即付去來人幸甚令婿彦衡文學以中賢良雅集次并為道傾契之思亦以鄙意諮之二公當蒙首肯也以中兄要乃翁畫像并要不肖詩畫此月望前後寄上數日來意思憒憒大不佳畫像亦留南渚未曽取出耳臨書増情所冀加愛以慰懐思不備又瓚漫浪之迹胥於江湖之上雖時時徃還錢唐苕霅出入城府遨遊縉紳聞知動静之詳意不得奉一字為歉耳極熱不審何似想惟履候多福賢郎姻事將有成期可賀可賀此姻事執事但知潘瓠齋利口辯才之力殊不知賤者一書之功此時非賤者之書徐止齋小婆媽皆斷斷不肯執事可密為打聽不必問之瓠齋便可知其的實姻事將成之際雖以岳氏蓮葉硯松雪𤣥武水滴相酬亦不足以為凂也如何因便附此上問且以發執事一笑此亦飲水知源之義也便中希還數日不備良常草堂先生㑹次告致意趙正書未曽勾疏早晚入吳來面取之也瓚拜又瓚啟隔日不面陰雨憒憒懸情比復何如創已差耶晚刻致彼晤集可否謹馳力問不一瓚再拜鵝一隻夏果尊酒聊為遷喬之慶輕凟悚愧何限冀留幸幸又瓚再拜昨日承橘蘖二君及庾兄枉顧深見高誼不薄感刻感刻兹因子真送藥輒附數字上謝九經十七史果肯與人乞於十七史内付四五册九經全付至示價價不可太多徒勞力耳否則已之舘舎温筆乞取一枝絶佳者封至幸甚又瓚比承下顧欣慰欣慰繆藁寫出否如寫畢乞付尊染來桃竹枝曽對賢長公說否草略匆匆不具又瓚拜比以聞苦瀉泄想已平復謹此馳問欲徃見足腫未全差耳雅山巻繆為二小詩煩染翰一書并小引遂割去塗竄者拈合并求佳製一首長短隨意近賦得二三詩粗有興味倘體中已無恙明日來共觀之也雨濕殊憒憒不具又瓚頓首比辱枉顧喜慰無已云諭五日内之約必能踐魏公之期獵也兩日不面想尊候多福林提舉已來未耶伯氏體中當遂平復也老温遣其子以新製筆來特神妙於常者不敢獨擅妙用分之前如希言允同公謹不在宅先生各留三二貼償其所值以遣之幸甚亦不自負其所舉也若使之空返則僕深有愧於彼矣惟加意焉謹咨啓不具又瓚再拜昨日乃知舟檝入城移在沈氏猶可賀也比聞城中賣書王老者有碧牋上打弁陽道人自銘石刻得為應錢買至幸幸物到即還元直或五或十更好向開亦不較耳更乞問王老此刻誰與書者塼就帶來一觀切說相見不逺所冀加愛不宣又瓚啟九日欲屈從者奉萸酒一巵知為他人所先遂不果也十日辱手帖餉以吳淞四腮鱸益重慚感强顔登受當面謝以盡昨晚同從善奉謁而從者尚未還寓也不具又瓚比獲邂逅一見賢叔姪真若隔世也為之惻然者久之數日後來瀼西草堂何意杳然不聞拏舟音耶聞桐露君獲於水火中洮石班卜佛像二件中能以其一全歸乃見古義非流俗比也然亦以元價奉還不知賢主以此言為然否謹干凟不具又瓚再拜夜來獲聚言笑之樂經宿不面想履候平善也漢鑑書中有一紙草稿恐在葉内蓬上雨潺潺及白推訪寄幸一檢付無則已并書院中几上有貞居寫􅆥則宫雪獅兒二詞後有賤子寫滿江紅未了如在彼乞付至檢本寫足付去不在則已又瓚啓不審復何似想惟體中清勝行元博士近有信來家否聞中少不佳比當平復也不得徃問懸情聞執事新收得庾子山詩集在州郭時欲借以示僕不時也兹專一力致左右千萬暫借一觀執事近與僕情同骨肉得不托故而不惜也僕亦不敢乾没盖窮措大細事多慮太過太逺故云耳如何如何村居枇杷數樹盡熟爛然如金彈乃陳正之因補趙子昂詩云貧家自笑無金彈數樹枇杷儉不生之句乃賦一詩云疎疎梅雨橘花香寂寂桐陰硯席涼怪底枝間金彈子枇杷都熟不知嘗併寫上一笑與陳叔方瓚頓首再拜慎獨有道先生執事瓚久不上問惟是懐仰之私無日不勤秋氣凉冷不審何似伏惟隠居求志教授鄉里有下帷談道之樂神相德人百福萃止欽歎何限瓚七月末忽感㿃下疾兼旬乃瘳近猶惙惙耳恃以道義之契輟有凂凟養正一子八歲矣使知所趨向以為禮義之歸不可不慎其始也養正賢母子熟聞其先公誦歎德美之盛願闢私塾以俟杖履之臨寓所謂河潤九里者非但小子蒙福也未敢冒昧以請俾賤者敬致一言於左右能俯從其私情幸甚詳曲當别奉書以聞亦只就此月到舘中為便也僭越上溷高明惟有悚恐仰冀恕亮不備海岳圖旦晚臨摹畢即全璧以歸也酒二大尊謾上九月二日瓚又空又瓚再拜奉書慎獨有道先生執事霜寒伏想尊履清謐養正冒昧選取八月十八日闢私塾招延先生講授其中謹預於十三日敬致少幣禮於執事者至乞領意幸甚不及作啟陳情惟委恕焉不備清閟閣全集巻十
