body:
  text: 清閟閣全集巻四元倪瓚撰七言古詩送徐君玉閩江之水清漣漪隔江名園多荔枝閩中女兒天下白越波飛槳逐鳬鷖棹歌清綿洲渚闊蕩槳落日令人悲蠻煙怪雨忽𠖇密蔣芽蒲葉相參差此中勝事不為少徐郎逺遊牽我思寄張徐二秀才東膠山麓繚修阻春水鳴渠竹滿園𤣥真棲遁樂耕釣徐穉風流存子孫適我騎犢詣其處荷爾作黍留清言夜闌把燭竟歸卧煙草蝶飛勞夢魂十二月七日岳季堅夜坐走筆贈之僧扉共卧風雨夕岳生清真何太顛持家有弟足自慰無錢沽酒殊可憐梅蕊衝寒欲破白一作愁欲破燈花惱人故生姸孰知旅枕作孤夢周處廟前行買船古意一首荅曹徳昭齊王好竽客鼓瑟操瑟何以干齊門古人結交多豪傑況爾封君之子孫王國陳詩終大雅楚俗尚鬼悲招魂相思日暮不可見鴻飛㝠㝠目力昬劉君元暉八月十四日邀余玩月快雪齋中對月理詠因賦長句二首捲簾見月形神清疑是山隂夜雪明長歌欲覔剡溪戴悵然停杯逺恨生爾營茅齋名快雪邀我吹笙弄明月明星如銀浮翳消埀露成帷桂花發酒波蕩漾天河傾笙聲嫋嫋秋風咽古人與我不並世鶴思鷗情迥愁絶涼月紛紛疑積雪凝暉散彩白於銀此時獨酌開軒坐便欲剡溪尋隱淪爾營茅齋名快雪我醉行吟踏秋月河漢無聲風露寒心境冷然同一潔餘不溪詠并序開𤣥館在餘不溪濱距溪無百步上清王真人所居溪流冬夏盈演玉光澄映與他水特異故為名焉庚午嵗春因市藥過浙江趣便道將歸梅里俯斯水而恱之泝流閒咏盥濯平津顧瞻壇宇近在東麓遂舍舟造其下真人為出酒脯燕嘯巖洞竟日乃返悠悠徂嵗忽已十有七寒暑矣余既為農􅅵畝身依稼穡復爾政繁奔走州里欲為昔遊其可得乎鍊師超然物表閒情􅆥朗周覽宇内將還𤣥館余因彷像疇昔之所覩追賦短章以餞斯别若夫超蹤溷濁逍遥𤣥邁葢深志於是矣覽而咏言能無動悲慨乎餘不溪水綠生薲放舟演漾當青春舟隨鶴影忽行逺洞口桃花飛接人雲松蔽虧煙蘿席儼在溪東之石壁羽人埀衣坐鼓簧饋我晨餐芝菌香從兹更發洞庭渚濯髪咸池臨故鄉餘不溪水涵綠薲微風吹波蹙龍鱗看山蕩槳不知逺花間白鹿來迎一作兩岸桃花飛接人溪迴路轉松風急竹林華房霞氣濕忽逢道士頎而長疑是韓國張子房相期飄拂紫煙裏下攬滄溟浮玉觴醉題許生壁生有破屋山西邨風雨不出卧衡門藂書其間讀且温客來輟書就琴尊寂寞古道安可論醉歌行次韻酬李徵君春日過草堂賦贈一本小異附後昔聞杜陵之茅屋汀花𠖇𠖇汀樹綠舊題新詠荅年華種术行椒繞山麓石牀丹竈青琅玕春渠流水夜潺湲當年寳劍淪黄土空餘山月照波間今我不樂懷往古短世紛紛誰比數花下欣逢李白來山鳥溪童亦歌舞酒酣長嘯五情熱軒冕何榮築巖說邈然抗節餓首陽何異佯狂抱貞潔君歌已竟歌我詩賢愚榮顇百年期少文豈愛壁間畫老疾俱來難命駕仰視翕忽浮雲馳安得乗螭與雲化楊花縈夢滿晴天迸壑春雷驚醉眠李侯神清色不動手敲茶雪落輕煙相逢為樂誠草草竟欲攜君卧煙島城郭秋風白鶴飛海上飡霞不知老杜陵昔年有茅屋浣花溪邊錦江曲古人不見春風來桃李無言自山麓石牀蘚澀青泥乾決渠流水夜潺湲可憐寳劒埋黃土空餘山月照波間今我不樂空懷古短世長年誰比數花下那知李白來山鳥恣歌童亦舞酒酣大笑五情熱作相形求築巖說夷齊相逝居首陽逍遥采薇飽芳潔勿歌虞夏神農詩賢愚等是百年期魯連恥秦亦蹈海笑爾局促商山芝少文壁間對圖畫莫待老來誰命駕仰看翕忽浮雲馳安得乗螭與之化漠漠楊花縈逺天迸壑晴雷驚醉眠李侯神爽色不動手中茶雪落輕煙逢君此樂誠草草便欲攜君卧煙島海上千年白鶴飛世人何為而自老江南春汀洲夜雨生蘆筍日出曈曨簾幕靜驚禽蹴破杏花煙陌上東風吹鬢影逺江遥曙劒光寒轆轤水咽青苔井落紅飛燕觸衣巾沈香火微縈紛塵春風顛春雨急清泪泓泓江水濕落花辭枝悔何及絲桐哀鳴亂朱碧嗟胡為客去鄉邑相如家徒四壁立栁花入水化綠萍江波摇蕩心怔營江南春詞二闋和倪雲林韻周履靖春林夜雨朝迸筍桃李芳菲門徑靜主人寂寂對疎櫺簾外交飛雙燕影峭寒風雨羅衣冷幾樹梨花開近井社酒歸來倒角巾欹斜醉􅇍動輕塵蝶飛忙花信急杜鵑聲裏春衫濕韶光撚指嗟何及倚樓芳草連天碧幾處笙歌滿城邑埀楊繫馬風前立請看緑水汎青萍堪笑隨波空自營邨前萬樹桃花盛緑栁埀絲間紅杏呼朋拉友玩芳春厯遍韶華三月景雕鞍金勒相馳騁青樓栁巷追佳興吳姬嫋娜笑歡迎握手殷勤話更親入蘭房檀麝集銀燈翠管延嘉客冰盤玉饌陳芳席金尊㶑灔浮琥珀玉指纖纖調錦瑟牙牀繡帳娯此夕金雞三唱促登程惆悵相看不盡情賦許君震杏林小隱江上春雨歇喬柯散繁花開尊藉莓苔共醉仙人家霽景麗華彩微波摇絳霞東風夜来急吹雪滿江沙明朝杏熟虎為守郊原緑遍聞鳴蛙贈顧定之輕薄紛紛新少年論詩作賦如湧泉為雲為雨手翻覆背面傾擠當面憐阿翁七十仍踰四與我同心生並世高卧白雲飡絳霞草堂門對靈巖寺贈康素子道徳五千言𤣥之而又𤣥谷神不死曰𤣥牝用之不勤以綿綿太原道士康素子口講此書手畫指猶龍之後有䝉莊迴薄宇宙有根柢蝴蝶栩栩觀物化濠魚洋洋樂何似壺丘弟子御風遊遊仍有待曷足恃凥輪神馬鴻濛外恍惚杳𠖇隨所止化人之居鄰太清十二重樓臨五城千刼謂如一食頃不起於座空飛行王喬鶴上吹玉笙食棗東海安期生雲車霓靷到平地渴飲懸河天為傾大茅登雲二弟迎紫虚永和傳玉經楊曦以授許長史玉斧清映道初成貞白子微如日炯千巖萬壑春𠖇𠖇葛𤣥登鍊匡廬頂淵雷一聲眠鶴醒道陵章奏陽平治子孫繩繩祖武繼重陽晚出金末裔全真爾名欽世世仰瞻在昔老莊列近比肝膽逺秦越要知道不出智勇疾似秋空鷹一撇素乎素乎爾鄰乎道徳而不孤凡夫皆具仙真體一扇仁風病即蘇寄徐元度二月苦雨晝如晦閉户獨眠無所為黃鳥翻飛乍依竹櫻桃爛漫開滿枝起覔杜康欲自慰坐無徐穉令人悲春㠶早晚江西去東湖宅前舟可維陸隱者禱雪獲應紇干山頭黃草枯年年雪花大如掌春風草緑牛羊蕃誰為祈禳復誰賞南雪由來到地消今年冬暖知為妖民間禱雪誠希有旱禱桑林聞昔謡鄭有道隱居梁鴻山伯鸞近在東山陲室無孟光唯兩兒草堂資煩王錄事蓮社緣依逺法師迎我掃除松下雪因君起冩壁間詩便思從子遂真隱深谷紫芝堪療饑賦耕雲贈友大茅峰前萬頃雲煙耕雨溉曉絪緼也知神物無根蒂誰種空山誰與耘愛君茅屋當南面閒看隂晴玩其變白鶴眠松夜夜歸朝逐孤雲如匹練贈季丙卿季子蕭條千古心斷碑荒冢在江隂行人過客寜知此春雨年年江水深君家一作家正近延陵郭世逺義風猶未薄誰識寥寥末裔一作派孫種杏成林惟賣藥延陵道延陵道去國千有餘里民風質直昔季子攸居義興其屬邑過百里而逺麗於南隅民當西晉有周處肆勇鬬狠於鄉閭人皆以為患父老揚言其非一朝發憤易行忠孝俱其殁已千載民今仰而祠我幸生居在鄰邑春服始成來游而來娯式逢劉公揚鑣踟蹰酌山之泉􅀈渚之蒲相率奠拜步趨襜如歎咏而去方舟載塗錫山之陽其水舒舒山氣磅礴而敷腴上升為雲雨彌滿乎九區厥土沃若君子於以田漁公度中流揚揚其旗載挹載注原兹古初睠此平墟泰伯所都夫子所謂至徳也已矣吁嗟遡流百世下聞其風者尚敦乎薄夫送潘生適越鏡湖春水緑沄沄兩岸楊花飛白雲落日繫舟微雨歇一壺濁酒飯香芹嘉爾盛名年少得筆精墨妙比羊欣日長高卧無餘事應有人書白練裙贈陸子華為愛􅍩西春水緑三年不來今乃復如來不三宿桑下子華留我經旬宿東鄰唯有沈休文文字詩篇與討論時時亦復具雞黍未能厭飫嘉盤飱為君吐出無味句歎爾網魚共濡煦不作卑卑兒女情仰天大笑飄然去宿薩判官家聴琴薩公能琴賢且文城闉一遇何懽欣高齋一作堂掃榻新雨霽為鼓瀟湘之水雲竹林蕭瑟風嫋嫋山日掩靄波沄沄曲終推琴意逾妙一作淡高山流水餘音聞一作忍即别去隨飛蚊送錢成大赴淮南桐柏山高淮水闊道途悠悠心忽忽大藩作鎮據兩淮公侯干城孰子越帶雨春潮送櫓聲淮山千里青相迎隱居行義今寥落到邑煩君訪董生李徵君將還揚州因言沈郎官呉中賦此以寄二月桃始華淮南客還家堦前疎雨落堂上春衣薄為言沈約在呉中玉壺青絲酒如空春風相過蕙草緑芳菲滿堂樂未終姚節婦詩節婦復節婦處心良獨苦茍不義以生寧從義而死荆南流水石齒齒冦辱形虧涴清泚妾可死不可辱夫従父生死攜女婦兮婦兮死所安使我感激涕汍瀾古今出處多射利委身事國為貪奸嬴王易主意未殫身没令名生美官嗚呼史臣直筆古來少孤臣直節今尤艱奉寄沈理問紫霞虚皇之上清迢迢十二樓五城煙霧牕扉鳥為使霞綃衣裳翠織成雲旂芝葢一作翠集真侣清露如鉛籠玉宇回看人世方蚍蜉擾擾泥塗困雲雨騏驥縶足鳴何饑黃鵠截翮不得飛杜鵑哀號鷓鴣泣苦竹嶺頭無月輝可憐仙凡一塵隔哀樂紛綸殊不極人間亦有學仙人神巫僛僛舞瑶席精靈翕忽虹影長觴湛桂酒羞楓香雲情蜷局難為駐世味膻腥不足嘗仙人舊亦人間住乗雲往列仙曹署願從帝所話悲辛明良留心乃竒遇我聞天道自循環福善殃淫帝所闗令威亦成歸來願豈遂忘情出兩間贈丁醫士泊舟風雨芙蓉城江上君山雲錦屏我來已是千年後舘主子孫猶姓丁丁君手煉不死藥芙蓉仙人久相約孤鰥七十老無家種杏春來一作林看落花詠鶴丹鳯葳􅅋何處藏翳兹天孫雲錦裳嘎然長鳴引圓吭晨飛峨峨一作岷峨暮良常玉笙寥寥珮琅琅千年仙驥時歸翔步苔飲泉下趨蹌忽然不返嵗月長爾居雞羣獨彷徨羽衣猶白未老蒼清都霄臺應已忘啄腥吞腐塵土鄉乗軒豈復思華陽樊籠未離勿張皇螮蝀嵗已亥春仲月之六日自寅迄酉震雷且雪甲辰暮冬日癸夘螮蝀見於震陬飛龍挾雷電落景皎出月老夫頻年熟灾異夏凄其風冬乃熱晝霧暝如夜淫雨十旬浹疲農不使憇殘喘志士不得安巖穴國之祅沴古亦有十月雷電天或隕石或雨血人君修徳灾可弭桑生於朝赫王業方今滔滔天下墊鋒鏑四起羣豪傑孰能拯亂以為治嗜仁而不虐吁嗟斯民命矣夫荼毒殘傷亦何辜秋鶴軒開軒北郭名秋鶴鶴影翩翩向寥廓不見千年丁令威悲嗟城郭是耶非紛紛霜葉飄庭樹苔色荒隂翳煙霧草逕逶迤深樹中時有山僧自來去賦翠濤硯岳翁嘗寳翠濤石今我還珍翠濤硯翠濤沄沄生縠紋雲章龍文發奇變元章硯山徒自惜此硯顛應未曾見我初避亂失神物玉蟾滴淚空悽戀珠還合浦乃有時洗滌摩挲冰玉姿書舟輕迅逐鳬鷖喜出火宅臨清漪松雲磨香淬毛錐天影江波映碧滋一咏新詩開我眉題王元用秋水軒秋水如玉涵緑蒲玉壺美酒清若無佳人倚牕調錦瑟文君勸飲坐當壚昔年種栁繞漢南樹今摇落人何堪唯有年年秋水至翠煙石黛漾晴嵐開軒清映臨秋水斜日荷花澹相倚凌波微步襪生塵交甫凝情佩還委送顧生歸四明江上買舟歸四明楓林摇落一作竹枝嫋嫋秋風生好營三釡為養親此去千里飛雲情禾稼登場候雁至霧雨如晦晨雞鳴舒王舊日宰邑處苔石縱橫湮姓名贈陶得和製墨麋膠萬杵搗𤣥霜螺製初成龍井莊悟得廷珪張遇法古松煙細色蒼蒼桐花煙出潘衡後依舊升龍栁枝瘦請看陶法妙非常一點濃雲瓊楮透郭文顯推人禍福神驗賦贈昔者馬季主賣卜如有神郭君言禍福奇中乃其倫顧我年衰野而戅尚復紛紛嬰世網為卜明年春水生欲問桃源刺漁榜題陳氏齋壁愛爾茅齋寡塵鞅一作雜時來下帷清晝眠風流任一作政使書裙去嬾慢惟知坦腹便林間病鶴尚俯啄池上山雞徒自憐何為當年種桃者移家偶脫區中緣題曹雲西畫松石雲西老人子曹子畫手逺師韋與李衡門晝掩春長閒彩毫動處雄風起葉藏戈法枝如籀蒼石庚庚橫玉理庭前明月滿長松影落呉淞半江水對梓樹花去年梓樹花開時美人明璫坐羅帷今年梓樹花如雪美人死别已七月梓花如雪不忍看沈吟懷思淚闌干鳴鳩乳燕共悲咽栁綿風急煙漫漫題趙榮禄馬圖嘗聞唐開元時畫馬曹將軍妙合變化神紛紜少陵為作歌其詞藹如雲又聞宋元祐之中李龍眠畫法奄出將軍前蘇黃二子誇神駿險語驚飛蛟蟄淵國朝天馬來西極振鬛駑駘為辟易玉堂學士寫真龍筆陣長驅萬人敵學士歌詩清且腴當時作者數楊虞畫成題就兩奇絶價擬一作比連城明月珠吁嗟天馬天一隅寶繪於今亡矣夫學士多師内廏馬得法豈在曹李下俗工未解知神妙此日罷駑遍華一作區夏好事流傳亦苦心誰為幽賞伯牙琴獨悲蘭亭繭紙隨零雨轉覺臨寫紛紛費豪楮為曹僉事畫溪山春曉圖因題荆溪之水清漣漪溪上晴嵐紫翠圍連舸載書煙渚泊提壺入林春蕨肥身逺雲霄作幽夢手栽花竹映山扉磯頭雪影多鷗鷺也著狂夫一浣衣畫寄王雲浦呉松江水漾春波江上歸舟發棹歌邀我江亭醉三日鳯笙鸞吹拂雲和紛紜省署縻官職老我澄懷倦遊歴看君骨相自有仙故作長松掛青壁題畫橘牕春夜雨潺潺翦燭裁詩畫碧山迸水定侵林下路蕙花委砌石苔斑夢乗艇子清江闊坐聴橈聲暗相撥未必漁翁似我閒棹歌不待鳴鳩聒畫竹贈王允剛子猷借地種脩筠何可一日無此君葉籠書席摇翠雨隂結香爐屯緑雲聞孫住近呉江渚二仲遨遊如蔣詡置酒邀余寫竹枝隔竹庖人夜深語題畫竹吾友王翁字元舉喚我濡豪畫縑楮喬柯脩竹蒼蘚石霜葉風梢碧滋雨湖州仙去三百禩坡翁高絶孰與侣黃華父子亦間出氣粗惜産旃裘所本朝高趙妙一世蔑視子端少稱許薊丘黃巖筆墨間瑞鶴神鸞競翔翥二公去後無復有谷鳥林烏誰指數奎章博士丹丘生未若員嶠能濡呴道園歌咏譽丹丘坡曉畫法難為語常形常理要𤣥解品藻固已英靈聚少陵歌詩雄百代知畫曉書真謾與坡深書畫詩更妙味永甘香試躭咀嗟余生後愛詩畫所恨遨遊不従汝王翁好古已成癖說史談詩身欲羽呉江遇我意慷慨一作涕縱橫飯我羮芹一炊黍晚持此巻索塗抹醜婦為顰走鄰女此詩此畫君勿笑焚棄筆硯當樽俎題畫贈吕彦貞江上秋雨晴泊舟煙水汀孤吟誰和予悠悠蟪蛄鳴故人邀我留三宿豆畦蘿徑居幽獨松醪陸續酌山瓢燈影縱橫寫風竹水光雲氣共悠悠鶴思鷗情樂此留無褐無衣悲骯髒三沐三釁歎伊優君自息機江上住我且沿洄從此去圖訖新詩草草裁眼底流光水東注至正十三年三月四日同章鍊師過張先生山齋壁間見柯敬仲墨竹因懐其人其詩文書畫鑒賞古跡皆自許為當代所少狂逸有高海岳之風但目力稍恕耳今日乃可得耶柯公鑒書奎章閣吟詩作畫亦不惡圖書寳玉尊鼎觶文彩珊瑚光錯落自許才名今獨步身後遺名將誰託蕭蕭煙雨一枝寒呼爾同遊如可作送潭州魯總管翽翽文鵷飛渡淮葳蕤五采下天階西疇昨夜雨初遍田父謳歌有好懷湘潭山色隨輕轂談笑來為此州牧隔岸桐林散綺霞三月洞庭春水緑十一月廿三日率性徳原共載過林下而余適不在遂返棹還家明日詩來因次韻重邀之雲林風雪徳不孤指顧可求塗豈迂兩忘主賓政自好一以禮法何其拘我方飄忽念嵗月君乃疎豁笑人奴再為理棹急相就放筆看寫狂遊圖題文貞公墓道奉先亭子奉先亭子山之隂雲氣低廻何處尋烏啼隧道風林静蘚剝龜趺雨溜深故老猶言前日事鮿生謾感二毛侵河山流峙英靈在世事紛紛一短吟恒徳堂虚林閒居養黃寧隱几逍遥遊玉京怡然樂康息天鯨良醫良相仙道并厥施同仁而異名没身身存故長生龍虎佩符鳯皇翎出戲𤣥洲入紫清一念不已三千齡子能神視廬幽貞觀恒斯見天地情氣專志一徳乃恒賦清隱閣爾營草閣名清隱著在輕鷗逺水邊春池覔句正思爾拄杖敲門忽繫船共賞奇文哦庾信更誇草聖法張顛到此自忘歸興逸硏雲歸寫古苔篇寫墨竹贈顧友善顧伯末派隱君子林居江濆古東里澡身潔行讀書史思友天下之善士緑竹猗猗蔚材美獨立不懼羣不倚長吟揮豪為君起寫其形模惟肖似諒哉直清可以比贈丘氏兄弟及周生岑參兄弟皆好奇二丘那復論東西欵門看竹我初到置酒投轄烏欲棲掃壁寫圖觀落墨瀹茗留坐綴新題東風甚與周郎便桃李隂隂晝滿蹊題柯敬仲竹誰能寫竹復盡善高趙之後文與蘇檢韻蕭蕭人品係篆籀渾渾書法俱奎章博士生最晚躭詩愛畫同所趨興來揮灑出新意孰謂高趙先乎吾古劒行雍公孫子氣甚清示我楊顛古劒行劒鋒詩律兩奇絶秋蓮光彩玉庚庚楊顛健筆老縱橫是亦鐵中之錚錚吐詞鬱嵂鳴不平鳯皇來為盛世鳴一代惟數虞翁生余也學書學劒既老何由而成名富貴咏富貴詘於人曷若貧肆志何從得此言聞之魯連子鴻飛𠖇𠖇天為低下視俯啄何卑微去去煙蘿碧巖裏瀑流千尺洗塵衣食無肉食無肉兮出無車旅無依兮歸無家秋風嫋嫋江漢槎逺波落日明荷花枳棘戔戔道云賒飛蓬蕭蕭雙鬢華夜有吟蛩晨有鳴蛙玉琴在匣但聞淫哇龍劒掛勝幽遐吾生有涯知無涯世迫隘兮紛浮華思從句漏求丹砂忍食安期棗如𤓰高卧白雲餐絳霞趙善長氏妙於繪事以荆闗法為遜學周君畫天香深處圖復賦此篇周君洵美玉色温有宋尚書之子孫尚書第宅古閩國秋風老桂蒼雲屯有子五人總攀桂孝友才華稟忠義周君今住讓王城澤流綿延俄八世載懷先世發咏歌月明珠樹粲交柯白榆歴歴不可數手援北斗酌天河尚書父及子騎箕入霄漢逝波逐囘風翕忽驚世換清芬沾灑後人多翠靄金葩影零亂鳯歌我亦楚狂人呉市經遊幾度春泛泛去來舟不繫狎鷗决去忽難親天香深處留茶屋為愛珍圖思超俗好繩祖武揚徳馨公侯之始爾其復次遜學廣文舟出金焦山韻眼前金芙蓉一朶迎人青焦山岌嶪蒼石稜長江無波素練平蛟鼉出沒魚龍變化翕忽徙南溟絳霞晴虹映朝日光彩激射雲錦屏指㸃齊州瞰呉楚欬唾萬里吞為吐江水潺湲橫淚流古人去我今幾秋有子仲謀才不世多情庾亮晚登樓遡流轉柁鳴津鼓歴亂沙鷗起檣櫓當時行樂恣經過舉酒觀魚登網罟海若决水不滿酌任公釣鼇且脀俎棹謳清綿斷復續瑶草琅玕動盈掬豈意一朝憂患生夫君處南予處北江流東去不西迴爾亦胡為乎嗟哉寒蟬長吟送落景砌蛩悲切助予哀仙人王子喬吹笙駕風雲招邀女媧補天手鍊石看作五色文和周正道拔時髦韻何處林間搭鳯毛鳯兮葳􅅋潛九苞空林春風露梢梢雉雊不聞鶴鳴臯雲中金枝紛翠翹龍鸞夭矯羣仙翺網羅張弛野喧囂羣飛畢命罔遁逃隕身析翮隨所遭毋啄我鷇傾我巢鳯兮麟兮逺莫招腥風血毛灑林郊隼鶻飛繫當絳霄西飛鷓鴣東伯勞旭日鳴雁聲嗷嗷鬼車鵂鶹鵩鴟鴞風雨如晦聞呶號時乎時乎孰如嘲吁嗟清濁寧混淆拔乎其萃皆時髦春草堂是日袁君子英同集軒中壬子正月五日也春草軒中隱几坐中有袁髥閒似我欲浮清海狎羣鷗擬向鴟􅆥借輕舸二月水暖河豚肥子苦留我我懷歸半鐺雪浪薰香茗掃榻蕭條共掩扉麝煤繭紙齊梁筆寳繪珍題品神逸洗滌古玉龍眠池臨榻奇蹤淨名室紅蠡捲碧春將酣檳榔蔞葉嚼香甘夜闌更鼓湘妃瑟笙磬同音詠雅南别君此去何草草山為迴旋海為倒令威白鶴會重來世人胡為易衰老至正丁酉十一月五日余友陳兄惟允過余旅寓鼓楚詞一再行因寫墨君并走筆賦長句以贈時漏下二刻矣筆硯荒落自愧草草惟允當有闕題趙千里扇上畫山誰見解衣作盤礴巻懷雲煙歸掌握春雨𠖇𠖇江水深一作波竹間日暮衣裳薄零落王孫翰墨餘越王臺殿乆荒蕪要知人好畫亦好愛比當年屋上烏附錄次韻張伯雨翠竹丹山氣旁礴幾叠香痕經手握何年破鏡飛下天呉淞水翦并刀薄江南寳繪多遺餘王孫不歸恨䕷蕪蘼蕪消歇秋風起班班為我歌烏烏又鄭元祐宋諸王孫妙盤礴萬里江山歸一握巻藏袖中舒在手清風徐來縠衣薄文采於今淪落餘雕闌玉砌凄蘼蕪至寳不隨黃土化門上空啼頭白烏又陳方苧衣春暖初盤礴㸃綴溪山不盈握白雲隔浦見桃花坐使涼風起樷薄故物凋零百嵗餘王孫有恨迷平蕪衡門今日看真蹟始與人辨雌雄烏苦雨行孟秋苦雨稻禾死天地晦𠖇龍怒嗔南隣老翁卧不起漏屋濕薪愁殺人自云今年八十剩力農一生兹始病兩逢赤旱三遇水租稅何曾應王命吾今寧免身為魚死當其時良可吁汎滄浪滄浪可濯纓春雨看潮生斵得木蘭槳欲向桃源行桃花源裏秦人住花發綺霞明處處何用文章寄武陵時有漁郎自來去至正乙巳五月廿三日畫雅宜山齋圖幷題靈巖對直雅宜山穹林巨石臨一作憶蒼灣若翁遁迹在其麓有子讀書常閉闗松根茯苓煮可握一作拙林下慈烏去復還寫圖愛此錦步障白雲紅杏春闌斑戲贈東方生國士腰間玉鹿盧猛將手中金僕姑英雄往往出屠釣輕薄紛紛能諂諛寳劒生塵無所用黃流明月若為汚揚雄枉儗相如賦今日論兵重武夫送友之紹興賀監宅前路荷花今亦無空餘湖上月照見水中蒲送爾作官幽絶處錢唐江頭飛栁絮聴事一作署臨堤滿夕嵐惟有沙鷗自來去題張外史翦韭亭外史詞華耿霜月劒花秋瑩鸊鵜膏皎然光燄照綠水不假雕琢慚鉛刀雅音自出性情正庸工徒為血汗勞若人逝矣不復作稂莠雨深那可薅壬子九月十九為潘翁仲暉畫并賦詩右方此畫在長安中阿翁好讀閒居賦桃李春風滿庭戸時與華陽道士行還鄰甪里先生住寳淨僧居共齋粥已看富貴如風霧我來三宿夜連牀行路荆榛嵗將暮泉州兩義士行孫天富陳寳生皆泉州人泉州兩義士異姓乃同心同心而同居利矣能斷金不見橫海虹夢見海畔路夢隨春雪舞迴風思逐奔湍向東注婁江之水沄沄其波方舟容與遄歸以歌落葉不息飄揚無蹤大風雲飛嗟彼㫁蓬人生乖離式與此同翩翩者鴻飛鳴相隨睠彼憸人我心實悲兄弟戕賊室家瘡痍背義競利曾弗之思兩士相讓以義其誰似之清閟閣全集巻四
