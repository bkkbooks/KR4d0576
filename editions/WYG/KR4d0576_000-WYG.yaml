body:
  text: 清閟閣集别集類四元提要臣等謹案清閟閣集十二巻元倪瓉撰瓉字元鎮號雲林案梁清逺雕邱雜録曰倪雲林字元鎮而華亭夏正長寅贈陳進之序稱為太守不知其何據謹附識于此無錫人畫居逸品詩文不屑屑苦吟而神思散朗意格自髙不可限以繩墨明天順間宜興蹇朝陽有刻本至萬厯中其八世孫珵等復為彚刋凡十五巻歲久漫漶惟毛溍所刋十元人集本行世國朝康熙癸巳上海曹培亷重為編定校勘付梓多所増補考朱存理樓居雜著有題林雲子詩後一篇稱素愛其詩每見一篇一詠輒收録之近得蹇氏新刻本㕘校其所遺者存而萃集成帙多呉遊之作計得諸體詩及雜文共若干篇為外集一巻則蹇刻原非足本故培亷更為蒐輯也凡詩八巻襍文二巻外紀二巻上巻列遺事傳銘並贈答弔輓之作下卷専載諸家品題詩畫語毛晉嘗刋雲林遺事于集外别行培亷裒為一編瓉之始末備列無遺矣世又有别本文集二巻末有崇禎戊寅紀同人跋曰雲林詩集毛子晉家有刋本此文集二巻自滄江劉氏鈔得之葢裒輯墨集而成非原本也後見刻本較此本増多數篇分為四巻序次亦稍不同然文中荆溪圗序一首據宜興縣志載入者核之即題陳惟允畫荆溪圖之節本前後複見畧不一檢則冗雜無緒可知不及此本之清整也云云其考正頗核今考集中所載如題天香深處巻後題紫華周公碑傳行狀後題師子林圖重覽紫華周公碑傳題周遜學府君遺翰後鶴林周元初像賛篇六等皆詞意猥鄙决非瓉筆盖自偽本墨迹抄撮竄入同人未及辨正培㢘此本亦尚在集中以流傳既久姑仍刋本存之而附著其可疑如右乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序東吳當元季割據之時智者獻其謀勇者効其力學者售其能惟恐其或後而有甘抱清貞絶俗之態卒閟其用全其身而不失其所守者非篤於自信不能也錫山倪雲林先生是焉先生諱瓚字元鎮雲林其自號也家故饒於貲至先生始輕財好學嘗築清閟閣蓄古書畫於中人罕跡其所愛寫溪山竹石攻詞翰皆極古意性甚狷介好潔絶類海岳翁然尤善自晦匿有若愚騃無似盡棄其所蓄如敝屣然卒之扁舟獨坐焚香弄翰以與漁夫野叟混跡於五湖三泖間又類天隨子既而昭代御宇遂使六合一統底今且百年矣彼之倖功譽於一時者飇馳電迅泯無聲迹之可尋而獨先生詩畫流落於人世雖片紙不啻拱璧耽玩之際猶覺清風灑然使人為之興起噫謂非篤於自信者能然乎先生之詩僅嘗見於題詠近得常之荆溪蹇君朝陽彚梓五七言古律絶句總若干巻走書京師俾予評之以傳予謂其清新典雅迥無一㸃塵俗氣固已類其為人然置之陶韋岑劉間又孰古而孰今也邪大羮𤣥酒不和而自醇朱絃疏越一唱而三嘆有遺音者矣朝陽讀書好義髙先生之誼而重其才寶愛是集欲傳之無窮真可謂深知夫詩而樂揚人之善者歟不然則是編也其不至於湮沒無聞者幾希故不辭而為之序天順四年歳舍庚辰菊月既望翰林院侍讀學士奉直大夫直文華殿雲間錢溥書
