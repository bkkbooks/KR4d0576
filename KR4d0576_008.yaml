body:
  text: 清閟閣全集卷八元倪瓚撰七言絶句題畫贈原道雪後園林梅已花西風吹起雁行斜溪山寂寂無人迹好問林逋處士家清明後題野棠花落又清明楊栁青青人耦耕春物闌珊成底事半江疏雨暮潮平次韻呈錢思復春泥滑滑暮霞明苔滿石田那可耕眼底紛拿詩可遣胸中崒嵂酒能平次韻再呈目斷青山白鳥明姑蘇城下有人耕越來溪水流遺恨嗚咽聲中似不平次韻答王彞齋見贈客居北渚靜窺臨霜藻蕭蕭雪滿簪玉石在山聊混璞金蘭惟子久同心春日桐葉題詩憶君處望春惆悵夕陽沉憂來蝶夢飛煙草黃髮蕭蕭曾不簪送友還毗陵有道楊公此駐車遺言百世惑能袪道鄉忠義埋黃壤牛斗龍光尚煜如睡起睡起晴雲滿澗阿牛羊日夕下南一作平坡浮生一作雲富貴真無用政似紛紛蟻一柯戲贈大雲不問羊車與鹿車無三無二一乘耶何勞贊歎并言説心悟方能轉法華環緑軒環緑軒中古逸民瑟琴圖史硯為鄰欲知此地多生意試看窗前草色新題竹三家市上沽村酒亥夜明燈初自酉官奴把燭我所無幽篁亂寫非風柳順逆順逆推移莫愛嗔白雲終不染緇塵世情如火心如水屋裏須教有主人别陸氏女去住情悰兩可哀天公與我已安排前途恐有寬間地未信狂夫事事乖寄人秋光明可截并刀一隼橫空厲羽毛猶憶南汀携手處斷雲殘日下亭臯寄韓伯清何處田廬業可租金堂玉室夢全無為謀蔬藥樵漁地好在何山碧落湖言意村氓報本妙蓮華供佛燒香汲井花獨有橋東白石叟依然傾酒食蝦蟆題畫此幅在燕京萬厯乙未金陵朱太史公父朱衣見録琪樹琅玕五老巔春風瑶草不知年逺公結社勤修習亭下開池種白蓮壬子四月八日雲林生記時余既為竹亭上人畫竹樹小山并賦贈絶句在江渚蝸牛廬題大癡畫山木蒼蒼飛瀑流白雲深處卧青牛大癡胸次多邱壑貌得松亭一片秋黃翁子久雖不能夢見房山鷗波要亦非近世畫手可及此卷尤為得意者甲寅春倪瓚題靜寄軒詩三首靜寄軒中無垢氛研苔滋墨氣如雲匣藏數鈕秦朝印白玉蟠螭小印文獨行應如魯獨居心同栁下孰云迂從教鄰女衣沾溼試問髙人安穩無身似梅花樹下僧茶煙輕揚鬢鬅鬙神清又似孤山鶴瘦骨伶仃絶愛憎為仲章寫竹石沈君好古嗜清淡竒石幽篁心所欣為寫雲林齋下景月明春露溼衣巾次韻呈張師道我愛張君真樂易樵談農語接歡欣每思靈石山前住六尺藤牀一幅巾用陳子貞韻題畫仙居乃在惠山東悟者方知色是空却坐西巖雙樹下玉笙雲裏度清風題李遵道畫我識黃巖李使君墨池詞氣靄如雲莫言但得丹青譽曾有人書白練裙題畫今日披圖感慨深與君對酒若為斟重居寺裏松杉合劫火兵灰已不禁海鷗何事一作處更相疑野老如今久息機旅泊一篷南渚上雲濤煙樹影依微近代舒王不數人曾哦雪竹與霜筠雲林野思生幽夢睡起濡毫一寫真要識清虛甘寂寞何如快活地中仙千巖萬壑松窗裏爛醉吟哦石上眠青山夕陽渡口見青山誰識其中有此間我本為樵北山北賣薪持斧到人間寄友密雪晴時照日初東窗竹影寫扶疏緣知江渚張髙士衲被溫敦偃仰餘十六日雨晴道耕豈患粥材罄德獵何憂肉食無底事甘餐希厚味曲肱飲水色敷腴拜石圖為王文靜題米顛嗜古命宜輕玄寶崖珍禍患并盥沐閲書私太尉可憐諂佞小人情清文絶俗盛名譽不記坡翁奬拔初得筆無如蔡元度却言蘇軾劣於書畫竹蟠虬舞鳳寒雲冷挾以明蟾光炯炯世人只解説洋州小坡筆力能扛鼎野店枯槎何處煙千花羞澀不成妍竹枝嫋嫋春風惡卧看歸鴻水拍天題黃子久畫白鷗飛處碧山明思入雲松第幾層能畫大癡黃老子與人無愛亦無憎懷吕君三年不見吕髙士清夜時時夢見之安得長風生羽翼與君濯髮向咸池聽琴久淫鄭衛亂吾耳忽復古初之雅音我思古人禁忿欲用此養正而鈎深贈別姚子章都事不見髙人十五年相看兩鬢各皤然舞袖醉僛明月下歸心飛度白鷗前雨窗排悶俗患不侵忍辱鎧道力可勝紛華兵明月無心含萬象浮雲初不汚圓澄雨聲蕭瑟似秋塘淡泊紅蕖滿意香火宅任渠生熱惱汪汪法海自清涼感懷百年苦樂孰深知何可旬月無我詩從渠推罵與爭席不廢鷦鷯巢一枝題畫吳松江水似荆溪只欠山光落酒巵古木幽篁無限思西風吹鬢影絲絲醉後調張德機博士今宵不用誇竹枝嫋嫋趂風斜莫煩更把官奴燭且與狂吟野老家西家飲酒不盡歡東家燈下坐團欒我儂自有一壺酒不怕先生酒量寬醉醒宜城竹葉春竹枝空畫損精神詩成不厭乾喉吻誰道傷多酒入唇允同日夕能求畫靳酒藏茶更惜香獨有館中張博士誇余弄翰不尋常白石先生古貌古心輕財而重義有相見既晚之恨令人寐寤不能忘但幽居默如潛逃則殊令人憒憒耳昨暮辱醉中詞翰讀之灑然也因次韻希一笑空宇寥寥秋燕巢笑談誰與共遊遨南鄰雖有幽貞士默默深潛如避逃深感分嘗酒數罌醋雞聞勝駝蹄羮轟轟烈烈男兒事莫使磨跎過此生連雨三月雨聲連四月五湖舟楫住南湖春愁黯黯如中酒捲地狂風撼不蘇松雪馬圖為原道題渥窪龍種思翩翩來自元貞大德年今日鷗波遺墨在展圖題咏一悽然題畫竹本朝畫竹高趙李慚愧後來無寸長下筆能形蕭散趣要須胸次有篔簹雨後池塘竹色新鈎簾翠霧溼衣巾為君寫出團欒影便覺清風爽逼人一作喜比他鄉見似人題畫贈伯亮逢著鄉人朱伯亮朱絃披拂共南薰研池雨過添新漲特為濡毫寫墨君謝筆陶泓思渴待陳玄對楮先生意未宣何似中書二君至明窗脫帽一欣然髙尚書畫竹石室風流繼老蘇黃華父子亦敷腴吳興筆法鍾山裔只有高髯不讓渠警時羔羊跪乳猶有別林烏返哺能無違彼哉微物具至理感爾太息淚沾衣己酉元日題徐氏南園壁九日塵汚一日清南園池水濯冠纓卑卑燕雀難喻大自擬摶一作展培風九萬程六日題寄居丘氏小偷間盡室逃亡夜向闌縣吏捉人空里巷挈家如出鬼門關贈别七月七日一杯酒吾友王君將逺遊况有辭家張處士逍遙江渚狎輕鷗張外史素不善畫醉墨戲寫張洞竒石頗有一種逸韻德明裝潢成卷走筆為賦書畫不論工與拙顔公米帖豈圖傳君看外史寫竒石醉墨依稀似米顛松雪馬圖舊寫天間八尺龍鷗波濡墨水晶宫紛紛世俗爭模倣兒子門生亦秃翁贈潘仁仲良相良醫意活人得仁要亦在求仁能調脾肺心肝腎不出酸醎甘苦辛庚戌冬舟過泖西寫竹石小幅贈仲端友契野處翁居泖水西風梢霜葉思凄迷它時再鼓春波緑花落軒窗野鳥啼送徐仲清還毗陵昔年守義抗天兵季子遺風尚足徵牧守荒淫嗟末代荒墟榛棘竟誰懲題墨萱落盡幽花出一枝愛宜男草近清池水仙唯數彞齋趙夏卉芳妍爾更竒贈沈掾蕭蕭白髮沈休文問舍求田江水濆此夕一杯成酩酊淋漓醉墨氣如雲題王叔眀巖居髙士圖臨池學書一作筆精墨妙王右軍澄懷觀道一作卧遊宗少文王侯筆力能扛鼎五百年來無此君李伯時畫飛仙遊騎龍眠畫貌得形模也自竒句曲真人能鑒定不須言下更題詩題畫贈單君單君子逹荆溪住不到荆溪已十秋古木幽篁苔石路每經行處思悠悠贈伯清市上休疑張伯清藥無二價駐一作制頽齡何當掃雪居幽谷與我松根採茯苓贈故人孫喬木叢篁倚苔石故家遺業總成灰二喬憶嫁周公瑾尚有枝孫氣不衰題彥貞屋壁壬子五月草七日吕君隱所余又來輕舟短棹向何處只傍清波不染埃題畫贈盧山甫盧君絶似米顛子品畫評詩也自佳我畫亦憎寒具汚手為裝緝挂高齋題畫絶憶丹陽蔡天啓秋深淡墨意縱橫陳君筆力能扛鼎可見前賢畏後生戲筆枕幃椰席便安舒借我飛裙意有餘更借裙拖三百石髙秋還子有佳書題周遜學天根月窟軒手攀月窟躡天根已識乾坤即此身安樂窩中方寸地浩然三十六宫春正月四日夜風雨拙逸齋賦荒煙漠漠古長洲倦客悲吟歎滯留風雨打窗歸夢短一樽聊作醉鄉遊為蒙菴題吳仲圭竹枝便面十年害眼今年較障眼前緣始暫離紈扇篋藏無棄置三收吳叟碧筠枝竹樹小閣竹影縱橫寫月明青苔石下聽鳴筝我來倣佛三生路琪樹秋風夢亦驚題畫贈均玉笠澤汀前竹樹稠白頭埀釣荻花秋有時乘興入城府獨放扁舟任去留西湖竹枝詞愁水愁風人不歸昨夜水沒釣魚磯踏盡蓮根苦無藕著多柳絮不成衣桐樹原栽金井西月明照見影離離不比蘇公堤上栁烏鴉飛去鷓鴣啼題日本僧畫五老西來第幾峰道人定起對長松挂帆東海還歸去貌得香爐雲氣濃題畫何處青山落照邊隔林零亂走寒泉山如十月江南草間倚荒村泊釣船題竹舟過甫里夕陽微相見故人潘仲輝為寫石壇青鳳尾不知雲落已沾衣題畫竹贈西溪處士雪葉霜枝耐嵗寒櫛風沐雨不成歡百年強健且行樂留取清溪作釣竿題鄭所南蘭秋風蘭蕙化為茅南國凄涼氣已消只有所南心不改淚泉和墨寫離騷己酉十月八日訪伯凝文學寫圖以贈江水清空霜葉稀竹深依約有窗扉留連竟日忘羈思間與休文詠落暉寄良常不到荆溪二十年舊冬十月擬同船夏秋好遣漁童至定去靈常古洞前四月訪衡齋髙士不來新里四經年首夏清和又繫船笋脯松醪三日醉西山在望已醒然題芭蕉士女鳳叉斜壓鬢雲低望斷羊車意欲迷幾葉芭蕉共憔悴秋聲近在玉階西歲庚子十一月草日邂逅雲岡道師於長洲邑東之衍慶院以此紙命寫竹石并賦詩而紙筆皆不佳漫爾作此愧不能工道師憫世憂國以道德為己任汩汩城邑之中不以為苦不肯自超於風埃之表也故末句諷之天妃廟裏曾遊處怪石藂篁滿緑苔今日江潮重回首卜居南嶺白雲隈四月草日過江渚茅屋雜興四絶句録呈雲浦明公以代對面百年風雨幾興亡睡起西山尚夕陽四月維舟向茆屋一庭春草獨焚香燕子低回掠地飛海鷗來去水侵扉中流雲度他山影落日帆從何處歸燕雀生成喜近人家殘屋破去踆踆可人惟有間庭草蓬户朱門一樣春姑蘇城郭草茫茫城外腥風舊戰場花落空垣車馬絶獨餘梁燕説興亡畫竹苦憶能詩梁上人明窗竹几淨無塵為君戲寫檀欒影多入湘江野水濵題畫落月團團照屋梁能仁寺裏白雲鄉只今却笑庵中叟竹樹小山凝雪霜幽篁古木姑餘畫贈與松陵沈仲良今夜泊舟依古栁一篷疏雨夢瀟湘蘭亭辨説蘭亭猶聚訟精良此刻更何疑辨才囑付昭陵後玉匣為塵世祚移古木竹石劒光出匣耿秋蓮磨礪崢嶸濯澗泉又是一畨風雨過青楓月下竹娟娟題張遜鈎勒竹霜松雪竹當時見筆底猶存嵗晏姿文采百年成異物西風吹淚鬢絲絲髯張用意鐵鈎鎖書法不凡詩亦工清苦何憂貧到骨筆端時有古人風題畫服食清虛帶瘦容菖蒲花發紫茸茸滌煩磯上營茆屋千仞巗巒一箇松畫竹次鄭元祐韻曾向清湘斬釣竿蒼蒼煙景暮江寒逺山一脈西來意付與髙人面壁看筠石喬松蕭蕭風雨麥秋寒把筆臨摹強自寬尚賴俞君相慰藉松肪笋脯勸加餐己酉二月草一日為清明日風雨凄然舟泊東林西滸步過伯璇徵君髙齋焚香瀹茗出示燕文貴秋山蕭寺圖展玩良久因寫是日所賦絶句其上野棠花落過清明春事匆匆夢裏驚倚棹微吟沙際路半江煙雨暮潮生壬寅仲冬寫竹枝贈潘友復賦詩其上赤壁磯頭萬里秋月明寒竹思悠悠二喬消息今何似尚憶風流人姓周辛亥秋寫竹梢并詩奉贈次宋徵士今朝姚合吟詩句道我休糧帶瘦容寫贈湘江青鳳尾相期往宿最高峰至正三年癸未嵗八月望日進道過余林下為言僦居蘇州城東有水竹之勝因想像圖此并賦詩其上僦得城東二畝居水光竹色照琴書晨起開軒驚宿鳥詩成洗硯沒遊魚樹石已過上已與清明風雨數朝今日晴修竹春柯苔石畔一杯聊為故人傾辛亥春寫松亭圖并詩贈德嘉高士華亭郭裏陳髙士三泖九峰時一遊欲結松亭看雲氣更招鳴鶴友浮丘從善道契過笠澤以士雍高士此紙求寫竹枝畫已并賦隱士河隂半畝宫澱山湖裏泊煙篷秋來鱸鱠蓴羮美亦欲東乘萬里風至正十三年二月晦日為公逺茂才寫古木竹石並賦甫里宅邊曾繫舟滄江白鳥思悠悠憶得岸南雙樹子雨餘青竹上牽牛四月十七日寫筠石春樹并詩以贈叔平道契芝室丹房苔石清荒筠春樹影縱橫他時夜雨尋幽約筍脯芹羞酒滿罌乙未嵗四月草日過仲寶隱君宅因賦題松泉畫幀澗雨松風解宿酲虎頭宅裏坐忘形清歌擊築聊永日更倒君家雙玉瓶題衛明絃洛神圖凌波微步襪生塵誰見當時窈窕身能賦已輸曹子建善圖惟數衛山人辛亥二月草九日留華亭南里潘君以仁宅因懷去年此日與心逺同在餘不溪開玄仙館蕭蕭風竹和幽吟二月江村春雨深東去山中此時節隔溪桃李正隂隂寫晴梢并詩贈日章貞士雨後空庭秋月明一枝窗影墨縱橫沈君雅有臨池興蕭灑濡毫意自清國寶照磨有平野軒在揚州城郭中今寓吳十許年矣至正丙午九月十一日在開元寺為寫此圖並詩以贈雪筠霜木影差差平野風煙望逺時回首十年吳苑夢揚州依約鬢成絲昨日承蔬笋不托之供獲清言永日別後與元舉叔陽㩦琴過普陀精舍相與盤礴林影水光中而令子來始知從者散步韓墅橋急遣一介往候則從者興盡已返矣經宿不面旦來雷雨大作想惟動靜輕安昨見尊爼間韭芥萵菜之屬秀色粲然今日得雨必是苗芽怒長更佳也况蒙許送久伺不見至戲作小詩促之韭芥抽苗鋪翠玉曉經雷雨更敷腴莫嗔措大眼孔小乞取先生一餉餘七日訪徐良輔十三日至七寶泉上及暮舟還耕雲軒來看城西十月山桂花風起碧巗間扁舟夜過溪東宿七寶泉頭日暮還桂樹窗間卧看雲風吹花落紫綸巾偶來山廨餌蒼术又向江波采白蘋中秋月下歡飲鳴鳳岡頭秋月明一樽能為故人傾月林滿地青蘋影琪樹飄香露氣清中秋夜月明勝常年良夫與景和㩦酒至耕雲軒酣飲及二更乃就寢十六日夜隂雲半天宇月光或隱或見十七日夜月已不如中秋月色朗徹十八日暮雨作至十九日不止因賦八月山居秋廓廓西風逗冷侵疏箔鳥銜青影暮飛還細雨空庭桂花落題坦率子畫何處溪山好卜居武夷不住即匡廬蓬萊兜率元非逺雲錦箱中貝葉書寫竹枝贈成之隱君鐵嘯樓前江雨晴一枝修竹近簷楹酒酣更待纖纖月噴薄簫聲似玉笙寫竹石贈錢自銘瑶芳樓下曾留宿因見明琅舊日圖錢起能詩多逸思為渠吟嘯不能孤貞居道士往常熟山中訪王君章髙士豫因寫梧竹秀石奉仲素孝廉青桐隂下一株石回棹來看雪未消展圖倣佛雲林影肻向燈前玩楚腰題朱澤民小景朱君詩畫今稱絶片紙斷縑人寶藏小筆松巗聊爾爾道寧格律晚堂堂題畫澗道流泉曲曲通白雲窗牖護簾櫳汀花如雪歸舟晚南渚幽人未易逢題趙彥徵小畫文敏公孫清且賢陶泓楮頴過年年子由命也成葅醢坐對鷗波一惘然登天平天平爛漫遊三日林下狂吟石上眠浩蕩春風芳草緑梅花雪滿白雲泉病中九日懷山園三首江村九月木樨風不與山園景物同還憶澗西行采菊茱萸交綴入杯紅病骨崚嶒山影瘦敦敦擁褐坐忘言當年親舊㩦壺處應有寒泉滿石尊登髙多在九龍山湖水蒼茫白鳥還醉拂松蘿臨石溜黃花楓葉暮斑斑題曹幼文雪林圖窪盈軒在雪林齋啜茗幽吟見雅懷一閲舊圖如隔世世奚遺我老形骸自題畫山郭幽居正向陽喬林古木鬱蒼蒼剡藤百幅誰能置為掃虬枝蔽日長附録次韻尚左生雲林雨過踏春陽澗水濺濺老樹蒼不是硯坳雲作陳疏篁空自拂簷長江渚茅屋雜興四絶奉寄雲浦理問兼似良夫隱士我自無心何慢勤愛憎加我亦從人青山不改如如體雪後陽生依舊春五月隂風特地寒闔閭浦口怯衣單飢啼野哭浮村落我本無愁也廢餐虞趙虹光貫壁奎碧梧端合鳳來棲春泥滑滑江天永更著荒榛呌竹雞眼底繁華一旦空寥寥南北馬牛風鴻飛不與人間事山自白雲江自東題髙彥敬山水圖房山清影浸湖波緑玉蒼煙冷蕩磨寶墨珍圖人世滿山中照見百東坡中秋偕徐良夫飲耕雲山居酒渴茶甌沁露涼石牀雲卧冷侵裳團團碧樹懸金粟月午風清夢寐香煙雨中過石湖三絶煙雨山前度石湖一奩秋影玉平鋪何須更剪松江水好染空青畫作圖姑蘇城外短長橋煙雨空濛又晚潮載酒曾經此行樂醉乘江月卧吹簫愁不能醒已白頭滄江波上狎輕鷗鷗情與老初無染一葉輕軀總是愁懷耕漁大隱山谷真堪埋百憂月窗桂樹思綢繆荷花浦口見山色寄書汝亦憶儂不八月草一日出鳳岡江上來尋西郭山山人留我白雲間風飄雲去他山雨雲本無心亦未間寫竹梢寄耕雲一枝秋玉迥吟風寫入吳箋意逾工逺寄碧山王録事獨行何用哭途窮采薇采薇巗岫宿層雲迫隘悲為世俗鄰郿塢銅山竟何似金留未必不戕身阿房宫阿房遺址碧山垠葅醢生民又幾秦積恨不消秋草緑行人指點話悲辛訪古道首座因見吕志學詩篇我愛學公名古道於今古道久寥寥淨名室裏無塵事一見令人意也消不見吕髯幾十年想應兩鬢也皤然何當共住維摩室剪燭哦詩聽雨眠寫畫贈馬彥敬髙房山尚書清節雅尚為本朝名臣諱克恭字彥敬馬先生亦其國人亦字彥敬蓋司馬慕藺之意也今既為作山居圗又詩以贈之清節尚書髙彥敬馬翁同字亦懷貞漢庭詞賦相如最司馬依依慕藺情題顧定之竹上有王常宗詩顧畫王詩兩竒絶風霜凜凜香清節獅子林中古佛心允矣無生亦無滅連雨二月雨聲連四月三江舟楫住吳江春愁不醒如中酒浪著狂風撼客窗畫溪山春霽圗水影山光翠蕩磨春風波上聽漁歌埀垂煙栁籠南岸好著輕舟一釣蓑次潘瓠齋韻題丹丘墨竹柯公自比米顛子文采照耀青琅玕只今耆舊凋零盡剩得潘君瘦影寒附録瓠齋原韻丹丘寫竹師老可能寫倒影青琅玕張之草堂雪色壁壞葉瀟瀟煙雨寒追和蘇文忠公墨迹卷中詩韻脈脈逺山螺翠橫盈盈秋水眼波明西北風帆江路永片雲不度若為情窗裏晚山眉翠重汀前秋水眼波明白鷗飛處尋歸路眇眇新愁故國情雨挾江湖來浦口霜凋木葉見山尖寒波曾照飛鴻影髭雪朝朝與恨添風雨翻江夢裏驚忽思仙馭絳霄翎世間那得麻姑爪癢處爬搔憶蔡經湖邊窗户倚青紅此日應非舊日同太守與賔行樂地斷碑荒蘚卧秋風奎章閣下掌絲綸清淺蓬萊又幾春三十六宫秋寂寂金盤冷露泣仙人蔡公閔嶠雙龍璧蘇子儋州萬里船何似歸田虞閣老醉吟清浦月娟娟嗜酒狂吟秃鬢翁華陽壇館百花風晚年傳得登真訣歸卧南山澗谷中右二首又追和虞奎章韻右蘇文忠公真迹一卷公之書縱橫邪直雖率意而成無不如意深賞識其妙者惟涪翁一人圓活遒媚或似顔魯公或似徐季海蓋其才德文章溢而為此故絪緼鬱勃之氣映日奕奕耳若陸柬之孫虔禮周越王著非不善書置之顔魯公楊少師蘇文忠公之列則如神巫之見壺丘子矣癸丑八月八日倪瓉附蘇文忠公墨迹卷中詩蔡君謨夢中作天際烏雲含雨重樓前紅日照山明嵩陽居士今何在青眼看人萬里情陳述古閣中君謨書壁上詩綽約新嬌生眼底侵尋舊事上眉尖問君別後愁多少得似春潮夜夜添無名氏和壁上韻長埀玉筯殘粧臉肯為金叉露指尖萬斛間愁何日盡一分真態更難添杭州營妓周韶求落籍作時韶有服衣白隴上巢空嵗月驚忍看回首自梳翎開籠若放雪衣女長念觀音般若經營妓胡楚送周韶落籍作淡妝輕素鶴翎紅移入朱欄便不同應笑西園舊桃李強勻顔色待東風營妓龍靚送周韶落籍作桃花流水本無塵一落人間幾度春解佩暫酬交甫意濯纓還作武陵人題東坡書卷後絶句四首蜀人虞集只今誰是錢塘守頗解湖中宿畫船曉起鬭茶龍井上花開陌上載嬋娟老却眉山長帽翁茶煙輕揚鬢絲風錦囊舊賜龍團在誰為分泉落月中三生石上舊精魂邂逅相逢莫重論縱有繡囊留別恨已無明鏡著啼痕能言學得妙蓮華嬴得春風對客誇乞食衲衣渾未老為題靈塔向金沙次前韻九首丹丘柯九思山中覆鹿拾蕉葉眼底生花二月明不道人生從夢寐詩新猶話夢中情緑窗度曲初含笑銀甲彈筝不露尖人生莫待頭如雪華屋春宵酒屢添雲中初下勢如驚白鳳蹁躚雪色翎多少舊逰歌舞地不堪回首又重經桃花扇底露唇紅不復梳妝與衆同一曲山香春去也荼䕷無語謝春風一顆摩尼不染塵瑶池玄圃度千春昭陽殿裏雲深處誰是當年解佩人三月旌旗幸玉泉牙檣錦纜御龍船千官車騎如雲湧楊栁梢頭月色娟長憶眉山鶴髮翁舊時阿閣贊皇風如今流落那堪説黼黻文章似夢中鼓瑟湘靈欲斷魂洞庭波浪不堪論遙知舊賜宫袍錦雙袖龍鍾總淚痕興聖宫中坐落花詩成應制每相誇廬山面目秋來好自杖青藜步白沙又吳郡張雨日將公事湖中了醉入重城列炬明自古大藩財賦地古人偏得賦間情謝女嬌吟雪比鹽北臺馬耳見雙尖衲衣政索歌姬笑不道春寒繡被添寫韻軒中塵不驚與誰同躡鳳凰翎采鸞可惜情緣重只合清齋寫道經叉頭新緑荔枝紅那與江珧色味同聞道端明新進譜一時殿閣起薰風香辟春寒玉辟塵流蘇斗帳醉和春一雙明月都無價寂寞人間第二人江南在處煙波好浪迹先生不上船近就闔閭城外宿可憐霜月夜娟娟青城樵者一衰翁寫罷烏絲滿袖風消得玉堂金研匣至今傳入畫圖中聽碾龍團怯醉魂分茶故事待誰論纎纎玉碗親曽見祇有春衫舊淚痕白公種竹蘇公栁談笑功名後世誇依舊葑雲三萬丈斷橋誰與築堤沙又義興馬治東閣小書詩夢破後堂殘醉燭花明春風客散茶香在寂寞人間萬古情紅入兩顴春意滿翠籠雙袖曉寒尖雖知别後情難識也覺愁中醉易添彩筆詩成舉坐驚素衣新剪鳳凰翎多情應是蓮花女留得銀筝金字經透海丹砂一粟紅前身宜與後身同袖中只換神仙骨塵業何由到素風滄海桑田復幾塵東風惟見落花春須知剩水殘山外氷雪肌膚别有人蜀人文采相先後多在西湖載酒船腸斷至今湖上柳空殘眉翠簇連娟三百年來此兩翁詩人情性道人風醉中還似毗邪老花雨紛紛一笑中梅花香冷返氷魂往事茫茫迹未論寶劍已隨龍化去誰憐水上刻舟痕賦就仙人蕚緑華金聲玉色衆中誇歸來世上空塵土雲白江清月滿沙王雲浦示余米元章詩卷次韻辛亥八月望喟然嘆也宜吾與不利虞兮奈若何鴻雁不來風嫋嫋庭前樹子落桫欏吳松江只蒲萄緑金井峰仍縹眇青説與弋人何慕我髙飛鴻鵠杳冥冥大姚湖水白生煙長物都除絶世緣笙鶴不為歸鶴怨玉仙真是勝丁仙附録原韻廣文當日官雖冷可奈才名振世何他日君家須炙手而今聊復雀堪羅老年尚喜管城子更愛好山江上青武林秋髙曉欲雨正若此畫雲冥冥三茅别有洞中天我欲山居屏世緣纍行積功多蛻舉玉宸欣有地行仙紹興戊午季春書於大姚五湖田舍元暉寫春山嵐靄贈仲章沈君至正九年三月一日露草雨苔青不乾牀頭澗水夏生寒傳經長史揮毫處只作當時舊宅看南澗實張君舊業故云附録次韻張雨元鎮此幅又入巨然之室謂二米所不逮也秀色雲林墨未乾一峯天柱倚蒼寒玉人只隔輕煙靄三尺圖中正面看又鄭元祐九龍峰上雨雲乾影落棲神澗水寒不是天機飛墨妙何由寫入畫圖看陳母莊氏節義義士陳寶生之母抗節誰稱斷臂嫠皇天空谷照貞姿何人得似馮丞相易主班迎獨任之附次韻吕楨貞節誰如恤緯嫠凛然松柏歲寒姿姓名今日輝編簡班史文章復見之題甕牖圖賜也貨殖憲也貧憲貧非病衣已鶉未若簞瓢顔氏子陋巷所樂皆天真畫竹石一幅水墨採蓮涇上漣漪緑苔竹幽篁依古木遇著幽人周傑翁邀余把酒清池曲余邂逅仲傑隱君於採蓮涇上戲寫此圖并賦詩為贈至正癸卯五月草二日倪瓚附録和韻詩跋卧食黃精鬚鬢緑情似萬花身似木忽然市上肆墨兵濁酒一巵歌一曲樵介和雲林翁近村子雲林先生瞳色緑江村老叟相如木畫情却寄倪夫子不問鏡湖才一曲熙僧持此將去近村又復題此山瓢倒瀉瀟湘緑道人過似段干木踰垣不舍酒在尊歸來醉按無絃曲珊瑚紅映琳琅緑也知不是凡花木雲林無復見幽人人世空傳採芝曲天香秋染新袍緑敘别尊前歌伐木登樓目送渡江人十二欄干倚雲曲天全公為友人顧贑州子崇善上舍題淇水仙人新挂緑足躡雲根登若木此去金鑾獨對時誰能和得陽春曲右山隂駱巽題隱君重價如結緑蘿屋蕭然倚喬木藍輿不到五侯家只在夫椒與勾曲悵望雲林消故緑無人更識雞登木天寒嵗暮抱琴來為君重奏相思曲右彭城劉珏題白雲下映空潭緑周翁宅畔多喬木清暉自是能娛人目送秋鴻彈古曲芙蓉山下苔痕緑一代清風吹墓木畫裏題詩和者多誰言此是巴人曲雲林子以詩畫妙一時然性狷甚非當其意不與彼周仲傑者何人乃辱與之不吝而使至今和其詩者尚知有傑焉其亦老杜之黃四娘長公之林行婆也耶豫友顧崇善雅好畫其藏此意在雲林耳亦豈以傑故哉時成化己丑之嵗季秋十有七日吳生寬初寓南都之珍珠橋書樓對紫金山爽氣試王古用筆淇園過雨驚潑緑老節凌雲依古木春雷一夜長孫枝載和虞廷九成曲吾鄉顧氏自入國朝祖孫三代皆以辰年登第世謂之三辰進士信竒遇矣故是詩云云雖然由崇善而上則三辰進士由崇善而下其數尚不止此且不必其皆以辰也吳瑄玉碗濃分荔枝緑醉毫還寫山中木老材無用不足論根到九泉那肻曲姑蘇臺下䕷蕪緑清閟閣前狐嘯木於今畫裏見清泠何待貞元供奉曲右清癡馬愈和題九龍山前春草緑老眼何人識喬木清風聊寄剡溪藤吳人盡和陽春曲東市髙生髮猶緑犧尊自古災嘉木朱絃玉軫尚依然誰寄廣陵散一曲倪雲林畫髙太史詩皆百世前竒寶也進士顧崇善徵題乃賦二首一以思雲林一以傷太史云華亭張弼雲林水墨非青緑幻出天然美筠木饒髙二老融心神一唱三歎歌清曲錯刀劈出淇園緑籀文寫就靈槎木倪迂逸筆妙天機賞鑑令人慰心曲鄉貢進士顧崇善持此軸求題余閲之乃中吳先進諸公詩畫也創之者倪公元鎮詩而和之者髙公季迪饒公介之其上所書則饒公筆也三公皆名人世難得其真迹今併得之是誠三絶崇善舊從余遊余每愛其篤學有俊才且好蓄古書畫雖然崇善有大抱負者建功立業在彼不在此也成化乙酉十月望教授臨川黎擴大量跋贈宋仲溫江水欣逢宋仲溫蕭條古道向君論我居笠澤已十載看竹惟君我欵門答謝參軍謝公好義今猶初不可親褻不能疏松陵父老猶德爾援若功多自不居寄德常别駕廩食精豐養士多村童野老亦謳歌可無振厲新科格選試能平定不頗題大癡畫大癡畫格超凡俗只尺關河千里遙惟有髙人趙榮祿賞伊幽意近清標清閟閣全集卷八
