body:
  text: 清閟閣全集卷六元倪瓚撰七言律詩屋漏寂寞江天暮色懸重隂愁絶卷塵編走看破壁雨沉竈思卧蘆花雪滿船風捲高一作臯堤沙一作髙樹拔泉翻野徑藥苗延青山天矯浮雲外自愛新秋爽氣鮮贈惟寅有引陳君惟寅天倪先生令子也天倪為黃清權高士之甥清介孤峭甚似其舅讀書鼓琴不慕榮進淡泊無欲以終其身惟寅能守其家法者也世故險巇安貧自樂窮經學古教授鄉里色養得親之歡心友愛盡弟妹之和樂綴葺詩文於以自娛余嘗愛其藻麗不羣飄然有出塵之想聊摛鄙語用詠才華暮春之辰忽過江渚出示新什相與披咏因成長句以歸美焉不見元方已隔年暮春孤坐此江邊政憂浪濶多風雨却喜君來共簡編諷咏新詩非偶爾艱虞逺别更凄然看花相約重過此已放栁條維酒船曲彥逺寄茗裹賦此道謝且求致梨栗木瓜繞屋青山謝眺居木瓜梨栗種扶疏不妨暇日騎官馬自喜清時少簿書九月授衣霜欲落百年回首雁飛初猶憐踽踽空山落茗裹封題逺慰豫故吾縹眇青山日欲晡瀰漫秋水興何孤鶴歸城郭生新夢塵掩圖書尚故吾南畝藝苗傷碩鼠北窗臨澗聽啼烏醉歸倘乞封侯地便復移家傍酒壚三月二十二日雨懷荆溪舊遊寄原道憶昔荆溪棹酒船緑波搖蕩女蘿烟春茶未放仙人掌雨蕨先舒稚子拳巗間石上尋遺跡作賦題詩多昔賢今日空齊獨對雨幽懷猶夢白雲邊酬友生泖水山光照屋廬每思潘令賦閒居客愁不解連三月詩贈全勝枉尺書醉墨不妨拈秃筆狂吟時復近前除亂離自歎摧頽甚晝寢毋嗔老宰豫二月晦日聽劉伯容彈琴逺思翩翩屬五湖一杯濁酒咏唐虞清琴忽作金石㺯佳士今猶山澤臞飛絮遊絲揚風日瀑流松吹灑巾襦羣龍汨溺淫哇久古樂蕭條古道迂答元用野水浮鷗不世情煙濤漂泊羽毛輕雲移短棹忘機久雪㸃青山照眼明甫里宅邊逢酒熟吳松江上看潮生夫君為話征途苦惆悵令人意不平同通書記過鄭先生舊宅女蘿埀緑翳衡門野水通池沒舊痕有道忘情觀物化清言如在想人存凄涼江海空茅宇慘淡煙埃委石尊一奠山泉薦芹藻古心寂寞竟誰論馬國瑞東臯軒未羡勳名馬伏波優游鄉土樂婆娑輕舟陌上山堪數細雨籬邊菊未過一作娑浩蕩五湖鷗夢逺蕭條萬里鶚情多寒宵偶伴一作㕔時有幽人宿月燭藜牀一作高懷幔緑蘿次韻張榮祿追和楊别駕賦王番陽東湖勝遊四首呈雲浦耕雲二君秖今誰是番陽守别駕題詩凡幾春僚屬得才青瑣舊兒童騎竹白頭新當筵意欲凌雲外今日人誰問水濵陳迹寥寥風景切桃源何處覓遺民賓客從來逸興多雨深春渚緑增波笙簫載月回鸞鶴雲錦飛裙織芰荷短世悠悠大槐國餘哀嫋嫋竹枝歌湖山寥落行人老翠影蒼煙寒蕩磨散亂鳬鷖發棹謳波明雲淨宛如秋酒杯青落垂楊影麈尾風生杜若洲匣裏鳴琴俄復掩杯中覆水竟難收白頭聞說開元盛雙淚滂沱似瀑流湖上晚風明綺霞春雲覆竹影交加歌喉圓滑吟山鳥舞袖低徊亂渚花緑淨碧虛寧敢唾星埀河注欲乘槎玉堂坐想當時勝榮祿詩成謾自誇贈王文靜靜寄軒中酒一樽陶然醉裏别乾坤碧桃花已當窗發翠竹隂須映户繁荏苒春光逐風雨婆娑嵗晚樂丘園詵詵更祝螽斯羽若欲宜男賸種萱知王子明韵從容浮沉多厚顔醉筵舞袖作弓彎雉羅孰是逃三窟豹管能窺見一斑縱酒已拚時共棄歌詩猶與世相關采薇巗穴聊終隱林下閒雲自往還送盛髙霞霜髮飄飄鶴上仙相逢遼海幾何年種桃遂有劉郎賦鼓瑟寧知曽㸃賢華表不歸塵汨汨吹簫何處月娟娟嗟余百嵗强過半欲借𤣥關一作窗靜學禪陸文玉見過時余初喪長子荆溪二月春風惡燈火論交夜對牀白鶴繞壇初露下碧梧滿地忽霜黃卜商失子人誰弔阮籍窮途只自傷政使陸郎能慰藉賦詩懷舊更凄涼贈道士李嘯虛龍虎巖前李鍊師幾時飛鳥洞庭垂晴天白鶴興閒逺秋水蒼龍光陸離山中杏熟從收穀階下芝生看奕棋邂逅樓船海上便還應與爾道相期送霞外師過磧沙寺因寄鄭博士毅長老湖水東邊磧沙寺翻經室裏看爭棋食馴沙鳥巢當户坐愛汀雲影入帷惠逺向修為律縛康成終老只書癡寄語山靈莫疑怪松隂好護中興碑次韻贈林泉民張孟辰三徑誰尋二仲踪一丘木石紫溪翁思蓴張翰有清識閉閣茂深多祖風午夢池塘春草緑輕隂窗户落花紅應懷錫谷林泉勝山色依微在望中送葉道士東歸分得懸字用韻三首愁心黯對夕陽懸忽見高標喜欲顛似與人民千嵗隔更詢耆舊一凄然青燈緑酒看成醉祕篋珍圖自滿船歸去還臨劒池月定應歌此酌山泉憶爾心如旌斾懸相逢泖渚欲華顛窮冬風景吾衰矣落日煙濤思渺然八詠樓前思舊宅三高祠下覓歸船棲幽定洗塵喧耳剩吸東陽一斛泉君到茅簷雨溜懸采芝期我碧山顛掀髯一笑非徒爾隔世重逢豈偶然沙渚屐聲歸泖客晚潮帆影下江船為豫一話艱危際雙淚沾衣似迸泉贈别榮子仁退食從容下玉除當年史館燦成書藝場馳騁答賓戲筆陳縱橫賦子虛山水娛情經亂後圖書連舸渡江初君來愧我無供給一勺寒泉薦菊葅雨中在林氏賦贈徐生終朝風雨洗炎歊隱几無言思泬寥已絶鳴蟬咽衰栁空吟翡翠集芳一作蘭苕嘉魚坊裏多名酒碧鳯橋邊欲晚潮二子翩翩一作林徐有髙致為陳筆墨逺相招戲題嚴録事所集書畫藪雨餘晝逢嚴録事手持書畫索題詩金題玉躞齊梁迹墓刻崖鐫秦漢碑把玩始驚繁卷軸品量還愧拙言詞古人冷淡今誰尚謾葺殘編慰所思以龍尾硯寄錢徵士龍尾誰磋古硯池庚庚𤣥璧隱風漪知君筆力能扛鼎愛我雲腴欲産芝投贈寧論百金直咏懷更賦五言詩唯應洗濯寒泉潔靜試松煤獨下帷宿清流堂衍慶院中無市聲清流堂上晚風清一𣲖濁涇從汚染百灘白月見空明我性非澄本爾淨外塵徒擾元不驚恆公宴坐清涼海還許遊人來濯纓題畫送僧用大機吳人也住宜興保安寺壬子九月十九日將還山戲寫秋樹筠石并詩以贈之且以呈方崖禪伯云不到荆溪三十秋南津溪水亦東流用公近住金鵝嶺魏族猶鄰白虎丘楓葉斕斑霜落後竹枝蕭瑟渚邊頭歸逢古德方崖叟為話談𤣥舊日遊夜宿張判府環緑軒贈𤣥度戊申十月十八夜環緑軒中借榻眠舞影霜筠風細細縈窗素練月娟娟此生寄迹雁遵渚何處窮源漁刺船染筆題詩更秉燭語深香冷思凄然子章號夢庵走筆題夢庵春夢幾時醒隱約江湖且寓形愁見亂離心忽忽迹疏親友淚熒熒松陵遇我才經宿浙水歸舟且暫停蕉鹿紛紛何得失霞明煙外數峰青江上遇楊德朋吳淞江上米家船邂逅龜蒙舊宅前政似燕鴻交泛泛聊憑楮穎度年年糟牀滴雨誰沽酒破衲蒙頭獨坐禪莫學山僧空載月主人情重更留連題春山髙士圖和韻扁舟溪上數來過白髮殘春奈我何栁絮如煙迷曉浦杏花飛雪點春波林扉有客圖丘壑石室何人帶女蘿欲和華山髙隱曲羇愁悽斷不成歌過桐里依微桐里接松陵緑玉青瑶繚復縈為咏江城秋草色獨行煙渚暮鐘聲黃香宅裏留三宿甫里門前過幾程借書市藥時來往未一作不許居人識一作道姓名寄陳余二校書吳松江水碧沄沄忽憶江城一作陳余兩隱君酒艇時搖夜濤月書帷影亂晴窗雲一貧老我長為客二仲英賢已著文何事雙魚俱寂寞𤣥一作清言經嵗不相一作況不使余聞宿普度僧舍悲涼華屋總荒墟人事乖張已久如兩部草池蛙鼓吹一襟桐露鶴階除狂遊且盡餘生酒宿習猶存半舸書初日輕煙棹歌去江潭栁影亦蕭疏贈姚掾史相府共推三語掾卜居曽占九龍峰美髯不獨如靈運佳句仍兼似鮑容我有茅齊當絶壁時看晴雪落長松因君唤起故園夢仿佛三生石上逢賦居延王孫德新小隱軒志隱寧須分小大不論廛市與山林橘中之樂固不淺壺裏有春藏更深奕戲自能忘世事酒尊聊用散沖襟莘耕巗築茍無遇豈有朝堂論道心次德機韻一作賦德機荆南精舍圖溪上田園定有無愁將歸思畫成圖春林寂寂花開落風牖泠泠鬼嘯呼尚有流泉悲夜雨已荒幽徑入寒蕪何當一舉同黃鵠未覺山川路鬱紆别彥貞空齊風雨話連宵歸夢不知山水遙鶴逺城荒嗟寂寂香霏鬢影共蕭蕭市中乳虎人三語燈下寒葅酒一瓢無念百年聊樂爾海甌飛去定難招挽鶴溪張先生子述孫承久熾昌薦饑多施活人方句金壇下良常洞白鶴溪邊世夀堂孔壁遺書覘古學祗園法藏溢神光乘雲笑謝人間世九秩逍遙返帝鄉首夏即興呈貞居鵝鴨如雲散碧漪來禽青李壓低枝深林汲澗常聞虎清晝焚香獨下帷路出城東無十里燕來堂上不多時可憐稚笋都成竹忽見春蠶已吐絲寄盛髙霞不見情親踰一載素書到手淚滂沱仙人脫骨煩重瘞去鶴思歸忍再過墓左碑隨煙燼冷手栽松斷斧斤多知君欲話悲辛意慟哭爭如後會何題畫貽王光大荆南山色隱晴明暖翠當窗不用圖避世移家今十載盛書連舸泊三吳可憐畫卷撩歸夢依舊香奩傍藥爐珍重故人王架閣筆能扛鼎要人扶寄白石僦屋渝盟也任渠爭巢野鵲厭鳩居人情轉劇空懷土家具無多莫借車踽踽獨行良不易紛紛薄俗竟何如波瀾翻覆從千變道眼遐觀熱惱余送杭州謝總管南省迢遙阻北京張公開府任豪英守臣視爵等侯伯僕射親民如父兄錢廟有碑刓夜雨嶽墳無樹著秋聲好將飲食濡饑渴何待三年報政成丙午十一月十九日避泖上丁未十二月十六日始去此至陳溪分湖間矣因寫喬柯竹石并題泖渚淹留再燠寒移居何處卜林巒可憐産不能恆業聊復心隨所遇安船底流澌微淅淅葦間初日已團團故人存沒應難訪愁裏題詩强自寬寄錢伯行春雨斑斑長菊苗坐憐依砌蕙花消此時行徑泉侵溼閉户哦詩江怒濤一作動搖政爾清虛忘世傲不妨貧賤使人驕下帷寂寞錢徵士艇子看花許我邀題本中峰觀蓮像東南唱道據禪林諷咏蓮心契本心善矣不塵仍不染美哉如玉復如金三周妙法耆闍崛十大開花玉井岑今日仰師猶古佛風波回首一長吟呈良常無家已老復何歸碧樹團團尚夕暉清越風湍帝子瑟縱橫隴畝僧伽衣世波汨溺毋溷我節序炎涼且息機白鳥汀前坐來久泉侵野徑暮依微寄朱府判明月娟娟夜二更挑燈孤坐不勝情尊前舊恨多年積枕上新愁何處生已作閒雲孤鶴去不堪隨栁傍花行使君為省春田出可念憂時老釣耕清明江雲籠雨白煙生愁眼看花淚濕纓可惜紅英滿芳草又經上已復清明漂漂羈旅燕鴻迹眤眤愁思兒女情老鶴莫教塵土涴碧巗松下紫芝榮寄徐季明海虞山下徐公宅修竹長松左右栽陳榻待君時一下顧園有客莫驅回至今清夢依依在欲寄新詩草草裁自是漫郎嫌俗子也應魚石有蒼苔學書幾叢枸杞護藩籬一徑莓苔卧鹿麋獨許陶泓為密友更呼毛頴伴幽棲野鶩家雞成品第來禽青李入書題臨池自嘆清狂甚真好還同鍛栁嵇贈范壻范公文杏園西宅喧寂一塵還一作渾異宜鼓琴深林調清越讀書稚子聲唔咿簾旌不動香如霧硯席生涼雨散絲欲飲寒泉錫麓洞暫違清賞一題詩題鄧氏扇上鄧家層軒留十日陸郎酒船來百回蓴羮鱸鱠亦已甚氷甌雪碗何為哉江雲飄飄委坐席岸栁埀埀落酒杯飲酣戲寫齊紈扇山河微影月徘徊李文逺製墨次吳寅夫韻潘衡墨法老坡傳承晏昆仍又幾年獨依山室燒桐子贈與仙人寫內篇石竈霞光存活火夜帷雲影炫晴煙要知文字遺不朽猶向詩中咏墨仙贈墨生吳善吳生製墨變潘法住近義興山郭中洗玉巧當前澗水采花還覓古時桐照夜虹光燈隱壁拂雲鸞尾谷生風長年圭璧富潤屋我善養生那有窮贈墨生沈學翁沈學翁隱居吳市燒墨以自給所謂不汲汲於富貴不戚戚於貧賤者也煙細而膠清黑若點漆近世不易得矣因賦贈焉桐煙墨法後松煙妙賞坡翁已久傳麋角膠清瑩𤣥玉龍文刀利淬寒泉山廨唯珍白鵝帖雲窗誰録古苔篇愛爾治生吳市隱收煤一室數燈然四月二十八日篷屋題江湖風雨夢頻驚舟楫沿洄莫計程不幸乃今成大幸有生真亦似無生郤生自足賢賔主岑氏誰言好弟兄世故愛憎從毁譽一杯聊復暢幽情擬賦嶽鄂王墓耿耿忠名萬古留當時功業浩難收出師未久班師急相國翻為敵國謀廢壘河山猶帶憤悲風蘭蕙總驚秋異代行人一灑淚精爽依依雲氣浮一作荒墳落日重回頭再二首姦任忠誅轉謬悠鄂王固豈為身謀中興可望隳成業南渡何心報敵讐廢壘山河猶帶憤悲風蘭蕙總驚秋莫言當日民遮哭更使他年過客愁丹楓落日隱荒祠蕭瑟清秋志士悲復國豈期讒賣國出師何遽詔班師少康一旅應無計李牧多功徒爾為汨汨江流寫餘恨可憐宋祚亦終移盧公武甫當世衰道卷之際獨能學行偉然不但賢於流俗而遂已不愠人之不知嗜古金石刻辭汲汲若饑渴隱居婁江之鹿城淡泊無營若將終其身焉命豫賦鹿城隱居詩因賦避俗龎公隱鹿門鹿門靜亦絶塵喧釣緣水北菰蒲渚窗俯江南桑柘村書蠧字殘翻汗簡石魚名古刻窪尊地偏舟楫稀來往獨有煙潮到岸痕和甘白先生樂圃林居二首甲寅六月五日關關幽鳥緑隂濃林塢陂池曲曲通荷雨逗涼侵北牖汀雲度水迅南風清琴詠雅寧諧俗濁酒攻愁似有功聞道秋來偏起蚤一簾晨露引髙桐竹裏齊厨栁下渠幽林風景自應殊家無甔石惟憂道鄰斷炊煙急索租山水巍蕩聊足樂雨雲翻覆豈吾徒蘧蘧栩栩天涯夢楚水湘雲呌鷓鴣十六日夜聽甘白彈琴漙漙夕露淨衣巾虛牖琴聲向夜分變雅變風由正始江濤江雨洗炎氛煙中雉雊登春木石上猿吟隔嶺雲山意寂寥知者少匣藏無使世人聞二十八日又一首白蘋風起日初沉露坐鳴琴望碧岑七月炎歊已流火一聲氷玉落空林平沙幽結嬋娟恨飛佩空遺縹眇音清景娛人羣動寂冷然真足洗豫心貞夀堂為吳縣尹楊彞作貞夀堂前風日遲天夭寸草答春暉兒兮事育心無怍母氏康寧志不違後日腰懸季子印只今身著老萊衣熙然鶴髮照緑酒金鴨火溫香靄微因儒者董惟明至荆溪輒寫贈别士元鄉契一詩以呈崖翁知己承數念及恐欲知近况何如耳古德乖違已數年相逢吳苑話迍邅木魚晨粥同僧赴仙掌春茶破悶煎採藥童歸隨貿市眠松老鶴伴棲禪語離更問余何適思屬江雲浦月邉兩往候見皆不得面賦此奉寄以寫我心須稍涼再謁耳瓚上惟寅髙士兩到幽居不一逢青苔行徑白雲封敲門自看池上竹悲嘯更倚風前松足疲塵土三伏日思屬雲屏九疊峰解帶牆隂憩孤寂暮歸林下已鳴鐘野舟西堂吾鄉之英才也辛酉冬仲邂逅於簡村蘭若為寫江山夕照圖并詩以贈野舟又號牧菴故云耳鵬摶鯤化未逍遙大吕黃鐘久寂寥燕處丘園真足樂貪愚海賈定難招能禪豈復沉空寂善牧寧當犯稼苗逢著吾鄉閒老子地爐連榻話連宵題陳虛碧畫虛碧真人物外遊尚餘遺跡雪鴻洲城荒鶴怨無窮恨雨駭風驚滿眼愁紅樹青山棲石馬碧花翠蔓引牽牛我來仿佛三千嵗清淺蓬萊幾度秋八月二日雨涼寄道翁親契飄颻江雨沃秋陽戢翼幽禽葉底涼庭砌苔滋連竹淨陂塘荷氣勝花香結茅何處足松水歸夢逺林餘澗岡惆悵同心阻攜手掩扉山室聽鳴螿留别道翁二首一室蕭閒無市聲浦雲沙鳥到階庭朋來直諒惟三益心醉離騷與六經曠世有懷頭已白經年不見眼猶青江村又作思君夢睡起長吟月滿汀緑雲幽思接飛猱與子乖邊更鬱陶門掩候蟲秋寂寂窗明風栁夕騷騷滄江波外孤帆舉太華峰顛一凖髙歸去青苔黃葉落托鄰樵牧共遊遨題顧定之為周正道寫篔簹圖蕭蕭瑟瑟一林風寫與城東拙逸翁石室先生仙去逺虎頭孫子獨稱雄霜毫淡墨隂晴外曙月寒窗夢寐中對月懷人一悲慨雪泥蹤跡似飛鴻和拙逸翁謝惠紙扇之作楮箑輕於一葉桐凄凄懷袖灑溪風吟搖楊栁春煙緑醉障荷花落日紅疑是片雲飛忽墮修成寶月樣偏同美人半掩歌唇小翠黛清眸莫惱公次拙逸叟立春韻雪泥縱跡歎飛鴻逐逐馬牛千里風去日年光悲少壯中星時節自西東園梅破臘花渾白詩老逢春語更工獨有無家霜鬢客寒㕔咄咄坐書空題周遜學天香深處卷城柝啼烏風滿裳月明琪樹影侵牆霏微露下琴尊淨鬱勃胸中書傳香山隔浦城迷去雁草荒吳苑泣寒螿黃雲堆徑無行跡幽思迢迢夢故鄉次遜學道經錫麓懷外家韻九龍峰色葉蒼茫雲卧西溪夢洛陽鴻漸草堂泉石在春申祠宇草苔荒千年仁術傳鄒孟萬里風煙壯帝鄉欲覓外家成惆望船窗風雨灑微涼一菴大士舊雖識未深相知庚子二月十四日復訪之於夀明即留三宿挹其風標聽其言論始知古德師也余恐其慈忍拯溺之心過甚未即深僻幽閒之地乃寫竹稍并賦以撼之云爾十六日懶瓚和南夀明寺裏連宵話震澤汀前永日留雨葉風梢愁寂寂陶泓毛頴思悠悠蓬萊莫道仙人逺兜率還同大士遊乞子玉窗清鳯尾能從歸掃白雲不壬子正月草三日邂逅芝年講主於婁江朱氏之芥舟軒中芝年熟天台三教旨嚴菩薩之戒儀七遮既淨一乘斯悟與語久之斂袵敬歎因寫圖賦詩以贈優鉢曇花不世開道人定起北巖隈逺山迢遞窗中緑埀栁低昻水次栽丈室淨名禪不二三生圜澤夢應回閒雲野鶴時相遇草草新詩為爾裁七月六日雨宿雲岫幽居文伯賢郎以紙索畫因寫秋亭嘉樹圗并詩以贈風雨蕭條晚作涼兩株嘉樹近南窗結廬人境無來轍寓跡醉鄉真樂邦南渚殘雲宿虛牖西山清影落秋江臨流染翰摹幽意忽有衝煙白鶴雙留别勝伯徵君清修卓行虞徵士食粥三年致母喪詩法道園能入室畫傳洪谷早升堂獨髙落落松筠節不逐悠悠鵷鷺行此日别君江海去波光鷗影思微茫寄惟允我别陳公才五霜未應髮白視茫茫句哦夜雨懷無己冠著方山似季常夏沼己浮蓮蕊碧春衣猶怯樹隂涼久知服食清虛甚更試山翁煮石方題安處齊湖上齊居外史家淡煙疏栁望中賒安時為善年年樂處士謀身事事佳竹葉夜香缸靣酒菊苗春點磨頭茶幽棲不作紅塵客遮莫寒江捲浪花送虞勝伯之雲間求先世遺書虞勝伯徵君隱居行義家甫里埀二十年不以姓名求知於時之聞人道園先生其從叔祖也先世雍公遺文道園先生欲求而不可得勝伯必欲以意購取之可謂有志而不忘其所自矣聞此書藏松江俞子中推官宅推官沒已久而子俊州尹其弟能假以歸勝伯非仁人義士之存心乎州尹吾故人也因書以為之請陶蓬大尹見之當有以教我也州谷沄沄逝水波雍公勛業未消磨况當異代求文字尚有聞孫校舛訛京國不聞收汗馬草萊終見沒銅駝誰陳聖主賢臣頌奈爾隂山敕勒歌上平章班師金章紫綬出南荒戎馬旌旗擁道傍奇計素聞陳曲逆元勳今見郭汾陽國風自古周南盛天運由來漢道昌妖賊己隨征戰盡早歸丹闕奉清光次韻畣陳叔方早春見懷二首隔江山翠晚依微隱映江邊白板扉事往依依驚嵗改老來念念覺前非己看庭草侵行徑漸有汀花拂釣磯慚愧詩篇慰幽獨白頭從此莫乖違清夜哦詩手自書也應把燭倩官奴瘦牛犖確荒田隴肥馬蹣跚笑瓠壺且釀松花江水碧更分煎术嶺雲腴人間誰覓𤣥真子春雨扁舟釣緑蒲贈周校書中元習靜松江渚回首塵埃多厚顔富貴不如長處賤奔馳何似得心閒參天竹樹存真碧動地波瀾任往還輸與金溪周處士避人探道掩松關西神仙行載錫山志昔在九龍雲霧中泉邊蠟屐遍行踪南樓明月看時好西澗故人行處逢亂後不聽驚鶴錫夢回猶憶下堂鐘休兵即欲幽棲去見說禪房膝可容送朱善良之子才華足起豫迥如明月麗清渠方誇道韞哦春雪已見梁鴻挽鹿車榕葉擁崖山店逺海濤喧枕夜城虛明年好鼓澄江柁歸奉江波雙鯉魚老唐有詩見寄謂冷淡無錢覓即欲返棹豈知不冷淡而冷淡中有溫甘者存焉春風春雨不勝寒江路無泥雨即乾千樹梅花明屋裏一痕山翠出林端髙情不許庸人識俗眼何從妙畫看若對陶公談世利唐翁可謂沐猴冠易尚賢赴鮑郎場司丞次王叔明韻江山寥落白雲飛城郭煙濤獨鶴歸碧落輕帆來縹眇夕陽逺樹見依微熬波霜雪良艱苦富國魚鹽果是非猶歎蝸牛廬底客焜黃時節尚絺衣白馬寺通長老修圓覺期化緣惠逺深心白蓮社湯休麗句碧雲篇懴摩不懈香燈供般若仍通文字禪雨後春池芹細細月明寒渚竹娟娟東林門外聞鐘返惟有陶公妙入𤣥至正九年八月十六日計籌山吕尊師訪豫蕭閒館為豫言顧仲瑛徵君玉山隱居之勝輒想象賦長句以寄他日尚同袁南宫攜琴嘯咏竹間也解道玉山佳絶處山中惟有吕尊師己招一鶴來庭樹更養羣鵝戲墨池松風自奏無弦曲桐葉新題寄逺詩若許王猷性狂僻徑來看竹到階墀别章鍊師方舟共濟春江濶訪我寒煙菰葦中鼓柁斜衝薲葉雨鈎簾半怯杏花風仙人壇上芝應碧玉女窗前桃未紅擬趂輕帆數來往縹壺不惜酒如空送盛道士遊越浙東山水隔層雲雪霽千峰曉不分蕭瑟松林疑鶴語縱橫苔石見羊羣昔聞陽洞啓神祕中有仙人留玉文羡爾尋真不辭逺好隨煙霧挹飛裙送元白上人住中竺求法髙僧何處去向中天竺最髙峰飛鳶欲沒天低樹杖錫應投湖外鐘半席白雲臨碧澗四更落月掛長松定回依約三千嵗若見拈花紹逺宗因吳國良過玉山草堂賦詩奉寄玉山樹色隱朝陽更著魚莊近草堂何處唱歌聲欵乃隔雲濯足向滄浪珍羞每送青絲絡佳句多投古錦囊幾問掉船尋好事辟疆園圃定非常昔張外史有古銅洗種小蕉白石上置洗中名之曰蕉池積雪軒西園老人追和張劉二君詩書掛軒中余亦為之次韻雪中芭蕉見圗畫蕉池積雪終凋零風翻窗裏浪花白雨壓牀頭雲葉青詩人超軼有逺思造物變幻難逃形爾亦林居喜幽事曉浥石溜攜銅瓶題良夫遂幽軒來訪幽居秋滿林塵喧暫可散煩襟風回研沼搖山影夜靜寒蛩和客吟危磴白雲侵野屐高桐清露濕窗琴蕭然不作人間夢老鶴眠松萬里心贈茅山陳太虛三茒山色隱晴空君住華陽第幾峰隂澗石梁懸螮蝀曉窗雲氣結芙蓉南遊白拂凝塵久西去青牛何處逢嵗晚棲息足松水遲豫飛屩往相從題朱澤民為良夫作耕漁軒圖寂寂溪山面碧湖輕舟煙雨釣菰蒲曉耕巗際看雲起夕偃林間到日晡漢書自可掛牛角阮杖何妨挑酒壺江稻西風鱸鱠美依依蓐食待樵蘇和正道哭外孫張汶二首幼能為學日劬書一病兼旬遂隕軀已怪飛來坐隅鵩俄驚斃此渥窪駒窗閒夜雨青燈曉庭下微霜碧樹枮谷鳥呼兒聲慘惻傷心慈母體為痡富貴夀夭柄誰操造物無情偶自遭病葉辭柯驚宿雨殘燈照室斂餘膏外翁攜幼情如失慈母思兒夢亦勞忍聽風前泣幽咽城樓吹角月當壕送賴善卿采詩陳詩昔在周盛日刪詩已是衰周餘祖述孰能加四始研窮我已後諸儒嗟子用意亦勤厚聽音知政非迂疏願排閶闔獻采録坐變四海如唐虞題本立中上人雲山望松圖西望雲山何處亭鶴歸松栝秋冥冥上人不廢蓼莪句山室長書貝葉經未應佛法外孝弟定感仙手鐫碑銘過家上冢世代隔慟哭亭前蘿月青次孟辨見寄兼柬立中藴中二大士江水空青好卜居㑹衝春雨過平湖雲山欲覓無聲句花果誇傳沒骨圖莫倚陸機曾入洛最憐張翰獨思吳本瓊二士平安否應共清吟對酒壺贈述首座述也嘗為第一座袈裟曽染苾芻尼烏鳶翔舞隨施食龍象森嚴聽白椎歸錫湖崩沙際路晨餐笋茁岸邊籬何當就子西汀樹著我輕舟一暫維九日田舍小酌身世浮沉如漏舟師亡道喪獨悲秋蛩寒尚復吟秋草狐死猶能正首丘强理篋書聊自慰急呼家釀與澆愁不堪萸菊生佳色悵望雲山憶勝遊和默菴遊林屋二首聞道尋真林屋洞歸來笠澤路應賒未須敕賜鑑湖水所憶傳經許掾家蒸术煙侵雲去逸歸樵路逼澗崩斜只恐武陵迷去向移船處處遍桃花君向山中餌絳霞行徑丘壑路忘賒仙公久住金庭館祕訣應留玉斧家湖上帆將青影度煙中鳥趂夕陽斜亦欲維舟候春水華林相約采松花題竹歎息真成汗漫遊經春歷夏又嗟秋林居已是能鳴士顧我寧非不繫舟江渚出吟聊自適竹梢清淚浩難收王孫莫道歸來好芳草天涯恨未休三月草日遊海雲蘭若寫竹石古槎春盡湖濱偶獨來髙僧煮茗話和諧鳥啼花落忽如夢水影苔文渾上階坐咏逺遊悲世慮閒將曠達遣愁懷竹林生筍還相别人事暌離亦易乖十三日晚步良輔南園晚步南園秋滿林蒼茫斜日一登臨清池風度搖山影隂砌蛩悲和客吟窗下玉琴桐露濕竹間幽徑野泉侵雲樓不作人間夢白鶴眠松萬里心次薩天錫韻寄張外史谷口路微山木合濕衣空翠不曾晴饑猿扳檻為人立寒犬號林如豹聲小閣秋清聽雨卧長林日出採芝行道心得失已無夢沐髮朝真候五更附録次韻闕名梁溪嵗莫若為情溪上梅花待雨晴徑雪曉埋山屐齒簷氷夜墮石牀聲內篇持向松根讀如意攜將竹裏行短晷何能理幽事南窗剪燭話寒更寄鄭徵士谷口子真今最賢久别鬱鬱夢相牽好營秫田多釀酒欲買茅屋尚無錢兄病每書賒藥券客來唯候煮茶煙闔閭城東有艇子憶爾青燈相對眠附次韵鄭元祐穴培薜荔根株懸倒架葡萄藤蔓牽非無洛下先生屋須待卭州録事錢鴻雁天髙青不雨鶺鴒沙暖白生煙松雲隱屋結構未何日書來解榻眠又張天雨衣桁常容蛛網懸石牀渾讓女蘿牽道術何煩孔郎廟屋廬政用郤超錢泉崩澗底歸樵路雨壓厨頭蒸术煙誰見西林拆書夜一枝風竹鵓鳩眠和朱秉中三首鳥啼花落水西潯幾日門前春水深避世何心歌白石論交原不在黃金樗散餘年猶嗜酒夢回逺道獨驚心桃源亦有秦人在落日漁舟何處尋僦居茅屋碧江潯花落空階一尺深山簡由來狂愛酒管寧不復顧鋤金長鯨吸浪成何事老鶴鳴臯見逺心中嵗畏從親友别自憐黃一作華髮已侵尋白板扉開江水潯雨餘階下緑苔深愚人自寶應非石同舍緣知不盜金天地瘡痍誰復憫江湖羈旅我同心故山日月生歸夢翠竹青松自百尋彥楨繼和復答二首風生水國晝多隂錯莫遲回意自深鮑叔今封馬鬛塜鍾期誰範裊蹄金一官政不為人役七字真能慰我心乳燕鳴鳩更無賴片時春夢不堪尋鳥啼花落水西潯春水侵門雨尚深丈室自寬千户邑一經已富滿籯金殘年樗散仍憂國短髮絲埀獨苦心可似桃源潔身去漁舟何處得重尋寄德朋故人欲問梁鴻宅遺跡猶應杵臼存楓葉菊花秋瑟瑟荒園廢圃雨昏昏農人掩舍春明墅縣吏催租夜打門惟有德朋多逺思賦詩刻燭酒重溫贈楊大同石魚峰下子危子出有楊羲陪勝遊斜日碧山梁苑暮清風白拂冶亭秋松肪和飲三危露桂棹同乘萬里流擬酌春醪相慰藉梅花欲發聽鳴騶題枯木竹石益公以道不見忽忽七改年矣辛亥七月余來自苕溪偶遇松陵之桐里雙井院數日矣以道因過慧日懴堂邂逅一見因寫竹樹小山并賦詩寄意云一笑相逢豈有期因懷西崦話移時李公堂裏頻曽宿一作祠畔空餘月陸子泉頭舊有詩旅思凄凄非中酒人情落落似殘棋雲濤眼底三生夢鷗影秋汀又語離以道因詠余舊時春日試筆一首今三十年矣併書畫上是日秋水性源二上人同集喜看新酒似鵝黃已有春風拂草堂二月江南初破栁扁舟晚下獨鳴榔苔生不礙山人屐花發應連野老牆世外寧辭一作美酒己拚千日醉未容人事惱年光一作莫將時事攪愁腸次韵叔勝先生七言一首録呈伏冀賜教朱弦流水寫徽音古意寥寥何處尋道力己消金礦淨禪那曽住嶺雲深毁譽不礙逍遙樂懲窒應無忿欲心說與先生惆悵恨牛山何日見成林瓚比三兩月方為義士之賢子與二三名勝作為文辭以頌述其德美且預為挽詩弔文之類家傳而户習或有每夜醉咏一過大笑而登牀者獨先生不隨流俗哀哀耳如何如何故賦此以發一笑云乞於韻㑹中檢尋􅓨字一觀明日即納還也匆匆不具瓚啓上重改次韻奉答朱弦流水寫徽音古意蕭寥尚可尋道業已消金礦淨禪那曽住嶺雲深猿猱騰攫初何怪風雨飄搖不動心笑爾自戕成濯濯牛山何日見喬林此間俊秀子弟習尚不佳為二三不孝義無亷恥之徒誘引而喪其良心以不孝悌為當為以講論是非毁謗輕薄為政事蘭蕙而尚化為茅况中人之才者乎先生以為何如良心淪亡糞壤何異是可哀也十三日瓚啓上洪武甲寅中秋夜寓姻鄒氏病中咏懷經旬卧病掩山扉巗穴潛神似伏龜身世浮雲度流水生涯煮豆燃枯萁紅蠡捲碧應無分白髮悲秋不自支莫負尊前今夜月長吟桂影一伸眉壬子七月一日留昌言髙尚書堂寫圖賦贈下有陽文雲林子印此畫藏項𤣥海家七月一日風雨集桐里湖邊吹夕涼栁葉顰烟籠翡翠荷花濺淚濕鴛鴦却疑身在瀟湘渚且著舟停雲錦鄉顧我自非徐孺子陳蕃下榻更銜觴贈别宋君仲溫有序至正乙巳三月草四日仲溫髙士與沈文舉共載訪余笠澤東渚之蝸牛廬中相從過王明宅煮茶留坐遂以永日吹笙鼓琴於水光林影間但恨吾子儀逺在數十里外不得同此集也草五日仲溫别余他之漫成長句以寫余懷三月將闌春欲夏循簷共看辛夷花階前瀹茗香照色坐上吹笙清不譁住杖偶過公子宅班荆宛似山人家宋玉才情何可得肯拋塵土踏江沙清閟閣全集卷六
