body:
  text: 清閟閣全集卷五元倪瓚撰七言律詩送倪中愷入都酌酒送君遊上京風帆回首闔閭城煙消南國梅花發冰泮長河春水生太史奏雲龍五色伶倫吹律鳯雙鳴仰觀禮樂夔龍盛好播聲詩頌治平送張外史還山道士朝乘白鶴還樓臺金碧鎖空山半天花雨飛幢節萬壑松風雜佩環丹井夜寒光剡剡石壇春靜蘚斑斑飄然便擬從君隱分我玄洲一半間别姚子章都事不見高人十五年相看兩鬢各皤然酒溫鶯語煩三請椹熟蠶筐已四眠舞袖醉僛明月下歸心飛度白鷗前練溪倘見韓徵士好示新圖竹色娟送徐子素山館留君才一月梅花無數倚霜晴埀簾幽閣團雲影貯火茶爐作雨聲深竹每容馴鹿卧青山時與道人行歸舟載得梁溪雪惆悵鄰雞月四更送張鍊師遊七閩高士不羈如野鶴忽思閩海重經過舟前春水他鄉逺雪後晴山何處多觳觫卧雲芳草細鈎輈啼樹野煙和武陵九曲最清絶落日采蘋聞棹歌聽秋軒聽秋軒裏聽秋雨定起山僧坐翠微隱隱煙濤搖夜席濛濛花雨著人衣驟如崖瀑衝雲落婉似湘靈鼓瑟希六用根塵今已淨松篁隂下共香霏晨起一首寄丹丘竹窗晨起聞幽鳥深巷絶無車馬喧多病相如一作馬卿非不遇歸田靖節一作陶令自忘言牆隂薯蕷苗方茁雨裏櫻桃花正繁二月冥寒少晴日漸一作坐看春水上柴門次錢思復見貽韻文章傳法似傳燈治病宜求三折肱退食君休大槐國安居我學小乘僧業勤已有朋來樂步闊能無祖武繩欲挈一壺相慰藉春船月色待君乘東林隱所寄陸徵士巖扉桃李晝隂隂耕鑿居人有逺心一夜池塘春草緑孤村風雨落花深不嗔野老羣爭席時有遊魚出聽琴白髮多情陸徵士松間石上續幽吟失鶴啄粟巢松泰華峰直將天地作樊籠不聞丁令歸華表應馭王喬入太空行迹縱橫苔石上寒棲依舊竹林中清齋我亦厭腥腐遐舉一作長歎思乘萬里風北里舍北舍南來往少自無人覔野夫家鳩鳴桑上還催種人語煙中始焙茶池水雲龍芳草氣井牀露淨碧桐花練一作綀衣挂石生幽夢睡起行吟到日斜山園春水鳬鷖野外堂山園細路橘花香棲棲身世書盈篋漠漠風煙酒一觴豈謂任真無禮法也須從俗著冠裳不營産業人應笑竹木栽培一作竹本桃栽已就行林下遣興眼見藤稍已過牆手拈書卷復堆牀間臨水檻親魚鳥欲出柴門畏虎狼冠製不嫌龜殼小衣裾新翦鶴翎長從來任拙唯疏懶一月秋隂不下堂春日閉門積雨生幽草歎息櫻桃爛漫開春淺不知寒食近水深唯有白鷗來即看埀栁侵磯石已有飛花拂酒杯今日新晴見山色還須拄杖踏蒼苔林下林深何處尋行徑披草時過野老家練練澄波晴偃月蜿蜿小塢曲藏蛇孤帆賣藥來勾曲獨木為橋似若耶高卧閉門成懶癖蒼苔從滿石樽窪二月十日玄文館聽雨卧聽夜雨鳴高屋忽憶陂塘春水生何意逺林飢獨鶴若為幽谷滯流鶯成叢枸杞還堪采滿樹櫻桃空復情二月江頭風浪急無機鷗鳥亦頻驚對雨寄張伯雨把酒獨臨溪上雨林深地僻少相過忽興天際真人想欲乞山隂道士鵝坐久苔花一作研苔侵袖碧書成簷溜沒階多悠然靜寄東軒下日暮徘徊聊短歌次陳子貞見示韻漠漠寒煙墟落際猶餘凍雪鎖荒榛行隨雲谷采樵者飯供松龕學道人未必杜陵渾懶慢可憐逸少轉清真酒船好繫一作纜溪頭石花鳥相娛行及春次韻答郯九成見寄郭外青山舊結廬微茫野徑望中無殘生竟抱煙霞癖好事猶傳海嶽圖夜壁松風懸雅樂秋池菊水酌商觚倘從世外求玄賞好趂輕舟看釣鱸一作浴鳬和虞學士寄張外史韻華陽上館誰曾到知有高人避世深當户春雲團紫蓋洗空花雨散青林丹臺篆迹龍蛇動經閣松聲鸞鶴吟念子離居消息逺幾將書札寄遙岑再用韻外史棲真何處尋桐花源上草苔深星壇醮後雲封徑仙驥歸來風滿林丹竈石幢遺往迹寒松流水續幽吟虞君傳世琅玕句千古清標寄石岑一作虞書傳寶人間世為有清詩寄璧岑贈張景昭君能不負白綸巾一作張卿自道古遺民世外尋真狎隱淪虛閣松聲答笙磬小山桂樹絶風塵晨朝絳闕存三景夜掃青壇禮七真每御天風自來去凌虛好是鶴為身一作末俗頑仙非所取清年如子不多人送章鍊師入京五鶴翩翩朝帝京青童遙侍玉宸一作皇君倚天樓觀金銀氣蔽日旌旗錦繡文夜禮洞庭薦明水春陪遊輦望祥雲何人得似愚溪子高舉凌風思不羣與伯雨登溪山勝概樓樓下清溪夏亦寒溪頭箇箇白鷗間風回緑卷平堤水林缺青分隔岸山若士振衣千仞表何人泛宅五湖間絶憐與子同清賞擬向雲霄共往還送張貞居遊靈常洞兼簡王晉齋荆溪山水閟靈宫子晉笙鸞駐碧峰午夜月明風滿帳千崖人靜鶴眠松緣知瑶草春來長應有仙人洞口逢莫為青螺翁久住歸時騎取葛陂龍過許生茅屋看竹舟過山西已夕曛許生茅屋逺人羣鑿池數尺通野水開牖一規留白雲煮藥煙輕衝竈出碓茶聲逺隔溪聞可憐也有王猷興階下新移共此君答王彞齋客居北渚靜窺臨霜藻蕭蕭雪滿簪玉石在山聊混璞金蘭惟子久同心每懷往事悲今事莫棄分隂惜寸隂自笑蝸廬無長物窗前陶器與單衾長至後十日蓋十一月十日也獲與德機伯昻二高尚書堇伯兖二賢良共咏彞齋有道先生見貽佳製絶歎敦厚優柔得唐人句法宋諸老性情也張高尚命即次韻奉和書紙尾所謂以狗尾續貂多見其不知量也恕之幸甚是嵗乙巳倪瓚再拜八月草三日留南宫嶽山人飲明日嶽山人過玉山南宫老矣不知復幾聚首觀花聽琴情不能堪因賦兼柬玉山芙蓉著花已爛漫濁酒彈琴聊少停數聲别鵠隔江渚一醉秋風空玉瓶況當賓客欲行邁忍使風雨即飄零攀條掇英重惆悵但願花下長不醒在同里懷元用一水東西雲窈窕幾家楊栁木芙蓉齋居幽閴無人到屐齒經行破蘚封密竹窗虛秋半雨叢一作楓林寺逺日沈鐘寄詩為道長相憶欲話離愁何日逢一作想亦依依念去蹤寄王成夫茂深閉閣獨焚香那識窮愁客異鄉坐拂朱絃彈緑水狂攜紅袖浹清觴春池雨後泉應滿庭樹雲移影更長月燭露帷非豫樂五湖煙景屬漁郎乙未嵗余年適五十幼志於學皓首無成因誦昔人知非之言慨然永歎賦此隂風二月栁依依隱映湖南白板扉旅泊無成還自笑吾生如寄欲何歸美人竟與春鴻逺短髮忽如霜草一作藻稀五十知非良有以重嗟學與寸心違三月草二日雨懷荆溪勝遊寄原道我昔繫舟尋杜牧荆溪流水落山一作川光春茶已放仙人掌露蘚渾侵玉女牀酒闌更踏花間月舞罷猶彈陌上桑此日狂遊忘旦暮十年回首意茫茫贈張玄度時方喪內吳松江水似荆溪九點煙嵐落日西寂寂郊園寒食過蕭蕭風雨竹雞啼蕙花委砌心應折芳草歸途意轉迷曾得魯連消息否春潮隨雨到長堤上巳石梁破屋路欹斜僻似華陽道士家漠漠春雲飛别鶴潺潺夜雨雜鳴蛙間看稚子翻書葉時有鄰翁汲井花日暮傷心江水緑共舟人已躡飛霞題張以中野亭人境曠無車馬雜軒楹只在第三橋開門草色侵書幌隔水松聲和玉簫一榻雲山供夏簟滿江煙雨看春潮君能擷取飛霞佩天際真人近可招送德常同知聞道之官嘉定去載書連舸泊江濆城樓近瞰吳松月候館微霑滄海雲宓子風流常宰邑張翰識達更能文亦欲東觀釣鯨手棹歌秋趂白鷗羣贈君震逺愛尋山復好仙鶴歸城郭幾何年靈芝每掇巖前秀祕訣還從肘後懸松月半空埀羽蓋風湍一壑寫鵾絃擬開精舍當飛瀑一作懸溜與爾棲遲日論玄一作唯爾丹陽許叔玄江上作一作贈友生江頭二月雨埀埀起濯塵纓水滿池賀監宅前重載酒辟疆園裏更題詩川途幽邈鴻歸逺窗户虛寒燕到遲忽見故人王架閣夜闌秉燭話余思燕吳氏樓居雲松之樓高入雲風起松濤一作松頂松聲十里聞瓊杯綺食行春雨翠幔朱簾捲夕曛宴遊適當山擁榻醉卧莫遣人書裙西飛白鶴東歸去回首巢居謝俗氛九日自歎不能孤九日一壺濁酒對西山遙憐玉樹秋風裏靜看冥鴻落照間草木蕭蕭雲更碧山川漠漠鳥飛還長途誰是陶彭澤被褐行吟意自間懷歸載都玄敬先生詩話久客懷歸思惘然松間茆屋女蘿牽三杯桃李春風酒一榻菰蒲夜雨船鴻迹偶曾留雪渚鶴情原只在芝田他鄉未若還家樂緑樹年年叫杜鵑雪後過陳子貞隱居陶公卜宅南村裏快雪初晴思一遊樹辨微茫來獨鶴櫓搖欹側散輕鷗墨池繞溜春氷滿塵榻翻書夕照收相見惘然如有失棹頭吟咏出林丘贈友開元道士來相訪索寫雲林春霽圖别我梁溪已二載去濯滄浪遍五湖滿目波容醮山黛撩人栁眼亂花鬚避喧正欲尋耕釣源上桃花無處無荆溪即事銅官之山溪水南周處廟前多夕嵐看卷雲帆歌白紵勸嘗春酒破黃柑長林獨往誰能覔幽事相關性所耽苦欲避喧那畏虎倘從地主結松龕顧仲贄過訪聞徐生病瘥室裏維摩病已瘳竹爐藥鼎雨聲秋一畦杞菊為供具滿壁江山入卧遊舟外鷗波情浩蕩窗間蝶夢思綢繆虎頭癡絶從談謔煮茗聊為半日留雨後雨後階一作循除泉亂流落花時節緑隂稠石尊貯酒供杯飲素壁圖書入卧遊翳日長林藏伏虎際天春水浴輕鷗幽居四月饒櫻笋醉裏題詩一散愁次柯博士寺壁題韻初月五日春意動逺水蕩漾情如何鏡中羞見白髮短栁上愁看青眼多起拂緑琴歌楚調為留明月挂松蘿弭棹溪南一杯酒他年浪迹倘重過吳門賦謝陸繼之黃柑紫蟹之貺闔閭城外皆春水斜日維舟方醉眠攜手故人驚夢裏送書飛雁落樽前黃柑開裹煩相贈紫蟹傾筐也可憐憶爾獨居湖上宅晴窗奇石翠生煙送甘允從來尋墨沼雲林下共愛女蘿懸石牀喚人鸚鵡語猶澀當戶枇杷子半黃霜一作奉橘定應題百顆籠鵝即欲寫千行蘭亭書法人間少好去山隂覔野航鶴溪為張天民賦西溪松影高千尺白鶴時時眠上頭風雨不驚鷗鷺宿雲霄應與鳯鸞遊明窗筆格珊瑚樹新釀松花瑪瑙甌露下鳴臯聲徹逺幽人空谷獨相求悼頂山清上人杯渡前溪見水源偶來佩芷服蘭蓀香臺猶帶山窗影經卷長依松樹根雲起晴峰還有觸雪消春野不留痕翛然我已忘言説翠竹黃花自滿園送貞居還山日暮書傳青鳥使華林瑶草待君歸挾舟婉婉雙龍出背雨寥寥一鶴飛秋水琢成蒼玉佩朝霞補作紫綃一作煙衣山中長史來相覔應借窗間白羽揮寄貞居及栁太常鄭有道次前韻華陽外史從幽討谷口高人亦賦歸遙憶愚溪對山坐何時菌閣看鴻飛荒荒旭日晞玄髮潏潏流泉浣素衣寂寞松窗懸榻處塵生麈尾不堪揮寄王叔明幾夢山隂王右軍筆精墨妙最能文每將竹影撫秋月更愛巖一作山居寫白雲祕笈封題饒古迹幽襟一作雅懷蕭散逸人羣今年七夕聞多事曝畫翻書到夕曛薩仲明為丞相府掾時僦居京師名其軒曰半野後買宅延陵亦揭是名於軒因信宿軒中賦此贈之何意開軒名半野身存魏闕思江湖斜侵瓜圃通花藥稍傍薇垣近竹梧千里秋風催斫鱠九霄晨露浥飛鳬如今别買荒城宅自掃楓林候野夫送寶南琛往住荆溪碧雲寺兼柬方崖碧雲林壑杳重重此去風流似簡公舂藥碓間湍激下空山蛩響月明中結茆擬候芝三秀眠鹿應遺地一弓聞道重居開竹牖待豫艇子過溪東八月三日與劉道益連牀夜話風雨凄然五日開霽道益賦詩見貽次韻一首扁舟小泊菰蒲雨玄論都消身意塵空寂室中無侍者蕭條雲外不羈人酒杯畏病不復舉燈火新涼差可親嫋嫋秋風振庭樹緑波芳草似初春别張玄度歸去荆溪丘壑多松陵浦口復來過清風明月許玄度泛宅浮家張志和夜雨燈檠歌陸續秋林樹子落桫欏相逢相别嗟遲莫人事多乖奈若何送張以中由宜興歸金壇亂後歸來事事非子長遊歷壯心違陶公館裏懷仙友杜牧堤邊戀落暉松下白雲初起石草間夕露已沾衣君今尚有歸耕地顧我將從何處歸甘允從來過溪上將還汝寧賦此奉送野夫住近青山郭左右雲林無市聲忽有故人騎馬至即呼稚子出門迎虛窗圖史少開笈細雨滄浪同濯纓乍别林居無所賴裁詩相憶字欹傾奉和虞學士賦上清劉真人畫像二首君向積金峰頂住長年高卧聽松風蓬萊雲近瞻天闕劒佩春明下漢宫歸去長謡紫芝曲翩然逺挹黃睂翁標名合在諸天上何事置身巖壑中焚香坐石孤峰月飛珮朝天萬壑風邈爾空歌傳碧落飄然流響振金宫神君教服玄霜劑聖主能延緑髮翁共道乘鸞去無迹祥雲繚繞畫圖中寄養正得君佳句清如玉秋色驚人換物華老境侵尋真有感故園隔絶更興嗟女蘿緑遍縈一作牽茅屋烏桕紅明映落霞欲酌一樽澆磊塊幾時邀子過田家送僧遊天台四明山水名天下師去那知客路遙雪霽驚麕騰宿莽月明寒鵲集疏條坐尋雲頂千峰石歸趂江頭八月潮寄語一作説與山中光老子送賓也合過溪橋送諸從事之越中郡廳草色映青衫從事風流雪滿簪最愛長官能化俗因知僚佐願停驂右軍宅裏尋苔石賀監湖邊咏夕嵐他日從君覔佳果來禽青李不須函贈嶽松澗曾訪神仙五粒松澗泉流潤白雲封林間蘿蔦交青蔓一作影水畔一作石上菖蒲開紫茸煮石有方留祕訣采芝何處覔行蹤嶽君别我三千嵗晚戲滄洲得再一作又汝逢答邵生已從鷗鳥狎雲深老我無機似漢隂采采菊花猶滿地蕭蕭霜髮不勝簪南遊阻絶傷多壘北望艱危折寸心好在吳松江水上青猿啼處有楓林逢張玄度一年不見張玄度秋夜吳城忽爾逢清似石湖梅上月瘦於廬埠瀑邊松白冠緇布前朝服短髮長齋舊日容昔者交朋淪落盡及時一作埋憂為樂且相從寄熙本明二首在山無事入城中每問歸樵得信通松室夜燈禪影瘦石潭秋水道心空幽扉獨掩林間雨疏磬遙傳谷口風幾度行吟欲相覔亂流深澗隔西東白首遙知得道餘不聞詩思近何如高齋夜雪同誰話古木寒山獨自居夢裏只尋行去路愁時聊讀寄來書夕陽溪上多飛鳥若箇能看影是虛寄錢伯行斑斑苔砌蕙花消忽憶美人山水遙夢得池塘春草句望殘煙日晚江潮汀雲沙鳥時同宿野飯芹羮或見招灑掃南湖石上月為留清影醉吹簫居竹軒翠竹如雲江水春結茅依竹住江濱階前迸笋從侵徑雨後埀隂欲覆鄰映葉黃鸝還自語傍人白鶴亦能馴遙知靜者忘聲色滿屋清風未覺貧送祖芳二上人參禮育王寺光公四明之山林麓幽育王塔前神光浮一作流湯休賦詩歎寂寞逺公結社憶風流貝葉經文白業進曇花樓閣青春幽易屨上堂禮足已香煙雲霧共悠悠寄張天民清溪演漾緑生蘋溪上軒楹發興新只欠竹隂埀北牖儘多山色近南津湖魚入饌長留客沙鳥緣階不畏人愧我萍蹤此淹泊片雲回首一傷神送簡禪師易道蓮花峰下簡禪師半醉狂吟索賦詩榻上諸僧禪定後水邊高閣暮鐘時不堪雨栁縈春夢更惜燈花對酒巵一作且看書燈照夜碁深羡雲棲松頂鶴吾生飄泊竟何之寄陸靜逺積雨雲林生薜蘿墨池新漲浴羣鵝每懷笠澤從漁釣更擬滄浪聽棹歌蓮葉滿湖雲掩冉橘花埀户雪婆娑布帆十幅秋風裏即買湖船載酒過雲泉小隱為張德機賦昕一作朝夕輕鷗傍釣磯幽情一作好山自不與人違琴樽花圃春酣後童冠風雩晚詠歸雲一作清卧半間僧入定苔一作流侵三徑客來稀却憐服食清虛甚黃獨松花煮療飢送盧録判之建寧清溪九曲遊人少想見官河一水分理楫初辭季子邑到州好訪考亭文簿書間暇對春雨齋舍蕭條棲白雲洗我明年塵土足扁舟會覔武夷君寄曹德昭遙一作苦憶建溪君獨豪一作人姓曹五湖春水雲山高丹崖青林紫步障蜀錦越羅金錯刀已知雅頌播廟瑟無復謳吟悲楚騷伏生衰朽見鵬化願同斥鷃巢蓬蒿賦王真人胎仙樓紫閣岧嶤閟玉文攝衣迎日禮神君河汾鳯吹來未泯城郭鶴歸今復聞貪看飛裙舞綷縩遙憐風馭散繽紛世人政若塵眯目指點虛無疑白雲過蘭陵宿蔣達善家蔣翊初開竹下徑野夫聊乘溪上舟珍簟敷牀夏冰薄湘簾受風春浪浮圍棋終日對急雨解帶六月如高秋可憐相過便傾倒就宿為君少淹留寄張貞居不但入城蹤迹少南鄰野老見猶稀狂歌鳴鳯聊自慰舊學屠龍良已非蒼蘚渾封麋鹿徑白雲新補薜蘿衣羊君筆札誰能寄欲讀靈文一扣扉送徐元度荷鍤空林春雨餘􅋈舟江岸燕飛初去尋天上仙人佩肯顧山中隱者居霜月四更提劒舞田園二頃帶經鋤蘭榮栁密南簷下佇子雲間枉尺書奉懷張外史隂壑慘慘緑苔生碧雲亭亭多逺情松杉鶴去轉蕭瑟洲渚花落自縱橫從君下榻住十日看我鼓枻出層城洞口舊巢無恙否定應閉閣著書成寄郯九成芙蓉洲渚映江波落日維舟發棹歌坐久不知初月墮居謀何處白雲多粳粃富貴知吾否簿領風埃奈子何几格香材倘持寄熏罏茶鼎樂漁蓑初書記以詩來别且諄諄開諭深見方外之情因次韻奉謝併期面别從知四大皆假合順境逆途非樂憂夢中妄想驚得鹿海上忘機思狎鷗舉世何人到彼岸獨君知我是虛舟詩來説法能開諭頑礦無情也點頭鄭德明新居僦居吳市仍栽竹挂榻高齋獨待余風引香煙金鵲尾雨添書水玉蟾蜍仲舉未應治一室更生何用博羣書繞牀阿堵那嫌俗每罄金錢一飯餘送浙憲掾劉彥文并簡張貞居落日采薲溪水緑目追帆影先飛鴻寄書為覔仙人隱種杏今居丹井東逺道悠悠宵入夢晴波洶洶晝多風鳴珂使者清無事爾得優遊羣掾中寄吳子併懷貞居江海風流吳孟思十年不見鬢成絲舊同野老松花供今寄仙君石室碑秋日滿船初曬藥晴雲浮水獨臨池南山樹裏孤棲鶴爾去何當一問之謝伯理東還訪之不遇走筆奉寄謝朓宅前山黛濃山雲飛墮墨池中攜家又作他鄉夢歸棹還隨落葉風鶴入暝煙愁浩渺鷗浮逺水思清空尋君不遇成惆悵江草青青岸蓼紅寄盧士行闔閭浦口路依微笠澤汀邊白版扉照夜風燈人獨宿打窗江雨鶴相依畏途豈有新知樂老境空思故里歸擬問桃花泛春水船頭浪暖鱖魚肥酬曹德昭荆溪山水最清逺結屋溪邊住幾年澗底松棲何處鶴村中茶焙隔林煙清談況有王戎勝閉户仍多一作聞孫敬賢詩出奚囊一作卷何當時寄我琅玕色潤薛濤箋一作長篇短句使人傳張貞居有詩柬梁鴻山楊君次韻和之鴻山東面受朝暾户牖嵐光晝吐吞梁婦終甘隱吳市戴琴原不適一作遂不過王門弦歌寂寂虛千載井臼依依自一村踏一作掃雪獨尋楊處士蕭條古道與誰論杭人有傳余死者貞居聞之愴然因賦以寄之果園橘熟誰分餉茅屋詩成懶寄將衰謝皆傳余已死迂疏真與世相忘夜分風雨雞鳴急天闊江湖雁影長寥落百年能幾面論文猶及重銜觴霧隱空山秋色一作已深茅齋酒熟向誰斟菊花楓葉愁相並澗水松風伴獨吟洗耳不堪聞俗語醉眠且復罷清琴遙知對月深豫憶忍不題詩慰子心寄張德常身世蕭蕭一羽輕白螺杯裏酌滄瀛逍遙自足忘鵬鷃漫浪何須記姓名石鼎煮雲聽澗雨玉笙吹見和松聲憑君為問張公子曾到良常夢亦清十二月二十四日馮高士訪豫笠澤旅寓相與遊從纍日其操行孤削居處簡易有古高逸之風從容話及德常明公學行之美與僕交誼之篤因言欲以書札枉問以僕深相怪恨遂不復作計此無他聽雙鳬讒謗之過也雙鳬以十年前博易之物翻悔不遂竟嗔恨而去知其動興讒於所識非特執事也鼠輩小計僕固不恤但可笑耳王半山面有黑皯人教用園荽煎湯洗面半山曰天生黑於豫園荽其如豫何但執事不明之愆則不可逃一人譽之從而敬之一人毁之從而怒之可乎執事以為何如謹以奉問千萬還示數字幸甚尊君鶴溪先生侍間道瓚懷仰之私也瓚再拜寄陸明本索酒楊栁低昻蕙草青西莊風物一作景似華亭日修長史登真訣夜誦虛王內景經玉册一作牒初標紫臺籍石苔應長新宫銘自慚服食清虛甚為覔松肪釀百瓶蕭從善集其師外史張君詩賦贈葛翁臺上翻經處陸子泉頭試茗時石記只留金菌閣宫銘猶樹玉津池晚探風雅還心醉謾説曹劉是我師麟角鳯毛勤採拾却愁雷電取無遺贈張楨憶昨州民饋餫初兵戈阻絶飽艱虞忽驚歸路千荆棘莫致南溪雙鯉魚别浦秋蓮明泛泛寒廳夜雨落疏疏青衫從事將軍幕已覺門多長者車答德常别駕初夏見懷隔浦鼉鳴似打衙雲濤城郭夕陽斜汀前露冷魚鱗屋窗裏煙輕蟬翥一作􅢅紗沛澤風雷時繞几談空衣裓不沾花欲分香飯能來否早晚門前望鹿車一作菩薩如今只在家苦雨冥冥秋雨溺田禾日日奔雷吼怒鼉十里荒涼黃犢草五湖浩蕩白鷗波直應天地移龍穴未覺階除失蟻窠君子憂民重興感吁嗟天意欲如何春日送别余一秀才翼翼高帆開逺天緑波芳草隨煙綿春林風雨集憂思茅屋琴書移晝眠文采由來庾信少草聖近誇張旭顛百年聚散如落葉行客居人俱可憐西野對雨有懷明本彥凖并呈道益怪雨顛風裂芰荷鷗飛歷亂水驚波便須掃地焚香坐豈有高人載酒過笠澤至今能養鴨山隂何處覔籠鵝重隂忽霽猶斜日惆悵思君奈若何贈葛子熙打碑直入長安道養母還歸白馬峰聞説隂崖留積雪將尋隱地看長松晴窗弄翰山僧對寒澗行樵野鹿逢為問山中危太朴到州應與子相從留别王叔明秋蛩唧唧雨瀟瀟楮穎陶泓半泬寥此去那能期後會清言聊以永今朝濕雲窗裏初溫酒白鳥汀前又晚潮故國何人賦招隱桂花零落更停橈十二月四日和德原率性賦雪韻海宇希微隱一豪行舟冰泜夕停篙愁看寂寂雙峰並細數林林亂石高豈有風塵勞白羽謾思文采照宫袍雪融二月溪流合洞口誰尋千樹桃題孫氏雪林小隱天地飄颻一短篷小窗虛白地爐紅翛然忽起梨雲夢不定仍因栁絮風鶴影褵褷簷上下鹿迒散漫屋西東杜門我自無干請間寫芭蕉入畫中喜謝仲野見過階下櫻桃已著花窗前野客獨思家故人攜手踏江路柱杖敲門驚夢華藉草悲歌聲激烈停杯寫竹影欹斜新蒲細栁依依緑西北浮雲望眼遮述感桑柘蕭條半草萊百年人事哽悲摧沙丘漂母寧復有故國王孫誰見哀歌吹凄涼銅雀妓世途荏苒霸城災遙知敕勒穹廬野日夕牛羊欲下來張德常明公舊有良常草堂在金壇之華陽洞天揭曼碩張仲舉諸學士嘗賦詩紀勝其後德常宦遊無定居政績顯著今為松江府判因潘以仁之便輒賦七言一首奉寄樗散張侯意久疏齋厨服食轉清虛童初府署標名後碧落仙官校籙餘海上空濛歸化鶴庭前寂寞有懸魚一作人間繁劇臭如鴽吳松江水浮青玉聊此飱霞駐羽車寓齋秋懷次韻三首渚蒲岸栁望秋零桂樹懸香月影清野水浮舟歸未得羽觴泛蟻一作酒杯到手句還成雲松眠鶴夢方逺露草寒螿鳴不平南郭先生玄默久猶將諷詠寄間情思歸江漢濯塵纓旅況蕭條秋氣清一作況乃秋高氣凜清滿壁山圖初睡起一簾風雨助詩成逺樹芊芊煙鶴唳飛鳶跕跕暮潮平蒼巒九疊淙松瀑擬畢餘生棲遁情問我歸期未有程秋光羇思共凄清雪留鴻迹應如幻氊仰龜毛豈有成破屋逃亡寒磷起故宫基構緑蕪平試聽嗚咽長溝水水本無情似有情緑波軒二首緑波佳思復如何階下清陰芳草多爛醉哦詩絃寶瑟間眠欹枕幔煙蘿莫將華髮臨明鏡還寫黃庭換白鵝翦取吳松雲錦麗天孫機杼隔明河旅況沿洄似夢中孤舟江上白蘋風蕭條病起二家墅憔悴天涯一秃翁藋底鷦鷯歎鵬􅢅雷鳴瓦缶棄黃鍾憂來直欲窮牛渚河漢迢迢萬里一作碧漢通三月一日自松陵過華亭竹西鶯語太丁寧斜日山光淡翠屏春與繁花俱欲謝愁一作病如中酒不能醒鷗鳴野水孤帆影鶻沒長天逺樹青舟楫何堪久留滯更窮幽賞過華亭病中懷故友華陽外史次韻憶昔時雍四海寧華陽外史住南屛春愁黯黯懷仙卧幽鳥關關喚夢醒塞雁歸時鶯出谷園花落盡栁縈青傷心南北數千里無復沙墩長短亭呈錢復思用前韻霞餐雲卧養黃寧玉笈幽文護石屏一榻松濤金石弄半鐺茶雪夢魂醒玲瓏泰室生虛白縹眇空歌自始青不見仙風雲上過羽車芝蓋曉亭亭呈諸友人再用前韻北窗高卧自清寧煙霧衣裳雲錦屏舉世無知心自得衆人皆醉我何醒黃熊號野兵埃黑白骨生苔鬼磷青舊宅荒蕪時入夢墨池誰訪子雲亭歸錫麓未訪西巖墨沼泉東家兒女笑相牽莫話艱難長旅食敢忘蕭散送餘年䆉稏雲黃秋雨後芙蓉霜落渚鷗邊歸來何異遼東鶴荒冢纍纍思惘然二月二十日大風南渚春風二月狂停橈濯足聽鳴榔煙邊去鳥暮山碧衣上飛花春雨香高栁拂雲依古渡驚鷗衝浪起橫塘逺懷不作悠悠語忍躡飛鳬返故鄉寄陳庶子高行昔聞陳太丘浮雲蹤迹長一作雲行好在思逺遊丹砂擬訪葛洪井湖水堪乘范蠡舟爐銀欲變頭先白田秫可釀行歸休且排憂憤澄神慮奏刀已覺無全牛俊仲明以詩見示次韻謾酬南湖流水緑泱泱野鶴同栖秋夜長短世應須幾兩屐懷人可但九回腸驚風零亂芭蕉影冷雨凄迷菡萏香高尚劉君此肥遁優遊物外久韜光一作寧知百世有餘光送栁道傳東歸賦詩南澗寫烏絲靄靄停雲去後思鄉國動成經嵗别江湖復與故人辭溪船斫鱠雲生柁松室聞猿月滿枝他日重尋言子宅咏歌應在一作唯許暮春時寄開元長老兼呈鄭明德逺公令我詩興生堂下緑苔無俗情天女試散寶花墜曲生相逢青眼橫布金已住長老宅乞食應憐王舍城何當慧筏一作棹歌一來過同載唯許鄭康成呈良常安遇伯仲松陵竟失五車書梅里燒焚舊屋廬衰季悲吟歎羅隱盛時作賦羡相如伊優骯髒復何似臃腫支離聊與居日日秋風白蘋老門前江水接空虛送梁生讀書沈莊上蔡梁君譜系蕃凌煙勳業舊諸孫廬山傍斗可攬秀大江自岷初發源夜誦庭柯雜琴響春羮汀藻帶潮痕休文舊宅宜終隱歸近南湖祇樹園題王敬之壁我來陸莊如故鄉故鄉風景日凄涼解憂幸有盈樽酒慰眼新栽百畝秧蒲葉清波間濯足荷花斜日起鳴榔當年李白成何事白髮緣愁萬丈長寄周履道兼旬不見周徵士落月空梁夢見之久狎海鷗聊避世虛言市虎竟成疑尊前節序梅將玉鏡裏形容鬢已絲日暮煙濤隔城郭蕭條南渚一吟詩寄顧仲瑛江海秋風日夜涼蟲鳴絡緯促寒一作尚練裳民生惴惴瘡痍甚旅泛依依道路長衰栁半欹湖水碧濁醪猶趂菊花黃知君習靜觀諸妄林下清齋理藥囊寄王明卿不見孝廉踰十年高人風節自居然數間茅屋無人補一榻寒雲只獨眠酒榼時須栗里菊茶煙還煮惠山泉衡門不出棲遲久坐有孫登彈一絃題荆南精舍圖誰畫荆南精舍圖煙霏嵐翠墨糢糊林間野鹿時相逐洞口山猿不受呼尚有流泉悲夜雨已迷幽徑入寒蕪癡人莫彈西飛鶴雲外仙君恐姓蘇題米南宫石刻遺像千秋遺貌一作米公遺像刻堅珉却在荒煙野水濱絶歎莓苔迷慘淡細看風骨尚嶙峋山中仙塜芝應長海內清詩語最新地僻無人打碑賣緬懷英爽一傷神題畫貽王光大荆南山色青如染卜築正當溪水南浪舞漁舟鷗泛泛雪消沙渚栁毶毶涼軒楓葉晴雲綴秋浦荷花落日酣舊宅不歸幽夢逺吳松聊結小禪龕用王叔明韻題畫王郎筆力追前輩海嶽新圖入卧遊獨鶴眠松猶警露孤猿挂樹忽驚秋陶潛宅畔五株栁范蠡湖中一葉舟同煮茯苓期嵗暮殘生此外更何求題趙榮墨竹緣江修竹巧臨模慘淡松煙忽若無亂葉寫空分向背寒流篆石共縈紆春渚雲迷思鼓瑟青崖月落聽啼烏誰憐文采風流意謾賞丹青沒骨圖辛亥六月三日寓實性源禪房為寫竹梢因賦三首禪關分榻一作開門便肻留人宿不夜長燃禮佛燈君已風流如惠逺我聊吟嘯答孫登來依結夏安居者莫厭無家有髮僧清夜哦詩江月白琅玕節下影鬅鬙此身已悟幻泡影淨性元如日月燈衣裏繫珠非外一作不得波間有筏引一作要人登狂馳尚覓安心法玄解寧為縛律僧曲几蒲團無病惱松蘿埀户緑鬅鬙殘生已薄崦嵫景猶護餘光似曉燈玄一作縣圃雨雲元不隔華嚴樓閣也須登夢歸金菌山前路飯仰白雲窗裏僧獨鶴步庭間顧影西風吹鬢雪鬅鬙寫畫贈潘仁仲醫士屋角東風多杏花小軒容膝度年華金梭躍水池魚戲彩鳯棲林澗竹斜亹亹清談霏玉屑蕭蕭白髮岸烏紗於今不二韓康價市上懸壺未足誇貞居君在餘杭北郭結樓居之號茅嶺行窩豫久欲往觀而未能也兹貞居適有來此之約因寄一首已向雲林開别墅更聞茅嶺有行窩提魚就煮興不淺看竹頻來意復多梅塢雪晴紅綴蕚墨池水暖緑生波懸知潘令間居賦不比陰山敕勒歌再用韻呈張伯雨潘子素團團桂樹覆巖阿茅屋歸來雪一窩髙卧故園竒氣在倦遊江海故人多楚山白雁遵寒渚練水長魚出素波去去南州書問少寂寥誰和紫芝歌附次韻闕名扣舷溪子發陽阿落葉霜林見鳥窠清閟閣前春意早蕭梁臺上月明多顧瞻鳴雁嵇中散仰視飛鳬馬伏波對酒忍思千古事潘郎刺促為誰歌東友幽窗談笑話生平屈指年華一作三十年前幾變更白髮滿頭今已老青山排闥故多情桃花灼灼應無語春雨蕭蕭尚未晴明日扁舟期載酒南山笋蕨正堪烹曹伯高為曹尚書之子以卜居詩卷索題走筆漫應清貧我早識尚書身沒韓公為結廬可但家聲今不替猶趨禁直未全疏窗臨墨沼揚雄宅郭映雲林謝眺居共愛諸郎遊息地風雩間咏暮春初陽春堂陽春堂下春波緑臘雪初消蕙草青未覺避喧離世俗也知習靜愛郊坰欲為野徑孤琴約盡醉華筵雙玉瓶見説陶朱有逺趣長松傾蓋碧亭亭風雨風雨蕭條歌慨慷忽思往事已微茫山人酒勸花間月秦女箏彈陌上桑燈影半窗千里夢泥途一日九回腸此生傳舍無非寓謾認他鄉是故鄉附次韻張羽看畫哦詩重慨慷百年翰墨付微茫已憐揮灑如摩詰可忍悲歌似子桑名世幾人稱妙手舊遊隨處擾愁腸雲林故事惟文藻遺迹偏多在逺鄉清閟閣全集卷五
