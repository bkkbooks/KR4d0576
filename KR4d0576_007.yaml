body:
  text: 清閟閣全集巻七元倪瓉撰七言絶句吴中望中烟草古長洲不見當時麋鹿逰滿目越來溪上水流將春夢過杭州九日登華氏溪亭茱萸黄菊稍斑斑野水蒼烟草莽間送客歸來逢九日華家亭上獨看山六月五日偶成坐看青苔欲上衣一池春水靄餘暉荒村盡日無車馬時有殘雲伴鶴歸竹枝詞㑹稽楊㢘夫邀余同賦西湖竹枝詞余嘗暮春登瀕湖諸山而眺覽見其浦溆沿洄雲氣出沒慨然有感於中欲托之音調以聲其悲歎久未能成章因覩㢘夫之作為之心動言宣詞凡八首皆述眼前不求工也錢王墓田松柏稀岳王祠堂在湖西西泠橋邊草春緑飛來峰頭烏夜啼湖邊兒女十五餘烏紗約髮淺妝梳却怪爹娘作蠻語能唱新聲獨當壚湖邊女兒紅粉妝不學羅敷春采桑學成飛燕春風舞嫁與燕山逰冶郎心許嫁郎郎不歸不及江潮不失期踏盡白蓮根無藕打破蜘蛛網費絲阿翁聞説國興亡記得錢王與岳王日暮狂風吹栁折滿湖烟雨緑茫茫春愁如雪不能消又見清眀插栁條傷心玉照堂前月空照錢唐夜夜潮嗈嗈歸雁度春江明月清波雁影雙化作斜行筝上字長彈幽恨隔紗窓辮髮女兒住湖邊能唱羌歌舞踏筵羅綺薫香回紇語白㲲䝉頭如白烟二月十九夜風雨凄然南渚旅寓篝燈與端叔共坐因念兵戈滿地深動故山之思遂賦一絶春雨春風滿眼花夢中千里客還家白鷗飛去江波緑誰採西園穀雨茶答陳叅軍世故紛紜自糾纒南山修竹老風烟陳公懐抱政如此清影蕭蕭月滿川偶成紫燕低飛不動塵黄鸝嬌小未勝春東風緑遍門前草暮雨寒烟愁殺人贈馮文仲知君近住西湖曲湖水淪漣似輞川窓下青松髙百尺時時落雪滿琴絃春日鶯啼花落罷琴樽山郭鳴鐘靄已昏莫嗔野鹿當蘿徑只有春風到蓽門青林微雨見東臯桑柘隂隂飛百勞可憐栁絮浮春水無復縈空百尺髙黯黯春雲映戸輕緑蕪斜日忽開晴依微野徑泉聲静風落桐花逺思生水仙花曉夢盈盈湘水春翠虬白鳳照江濵香魂莫逐冷風散擬學黄初賦洛神絶句醉喚吴姬舞踏筵風欄花陣亦迴旋愁生細雨寒烟外詩在青蘋白鳥邊寄友二月江水青接天楊栁隔江揺緑烟一夜愁心似春雪随風舞影落君前正月廿六日漫題泖雲汀樹晚離離飲罷人歸野渡遲睡起香銷金鵲尾獨聴疎雨打窓時宿𤣥文館𤣥館清虚五月秋疎簾珍簟看瀛洲窓前種得青桐樹時有鳳凰栖上頭答范徴君見懐想見雨池春溜滿唯應閒院緑苔生落盡櫻桃杏花發輕舟歸去看春耕別潘先輩君來烟草正凄迷君去溪頭栁葉齊掛席中流竟東上莫重回首向荆溪宜逺樓宜逺樓前春可憐數峰依約亂流邊若為倚劒崆峒外回望齊州九㸃烟次曹都水韻水品茶經手自箋夜燒緑竹煮山泉莫留樵客看棋局持斧歸來幾嵗年蕭閒一作夜寒館裏挑燈宿山罽重敷六尺牀隠几蕭條聴夜一作塢雨竹林烟幕煮茶香慧麓小隠錫麓洞前開竹扉孟公舊築草堂基已倩王維圗別業更從裴迪賦新詩題𤣥㑹菴壁間風雨縈窓一作愁夢不醒紫薇花發渚南亭望中迢遞孤烟起白鳥飛來菰蒋青追和戎昱寄許鍊師雲霧軒窓倚半空少霞銘處識新宫遥看一片秋山色鶴影徘徊明月中至正十四年二月廿五日雨郯君九成留宿髙齋篝燈為寫春林逺岫圗併次其韻我別故人無十日衝烟艇子又重來門前積雨生幽草墻上春雲覆緑苔㫁送一生棋局裏破除萬事酒杯中清虚事業無人解聴雨移時又聴風没徑春泥不出門山烟江霧晝長昏糟牀聲雜茅簷雨破却隂寒酒自温郯子論詩冀北空晤言千里意常同待晴紫陌堪縈手行咏山光水影中附録郯九成原韻四首杏花簾幙看春雨深巷無人騎馬來獨有倪寛能憶我黄昏躡屐到蒼苔春色三分都有幾二分已在雨聲中墻東兩箇桃花樹恨殺朝來一陣風十日春寒早閉門風風雨雨怕黄昏小齋坐對黄金鴨寂寞沉香火自温春寒時節病頭風惆悵年華逝水同世事總如春夢裏雨聲渾在杏花中村居疎疎梅雨橘花香寂寂桐隂枕簟一作研席凉怪底林間金彈子枇杷都熟不知嘗雙井院前小立山色微茫好放船秋蕖野水夕陽邊西風更灑菰蒲雨羡爾沙鷗自在眠舟過梁谿蕩槳清溪欲盡頭亂山出沒暮雲稠便當濯足聊停棹何處飛來雙白鷗宿義興先太初上人房初公樓上雨蕭蕭楊栁埀烟隔岸揺何處舟人棹歌發山長水逺望蘭橈周將軍祠隔水近岳鄂王廟亦東隣百年故事誰記憶風雨清明愁殺人雪中折枇杷花寄吴寅夫雪中自折枇杷花走寄城南處士家明日雪晴定相過兩株松下煮春茶雪不止重寄清夜焚香生逺心空齋對雪獨鳴琴數日雪消寒已過一壺花裏聴春禽三月廿日題所寓屋壁梓樹花開破屋東隣墻花信幾番風閉門睡起兼旬雨春事依依是夢中隣墻桂花盛開扶疎桂樹隔隣墻時有飛花到石牀起近南園看月色不須更炷水沉香題靈巖寺壁我到靈巖古寺中雲烟樓閣鬱重重今朝醉倒山前石留取綸巾掛偃松寄陸鍊師忽憶南湖陸鍊師若為湖上住多時明朝擬望仙帆至好買松鱸作膾絲贈曹徳昭谷口桐林落絳霞仙帆初泊野人家蕭閒館裏青苔合看到堦前芍藥花客舍詠牽牛花小盤承露浄鉛華玉雪依稀染碧霞弱質幽姿娯老眼傍人籬落蔓秋花江上石侵春雨林間蘚竹帶沙汀日暮烟江上清隂随月落船頭白鳥傍人眠晚照軒偶題南湖春水碧於天夢作沙鷗狎釣船緑樹拂簷風雨急覺來依舊北窓眠簷前幽鳥自相呼池上紅蕖映緑蒲五月夜凉如八月一窓風雨夢南湖寄友人周君讀書離墨山山中卧看白雲閒翻然遂逐雲歸去松下草堂深閉關烟雨烟雨空濛逺樹齊人家樹底自成蹊只應三月吴松尾渚際維舟聴竹雞聞竹枝歌因效其聲澱山湖影接松江橘葉青青柿葉黄要寫新詩寄音信西風㫁雁不成行江流不住楚山青船到潯陽幾日程不忍寄將雙淚去門前潮落又潮生雨後雨後空林生白烟山中處處有流泉因尋陸羽幽棲處獨聴鐘聲思惘然四月七日雨水宿風行冬復春汀花汀草思紛紛泊舟無頼終宵雨夢入蒼梧萬里雲六月十一日題吉菴壁僧夏安居我息機清風日為掃柴扉身形已似松梢鶴還有悲歌續令威随宜喧寂了殘生飯飽悠悠曳履行日落吴淞半江影莫将欣厭惱閒情乙巳三月七日清明風雨憒憒賦此春多風雨少曽晴愁眼看花淚欲傾亂離漂泊竟終老去住彼此難為情雅宜山舊名娜如山葢虞道園所更然未若娜如之名近古也施君宜之先隴在其處索余賦詩因為竹枝歌二首遺之以復其舊焉娜如山頭松柏青闔閭城外短長亭到山未久入城去駐馬回看雲錦屏娜如山頭日欲西採香徑裏竹雞啼南朝千古繁華地麋鹿蒿萊望眼迷二月十五日雨作風軒紅杏散餘霞堤草青青桃欲花寒食清明看又近滿川烟雨亂鳴蛙寄曹都水溪南山影碧叢叢水閣風林處處同周處廟前新漲濶數聲柔舫月明中送初上人叅禮光公二首西崦欣逢初上人妙年藻思如春雲育王墖前禮佛竟應修白業益精勤阿育王塔舍利存山氣無雪春冬温蓮花臺近多羅樹中有人談不二門對雨遣懐數日枇杷花落盡可憐春事到櫻桃聴風聴雨眠三日排遣新愁付濁醪懐都水曹君荆蠻野褐最清癡怕與髙人話別離記得解携雙樹下風帆目斷淚垂埀贈墨生吴善銅官山下白雲亭澗底長松長茯苓傳得潘生燒墨法墨成持贈寫丹經寄徳常別駕二首長洲東去有僧居狂士來逰密雪初欲覔故人張別駕清貧猶苦出無車愛爾作官清海濵海濤嶺雪白如銀已占麥隴雙岐秀一作麰麥明年喜漸有衣襦富昔民松陵松陵原上望長洲緑玉平鋪江水流好取釀為千日酒大瓢酌月散煩憂秋容軒乍見芙蓉開滿樹更憐楊栁緑含風秋容好處無人㑹都在溟濛烟雨中碧花翠蔓引牽牛藂竹黄葵意更幽不用田疇三日雨已輸䆉稏十分秋靈壁欹危四五峯枇杷細弱未成叢槿籬西面雲千畝牛背時聞一笛風雜賦五首恢公妙得華光理月影縱横白尚𤣥留取禪門三昧法松滋楮頴過年年空江水冷佩珊珊去國千年始一還身似吹笙王子晉夜騎白鶴過緱山一色清江四面同樓居如在畫圗中主人欲刻皆山記須得環滁老醉翁曽傍江流築釣磯朱門華屋事都非身如王謝堂前燕嵗嵗猶過白板扉痛飲酣歌未是狂多岐何處覔亡羊芹羮术煎茅君酒更醉人間一萬塲贈通上人二首慧逺深心白蓮社湯休麗句碧雲篇懴摩不懈香燈供般若仍通文字禪雨後春池芹細細月明寒渚竹娟娟東林門外聞鐘返只有陶公妙入𤣥烟鶴軒林宗道新闢小軒南望平蕪烟樹眇然有千里之思因名之曰烟鶴葢取韋刺史逺水烟鶴唳詩語為賦二絶句著軒中烟鶴軒前枕石眠一聲清唳落江烟攬衣起望行雲急逺思憑虚忽欲仙楓落吴江雲雨空戛然鳴鶴紫烟中坐看雪影横江去明滅寒流夕照紅寄友無室無家老更顛草衣木食度年年開春若問桃花宿先到俞君舊宅前與錢伯行宿棲雲堂小龍江上棲雲室望見石湖湖盡山來與幽人一作錢翁住三日白雲妍㬉滿中間贈金嬾翁製笊篱聞君有漏與無漏木杓笊篱都一般欲覓嬾翁安樂法無生話子説團欒寄人楊栁春風未放黄晴天孤雁不成行忽思小謝生幽夢芳草池塘路亦荒調𤣥度江渚荷花落日紅畫檐欄檻納凉風何人得似張公子詩在烟波眺望中六月九日過以中野亭賦荳苗引蔓已過簷荇葉團團菱葉尖兀坐野亭忘日暮一作野亭中間坐至晚窓前竹影月纎纎墨梅幽蘭芳蕙相伯仲江梅山礬難弟兄室裏上人初定起静看明月寫敷榮贈𤣥容枯栁疎條栖鳥稀歸人稚子候簷扉政如十月江南岸落日西山翠影微林亭晚岫八月江南未隕霜青楓欲赤碧梧黄停橈坐對西山晚新雁題詩已著行王都事家聴周子竒吹笙隔水吹笙引鳯鳴十三聲外栁風清風流自有王子晉留取清樽吸月明聞鵯鵊林影曨曨鵯鵊聲歐陽詩句最關情畫簷宫燭朝儀早欹枕船窓憶太平答王長史經年不見王内史秋夜有懐如此何澄不為清撓不濁汪汪萬頃玉湖波寄雪林隠君索折芍藥花堦前紅藥無人摘彩翠籠烟溪水南為折一枝和瑞露小窓巵酒咏春酣春雨春雨蕭條獨掩扉庭柯逕篠緑依依莫思南渚停舟處烟栁垂隂滿釣磯寄王叔明野飯魚羮何處無不將身作係官奴陶朱范蠡逃名姓那似烟波一釣徒題張元播扇聴雨樓中暑亦一作也自凉閒亭筆硯静焚香君來為煮嵇山茗自洗氷甌仔細嘗贈原上人上人住近西山麓左右泉聲喬木深拄杖逍遥扣門去臨池濡墨寫春隂調張徳機空折花枝插滿盆清吟清坐想盤飱主人欲出一作勸松肪釀謾道糟牀尚苦渾贈張徳常二首老疾吟哦張判官僦居江海覺心寛好乗黄鵠風埃表萬里雲霄一羽翰齷齪疲駑飲齕餘鞭笞喘汗駕鹽車麒麟已老終超逸不受金羈去玉除又寄聞道淮安之任去尊君今住叔兮家來城又鼓吴淞柁好過苔磯弄釣車比聞從者來吴城旦夕之官淮安復往吴淞迎尊君矣舟經笠澤能一枉顧否兹因令弟徳機徴君之便輙成小詩以寄倪瓉再拜良常府判明公執事題墨竹燈下蕭蕭玉一枝吴松欲雪暮寒時憑君為把青鸞尾大掃隂雲息怨咨題李光禄墨竹雲氣翛翛青鳳翎湘江鼓瑟倩湘靈壁張此畫驚竒絶醉倒茅君雙玉瓶題宋仲温竹枝畫竹清脩數宋君春風春雨洗黄塵小窓夜月留清影想見虚心不俗人寄王主簿客愁最似未招魂老去情懐孰與論詩寄句容王主簿憶從白璧達天門寄張處士江邊楊栁緑揺一作絲烟影落清波萬里天處士時時驚夢起一作曉夢門前槌鼓發鹽船人我二首人以秋毫軒輊我我心澹然如碧淵何期失脚墮塵網談笑區中飽世縁醉中了了夢中醒好語狂言不用聴莫起黒風飄鬼國長教明月照中庭因盧山甫便寄曹徳昭使者停車溪水西借栽緑竹僦幽棲玉川野客尋津去悵望孤帆意轉迷船中野水荒寒一作烟寂寞濵萋萋芳草也知春五湖雪浪浮天白好遣輕鷗狎隠淪答王長史蕭蕭短髮不須冠何處繫舟雲水寛西塞山前夕陽裏青芙蓉墮水精盤秋日芙蓉花下坐鳴琴疑在瀟湘斑竹林翠節霓旌煙雨溼秋来江水不知深秋水清空一作虚似汎槎此生汩没似無涯蕭閒堂上収書坐八月芙蓉始著花贈岳子岳生孫子最清顛坐石彈琴和澗泉一簣松肪初釀得賸將醉爾竹林前寄安遇隣家借得酒盈罌薄飯留君午不羮僧夏安居餘半月重來相與説無生雨晴江上白薲風起波冷紋縈碧暮烟和織成一幅鴛鴦錦零落紅衣逺恨多七月二十八日過丘氏林居秋風騷騷然至暮大作終夜不息因成小詩西風楊栁暮騷騷零落江雲起怒濤坐看荷花都落盡倚窓孤咏楚天髙詠鵞三首泛雪翻雲未足佳栖萍唼荇戱江沙舉羣此日籠歸去識得能書内史家草青莎軟暮烟和㸃綴春江愛白鵞不似貪饕誇厭飫萬錢日食未嫌多真迹黄庭世所珍當時聊復送鵞羣寧知雪後攻城者使亂軍聲用進軍二月六日南園四首正月已䦨烟雨寒泊舟東渚聴風湍山長水逺鳥飛急不是離人也鼻酸雨裏櫻桃兩樹開北風吹盡臘前梅荒筠隅隩無多栁細草汀洲併是苔春月寒逾臘月寒盲風怪雨泊江干天工自不為人料一種春光有幾般有子政如無子同異居邈若馬牛風人間何物為真實身世悠悠泡影中贈僧清流堂上無塵事竒石修篁映梵書長日粥魚齋鼓罷竹窓虚寂坐如如絶句七月三日快哉風野亭不厭酒杯空况有尊前沈腰瘦何妨醉倒田家翁題髙房山畫巻屋邊昨夜春風起蔣芽荇葉生春水睡醒獨坐無人聲歴歴青山水光裏吴仲圭山水道人家住梅花村窓下松醪滿石尊醉後揮毫寫山色嵐霏雲氣淡無痕題秋江圗長江秋色渺無邊一作際鴻雁來時水拍天七十二灣明月夜荻花楓葉覆漁船畫竹贈申彦學吴淞江水似清湘烟雨孤篷道路長寫出無聲㫁腸句鷓鴣啼處竹蒼蒼阿儂渡江畏風波聴渠聲唱竹枝歌淇園青青淇水緑不似瀟湘烟雨多雲林小景圗赤城霞㬉神芝秀洞裏桃花不記春何事却將山水脚鍾陵市上踏紅塵後數年復用前韻憶昔舟歸雪浦濵松林瑶草欲生春閒拈逸筆圗清思今日披圖似隔塵題畫十二首南望銅官曉色新三株松下一茅亭何當濯足臨前澗坐石閒書相鶴經落落長松生夏寒莓苔樗散共盤桓王謝家庭多玉樹依然猶是晉衣冠舟過松陵甫里邊幽篁古木尚蒼然何人得似王徴士静看輕鷗渚際眠坦腹江亭枕束書澄清江水自空虚修篁古木悠悠思何處青山可卜居松瀑飛流到枕邊道人清坐不須絃青山㸃㸃白雲外用意何曾讓鄭䖍新栁春柯未著鴉短籬茅屋野僧家放舟不怕歸來晚白水田畦已有蛙湖水清空好放船青山依約白鷗邊忽思周處祠前路古木荒烟一惘然笠澤依稀雪意寒澄懐軒裏酒杯乾篝燈染筆三更後逺岫疎林亦耐看嘉樹幽篁澗石隈當年曾此好懐開如今寂寞空山裏誰復緘情折野梅樓閣參差霞綺開峰巒重複水縈迴赤欄橋外埀楊下歩月吹笙向此來青山矗矗水舒舒相見郊原霽雨初絶似三髙亭上望人家依約樹扶疎右臨青嶂左澄江未覺羲皇逺北窓安得茅君酒斟酌幽人許致玉瓶雙為吴溥泉畫窠石平逺圗漫題地僻林深無過客松門元自不曾關展將一幅溪藤滑寫得湖隂數㸃山題畫贈原道二月東風溪水緑幽林修竹影參差杖藜日日溪西路魚鳥相娯只自知題張以中畫密雪初晴僧舍深地爐活火酒時斟張家公子清狂甚冒冷看山意不禁題吴采鸞像誰見文簫逐采鸞碧山蘿月五更寒猶遺寫韻軒中跡留得風流後世看為吴處士畫喬林磵石山家日出無行踪雪樹烟蘿逺且重不見􅎷眠磐石上提壺自掛一長松題趙榮禄揩癢馬圗韓幹真龍下筆肥銀鞍羅帕絡青絲春風碧野和烟放誰見林間揩癢時題幽禽筠石圗送髙霞還𤣥元館烟雨蕭蕭墨未乾幽禽枝上語春寒𤣥元館裏多筠石飯飽臨池自在看題陳仲美畫次張貞居韻杜老茅堂倚石根往來西瀼與東屯一庭秋雨青苔色自起鈎簾盡緑尊斜日西風吹髩絲披圗弄翰學兒嬉釣竿拂著珊瑚樹張祜題詩我所師為蹇原道題竹木圗疎篁古木都成老石澗莓苔亦有花排悶不須千日酒聊將小筆畫龍蛇題寂照蔣君遺像併引君諱圓明字寂照暨陽人也年二十一歸於我勤儉睦雍里稱孝敬嵗癸巳奉姑挈家避地江渚不事膏沐㳺心恬淡時年四十有七矣如是者十一年癸夘九月十五日微示疾十八日翛然而逝題像甲辰正月廿四日也幻形夢境是耶非縹緲風鬟雲霧衣一片松間秋月色夜深惟有鶴來歸梅花夜月耿氷魂江竹秋風灑淚痕天外飛鸞惟見影忍教埋玉在荒村題曹雲西畫吴淞江水碧於藍怪石喬柯在渚南鼓柁長吟採蘋去新晴風日更清酣題畫與强仲端日暮移舟何處泊强家亭子水西頭恵山只在湘簾外雨後幽泉想亂流題畫贈崔子文之金陵性癖居幽每起遲一來溪口意凄迷林亭曉色蒼茫裏目送風帆過水西拜石圗米章愛硯復愛石探瑰抉竒久為癖石兄足拜自寫圗乃知顛名不虚得題畫疎林小筆聊娯戱畫與金華張隠君好為林間横玉篴秋風吹度碧山雲我識幽人顔仲逸藥欄竹逕近前除不將世事經心耳濁酒盈樽讀漢書題竹樹圗二首海中鐵網珊瑚樹石上銀鈎翡翠梢烏夜亂啼江月白檀欒飛影下窓坳江邊樹影墨糢糊江上青山日欲晡野思悵然無晤語時來臨水照眉鬚為徳常寫竹張公宅裏挑燈話對影依依夢寐同坐到夜深喧境寂庭前疎竹起秋風題畫竹贈張元實髯翁中嵗得麟兒漆㸃雙瞳玉作頤可惜空齋無楮頴為拈秃筆掃風枝次張外史韻題商學士畫獨棹扁舟引興長疎林逺岫見微茫商侯畫筆張仙句可比豐城寳劒光柯丹丘梅竹竹裏梅花淡泊香暎空流水㫁人腸春風夜月無踪跡化鶴誰教返故鄉古木竹石圗古木幽篁春淡淡斜風細雨石蒼蒼何人識得黄花老㺯翰同歸粉墨囊題畫贈王允同湛湛緑波春雨裏娟娟翠竹曉風前此中著得𤣥真子一棹夷猶獨醉眠桐露軒前月滿窓竹聲樹影落春江青苔石逕無人跡坐待歸來白鶴雙二王逰騎圗每憶開元全盛時二王逰騎日追随鶺鴒原上雙兄弟挾彈荒郊想鳳池看花士女圗畫圗常識春風面雲霧衣裳楚楚裁為問人間春幾許石欄西畔牡丹開士女剖𤓰圗月彎削破翠團團六月人間風露寒誰覔東陵故侯去但知華屋薦金盤趙魏公蘭天上宣和落墨花彛齋松雪擅名家遥看苕霅山如玉雪後春風自茁芽管夫人竹夫人香骨為黄土紙上蕭蕭墨色新悽㫁鷗波亭子上鏡臺鸞影暗凝塵柯丹丘梅竹山川揺落夜漫漫老木幽篁巧耐寒畫裏陳侯有佳句皎如明月映琅玕題陳惟允畫韓公曾聴頴師琴山水蕭條太古音不作王門操瑟立溪山髙隠竟何心題趙承㫖墨竹籊籊生綃寫竹竿愁看春雨溼一作滿空壇風流誰識當年意萬里鷗波烟景寒題木石贈丘志古木幽篁丘氏宅江波落日妙蓮莊泊舟風雨留三宿一作月卧看鳬鷖十里塘荆溪秋色圗為卜震亨題罨畫溪頭秋水明上人逸筆思縱横雲山多少𤣥暉句不道毫端畫得成為潘仁仲寫梧竹草亭翆竹蕭蕭倚碧梧一亭聊以賦閒居浮杯樂飲思潘岳藻思春江濯錦如韋羌草堂圗韋羌山中草堂静白日讀書還打眠買船欲歸不可去飛鴻渺渺碧雲邊宿禪悦僧舍題趙榮禄馬圗小僧院裏無塵事夜雨燈前興不孤寥寥説竟無生話更覽王孫駿馬圗畫贈王生白沙岸下幽人宅翆竹林中賣酒家好事江干王處士客來為黍酒仍賒松澗圗青松澗底結凄隂老大還無用世心張洞西邊煮藥竈山靈虚閉白雲深題墨水仙花宋諸王孫釋大雲清詩多為雪精神誰言一㸃金壺墨解寄湘江萬里春仲穆馬圗花門舊進青驄馬天水王孫貌得真溪上猶遺光禄宅海寧何以久風塵題幽篁古木圗贈文静徵君環慶堂前翠竹多雨苔侵石樹交柯不逰罨畫溪頭路柰此春宵月色何題畫竹嫋嫋風枝墨未乾美人湘水逐笙鸞恍然一枕逰仙夢清影縱横山月寒怪石足當米老拜修竹定是王猷栽磊落瓊瑰雨洗出團欒清影月移來怪石雨餘苔蘚滋月明鸞尾影參差春風忽過庭前樹㑹見清隂覆墨池斑斑石上蘚紋新隂落先生烏角巾貌得兩枝初雨後可憐清興屬幽人為寫新梢十丈長空庭落月影蒼蒼王君胸次冰霜凛剪燭談詩夜未央琅玕節下起秋風寒葉蕭蕭烟雨中贈子仙壇翆鸞帚杏林春掃落花紅逸筆縱横意到成燒香弄翰了餘生窓前竹樹依苔石寒雨蕭條待晚晴題畫白雲孤鶴暮知還船泊錢塘看越山珍重今朝重展巻吟詩作賦北窓間小坡曾寫雞棲石猶在荆溪山寺中幾欲規摹渾忘却可憐零落墜秋風庭樹霜黄尚有隂午窓危坐自鳴琴問誰得似沈夫子北牖羲皇見此心荷葉田田栁弄隂菰蒲短短徑苔深鳥飛魚躍皆天趣静裏㳺觀一賞心中州人物獨黄華父子詩畫逸出青雲之表為可尚也觀澹㳺此巻筆意蕭然有蔡天啟之風流葢髙尚書之所祖述而能氷寒於水與巻後有歐陽承㫖所賦詩不揆因次其韻時丙午六月晦日羲獻才情似水清暑窓葵扇與桃笙中州父子黄華老信是前賢畏後生後二十三年為戊申嵗元度張君得此持以示僕披卷如夢寐間也因援筆次外史韻詩己為之泫然外史已仙去張榮禄鑑禪師不見數十年存亡不能知尤令人悽㫁也九月十日題偶寓姚城江上村木如蛟舞石如黿清風明月許元度為余傾倒緑波軒清閟閣全集巻七
