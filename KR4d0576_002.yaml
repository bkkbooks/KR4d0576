body:
  text: 清閟閣全集巻二元倪瓚撰五言古詩與全希賢卧疴久不懌㣲瘳起行吟徑苔無來跡出門江水深懷我平生友金蘭契同心欲共一尊酒道逺力不任有客闖我户晤言樂中林飄蕭緑髪僊亦見雪滿簪取琴與子彈悠悠山水音能成伐木詩歌以慰所欽酬友生擁褐南軒一作榮下晨暾煖似春忽思王子晉醉着白綸巾逰宴無冬夏清狂忘主賔能持麐鹿脯寄與不羈人尋友人不遇洲渚多落英泝流尋逺山輕舟載美酒揺蕩緑波間俯詠拾瑶草遐思隘塵寰寅縁忽失遇悵望遂空還次張仲舉韻秧疇蒔已遍午饁休中林忽聞軺車至攬衣欣慨深遂尋脩竹下共憩西澗隂汲泉以煮茗遐哉遺世心薛常州讓田詩延陵古吳地泰伯有遺風仁讓自家國士民知孝忠春暉草心碧日暮荆花紅為感使君政嗟時誰與同潘公鳴臯軒白鶴稟靈質翩翩有竒姿海月比髙潔巗雲共逶迤池上菖蒲花春煙紫綏綏飛鳴聊飲啄乘風來下之我登鳴臯軒遂賦鳴臯詩安得赤玉笙一作舄鶴上吹參差為張來儀賦匡山讀書處廬山鬱岧嶤上有香爐峰影落碧天外翠玉琢芙蓉牽蘿讀書處雲磴無行踪猶遺石巗苔花開紫丰茸愁心飛春雪寶劒沈雙龍應化蘇躭鶴歸棲千嵗松山巖採芝叟久别倘相逢瞻雲軒有引金君伯祥名其先君墓左之室曰瞻雲軒葢以寓夫孝思油然之義也若夫父祖之魂氣精神其脗合感通之妙齋思則如見敬祭則來格開牖而天光臨鑒池而泉脉動洋洋乎如在其上如在其左右者雲豈足為喻哉於是廣其義而為之賦詩白雲起石上迅逸如迸泉汎演乎林莽飄颻乎山川飛霞共聨絡凱風與周旋開軒滌遐想我思何緜緜顧瞻忽在茲亦復停披焉巻舒無定理變幻徒縈纒興念松下塵若承鶴上仙空花結浮翳百態交我前戚欣從妄起心寂合自然當識太虚體勿隨形影遷張鍊師祠醮感致瑞鶴賦贈我識白雲君尚友赤松子仙署閟清嚴社公隨役使步虛禮初日飛神謁鈞天時有五白鶴翩翩一作飛飛遶香煙手栽千樹桃風吹劫灰盡避世星壇西深竹聞清磬倐來宻霧集忽逐泠風還窗裏遺瑶瑟空中鏘珮環題趙若巖龍山精舍我生倦馳騖無機如漢隂重逰古蘭若對山開我襟風流李謫仙賞静諧夙心琅然哦新詩如聞大雅音回首石林晚白雲花雨深詠蓮迴翔波間風的歴葉上露清池結素彩華月映㣲步雲隂花房斂雨歇芳氣度欲去拾明璫踟蹰惜遲暮送陳惟允之金陵雪消江水緑花發冶城春白下烏衣處輕舟去問津指日望京國行歌非隱淪好及三釜養歸來以榮親徐氏南園對雨櫻桃花欲落風雨暮淒迷忽憶郊園日竹林通磵西弱蔓滋野援蘭葉長芳畦念我當時友蒿萊没舊蹊春日有感春㟁生䕷蕪春風生蘭茝夢見平生歡美人今何在丹槁𤣥以白忽忽容鬢改年邁誰能復憂來誰與解七月廿四日風雨寂寥與𤣥度集宗道南窗具酒肴宴談遂以永日因賦蕭條風雨秋泬寂窻牖晚故人山中來杯酒意勤懇斂睂念乖濶握手話情悃千載鶴怨悲九時蓬苯尊市脯良不易枯魚雜乾脤一作饌浮雲幾翻覆人事非余忖得時寧足誇失勢焉用憤荆溪丘壑多松水饒芝菌結茅駕厓巔雲棲且安穩瑶草手堪摘一作夏凊冬奥燠何事鍤與畚逐逐闤闠逰戚戚塵俗混張子邃古學林君業務本達人解其會畧近宜志逺鍾氏曷仇嵇司馬亦藉阮鹿逰姑蘇臺鳥下長洲苑麻姑固狡獪蓬萊歎清淺七袠吾已老一簣君宜勉後會未可期作詩陳繾綣為方厓畫山就題摩詰畫山時見山不見畫松雪自纒絡飛鳥亦閒暇我初學揮染見物皆畫似郊行及城逰物物歸畫笥為問方厓師孰假孰為真墨池挹涓滴寓我無邊春題驪山圖校獵上林苑洗馬昆明池霜威肅笳鼓雲氣畫車旗馬班陳賦咏衛霍綏蠻夷王風既未逺文明方在茲逶迤霄漢上鳳皇尚來儀為徐有常畫葉湖别墅葉湖水淪漣松陵在其西望見吳門山波上翠眉低白蘋晚風起寒烟逺樹齊水蕉籠華檻一作筆格露栁罩金堤居貞寧汲汲旅泊自棲棲屏處觀魚鳥風雨夜烏啼題墨竹送顧克善府判之髙郵髙郵古淮甸世産不乏賢顧君往佐郡才華當妙年歌詩隱金石八音以相宣侈哉錦囊句雅甚朱絲絃而此艱虞際撫事一愴然饑者易為食君能念顛連何以贈子行墨君霜節堅三月六日同李徴士逰禪悦僧舍禮上人出柯博士所賦詩以示僕而博士君歿已二年展誦為之悽斷因次其韻於後佛生七佛後乃知青出藍寒月留孤光世人徒指談嗟余墮狙網朝暮逐四三悲嘆明鏡塵何由息禪龕題畫贈岳道士義興岳道士野鶴如長身我知彌明徒不是侯喜倫結喉吟肩聳鐵脊霜髯新手中石棊子頭上漉酒巾久居離墨山自謂無懷民喪亂不經意松陵留十旬香雲作輿衛長松為主賔既滋數畦菊復種二畝芹樂哉以忘死道富寧憂貧為我具舟楫相期桃花春題畫贈徐季明梓樹隂當户時聞好鳥鳴獨攜一壺酒展席坐前楹招邀白鶴侣吹弄紫鸞笙杳杳日景晚紛紛飛絮輕風翻竹影亂明月已東生龍門茶屋圖龍門秋月影茶屋白雲泉不與世人賞瑶草自年年上有天池水松風舞淪漣何當躡飛鳬去采池中蓮畫贈呂志學江雲昏絶巘汀樹猶斜陽獨立霜栁下渺然懷故鄉歸來茅屋底篝燈寫㣲茫畫竹贈志學緑竹飽霜雪歳寒無荏容風至夭然笑復愛夏隂濃寒暑不能移徳比柏與松豈若桃李榮春花但丰茸畫竹寄友人先春競桃李淩陽嘆蒲栁謝君静者徒種竹安所守亭亭清浄心鬱鬱霜雪後賦詩寄逺懷此君真可久西老圖弔古嘆流俗髙人陳太丘開牕玩蘭雪邀我畫瀛洲池上哦一作賦清詠林間恣逺逰悠然遂永日下榻更淹留題畫贈九成有引至正十二年三月八日冒風雨過九成荆溪舟中劉徳方郎官放舟煙渚留宿談詩明日快晴移舟緑水岸下相與嘯咏仰睇南山遙瞻飛雲夾㟁桃栁相厠如散綺霞掇芳芹而薦潔瀉山瓢而樂志九成出片紙命畫眼前景物紙惡筆凡固欲騁其逸思大乏騏驥康莊也歐陽公每云筆硯精良人生一樂書畫同理余亦云焉時舟中章錬師岳隱者對奕吳老生吹洞簫故人郯掾史邀我宿溪船把酒風雨至論詩煙渚前晨興就清盥思逸愛春天復遇武陵守共尋花滿川黃本中書齋為寫寄傲窻圖庭樹緑交䕃時鳥語清綿春竹羅徑笋夏花敷沼蓮慨然三季後契彼羲農前古井汲脩綆空齋縆素絃長歌歸去來悟悦陶公賢終尋桃花崦息景窮幽𤣥送賢良北上吳山朝靄外閶門春雨餘超忽孤帆逺天末浮雲舒君今北闕逰我棲南山廬荷鋤事耕作閉户詠詩書髙林鳴禽曙青苔行跡疎還期茅簷下一枉故人車惻惻行三月十五日陸𤣥素將從梁鴻山歸吳松之上是夕坐至夜分始别余入舟賦此追至梁鴻山寄之以定及冬重來之約惻惻復惻惻憂思從中發感子逺來訪畏子遽言别不有同心人何以慰孤寂矧茲春夏交蕭艾盈路側江水亦浩漾風帆還飄突行將阻攜手轉覺意忽忽交好匪在今髙誼敦自昔人生寧無别所悲歳時易坐嘆辛夷紫還傷蕙草碧僕夫竊相告怪我悲憤塞山中梁鴻棲江上陸機宅井臼今蕪穢鶴唳亦寂寞余往經其壖徘徊但陳迹天地真旅舍身世等行客汎汎何所損皎皎奚自益脩短諒同歸數面聊歡懌寄張外史神鸞戲𤣥圃巨鱗偃溟渤爾亦碧巗中遁形修隱訣燒香庭竹浄洗研池苔滑撫弄無絃琴招邀青天月跡髙行亦苦冰蘗忌芳潔何當往相尋拂石棲松雪次韻别鄭明徳思君阻言笑三歳同一日既見令人怒不見令人憶揮觴縱謔浪抗論殫今昔世方雜涇渭已乃忘得失饞涎飫甘美醉眼亂朱碧少逢人眼青每遇俗眼白不隨世混混自喜心得得講學日光輝盡性久循率不意吳市門尚復有此客茅齋素壁上佳句手自摘楓林已揺落梅蕋尚未折吁嗟歳云暮感歎終日夕殘生能幾面念此氣填臆富貴真可羞功名竟何物世事蟹登籪危機猩着屐翁乎善自守氣體保寜逸去去勿重陳且復混玉石贈張以中吾友張以中少年如老翁因過脩竹裏邀我碧巗東琥珀松醪釅玻璃茗椀紅子端今已矣千載事同風答張錬師安居已度夏卧病乃經秋朝菌悲影短風萍歎波浮寸田勤自治徳宅可歸休慎勿與時競心境似虚舟贈陸有恒學行美徳業孝弟為本根朝益以暮習夏凊而冬温無逸勤稼穡幹蠱持户門勿為習俗流必念古義敦謹身尚節儉從善報蘭蓀堯舜雖有子朱均乃淫昏瞽鯀何頑凶子也大聖尊蓮固生汚泥木可為犧樽簡編螙蟫出各有至理存惟人異禽獸暴棄湮其源惟學必由本根深見枝蕃於何繡鞶帨外飾奚足論安宅正路間爾居行爾轅斯道邇且易至樂不可諼次韻張伯琦長嘆悲人寰彈琴想天際夏殷禮相因孰謂周可繼大道久榛蕪髙才日凌替遺書歎不泯授受豈有二鄒孟道性善宅路喻仁義後生事言説慨彼涕沾袂允矣二三子仰鑽互立志松柏受命獨歳寒鬱蒼翠誰歟無媿怍夙駕尋吾契贈友一作律詩父子相師友周南義理門阿翁如玉潔賢嗣似春温舍後自生笋堂隂亦樹萱西山近在望静黙以忘言吾友陸友仁甫舊得古銅印一鈕以示余辨之文曰陸定之印以名其子而字之曰仲安友仁既沒仲安求為賦焉吾友伯仁甫覽古閔世盲示我古印章始得自幽并辨文曰定之釋義為爾名既名字仲安勗哉在敬誠仁甫今則亡緬懷涕沾纓繄昔黃太史結交漢米生手持玉刻文螭鈕交縱橫上有元暉字印刓與弗輕殷勤字其兒祖父冀可繩久矣學業懋繼述暉芳英書畫比二王價重十連城髙躅思仰止景行爾其行韓伯休韓康抱淵静匿影以逃名亦有梁伯鸞五噫出漢京諒哉古賢達道與人俱貞不以身狥物物固莫之攖胡為貴目前狗茍且蠅營粗計一時得不禍害乃生爾其繩祖武景行尚勉行畧上人松月軒虛牖宿閒雲長松掛眀月道人初定起浄境無炎熱手持青鸞帚衣掃石上雪泠然滌心塵寂照光不滅和拙逸先生閒居韻芻豢非所悦甘我藜藿味無辱奚必榮知足方可慰客行值炎天嘉木予來塈禁汝忿慾心養此浩然氣見義思必為奮若泉觱沸學焉茍無成斯亦不足畏寄良夫契友昔者安豐董朝耕暮讀書親樂以妻順山樵而水漁徐子慕古義林卧獨端居彈琴咏王風窅然觀化初月窗淡疎竹跏趺當久如附次韻徐達左故人雲山表日事琴與書藹然重交義不肯忘樵漁奚奴將錦囊來覔水竹居佳畫入幽趣雅句復古初七襄不成報髙風慕相如答徐良夫八月七日偕耕雲叟訪耕漁隱者風雨寂寥中為留三日有圖書筆硯之樂九日耕漁賦詩見贈次韻奉答雲卧雨聲集庭樹颯以秋身同孤飛鶴心若不繫舟燕俎登松菌匏尊㪺磵流蘭芳日凋悴吾生行歸休不作螻蟻夢逰神鳳麟洲青山澹相對白髪忽滿頭仙去雲冉冉風鳴竹翛翛諒哉伐木詩鳥嚶尚相求居吳二十載未及茲山逰君才如鮑謝摛詞亦云優歡然敬愛客能不為爾留桑土夙所徹户牖何綢繆地無車馬塵路轉巖穴幽既晴引飛屩回望林間樓附錄謝雲林處士畊雲照磨見訪徐達左凉風起幽壑蟋蟀鳴素秋之子從何來飄然駕輕舟蕭散古冠帶乃若晉風流須眉既皓皓吟嘯方休休永懷眉山學氣逸鸚鵡洲能書誇草聖善畫追虎頭嗟哉市井人白眼看前脩鶴鳴溪渚隂自為同氣求握手叙心素忘形誠舊逰為子下塵榻再宿情思優雖無盤飡美蘋藻聊淹留開懷寫髙興彼此情綢繆况有王衍談臨清偕討幽期看丹桂月尊酒登髙樓附徐山人與雲林贈答詩韻髙啟昔逰紫藤塢空山鶴鳴秋相望隱人居興䦨竟回舟邇來獲晤賞𤣥談劇風流每欲開南軒招我共偃休天寒鴻雁鳴芰荷落長洲豈無一釣船訪子溪水頭終慚文墨牽咫尺成阻脩聽雨掩閣卧觀泉上巖逰朝覽贈答篇詞藻誇兩優我本丘壑人猿鶴肯見留擬結歳晏期壺觴展綢繆况聆西澗濵禪宮閟清幽夜看太湖月遲我同登樓倪元鎮山水圖為胡中書頤題次韻李東陽移尊向别圃展巻開清秋上有千仞峰下有一葉舟蕭蕭虚籟響脉脉寒谿流時則當改序吾方賦歸休鵷鴻謝髙侶鸚鵡思芳洲種松少三徑栽橘無千頭卜居擬南國仰止懷前脩松泖昔遁跡蘭陵多勝逰往事勿復道遺蹤猶可求畫圖與詩巻天地長為留辭榮獲髙價所直亦已優生也諒云晚感之念綢繆恨無雲霄翼暫此林亭幽眼中人老矣空憶仲宣樓題髙士圖僵卧雪塞户汝南袁邵公冠葢洛陽令埽雪見髙風冷竈不生煙虛斚久塵蒙投謁非吾事舍君其誰從道翁先生取余棄筆戲成五言因次韻生與硯為隣誰知楮穎珍饑鳶雜吟嘯那用憂空囷夭矯鍾王跡遒媚骨肉匀澄懷静臨寫時時見天真吳淞山色圖一作律詩吳淞春水緑揺蕩半江雲嵐翠窗前落松聲渚際聞潘郎狂嗜古容我醉書裙鼓柁他年去相從逺俗氛惟寅友兄雅志林壑逺寄佳紙命僕寫圖賦詩因作此以寄歳己亥五月八日齋居誰為友毛穎與陶泓有客附書至云是楮先生潔白中含素柔滑表至精愛此風林意更起丘壑情寫圖以閒咏不在象與聲至正乙巳五月三日過開元精舍希逺首座為設湯餅煮茗焚香相餉眀日將還穹窿寺因寫竹枝賦詩贈别僧夏已安居還山寺在郭初心了𤣥解自不為律縛度水獨浮杯采苓時負钁余亦漫浪人枵然慚濩落余自與庸叔别後不相見近十載矣今年冬邂逅吳下班荆道舊殆若隔世因寫霜林逺岫圖并賦詩以贈賀公雅吳語嘗誦少陵詩逺孫有古風隱居淮水湄開牖望青山尋真歌紫芝鏡湖似清淮煙濤春渺瀰何當棹酒艇與爾相娛嬉永言以鼓瑟獻酬斟酌之伊昔龍眠莊山水含清暉松桂蔚佳色田疇足耘耔結茅飯松术忘年樂熙熙贈此以為好同心勿乖違廿二日贈别耕雲王君瑚璉器清鑒涵水鏡忍窮如鐵石居易安義命鳳兮出非時不與凡鳥並勤勞世勲胄忠孝本天性白圭絶㣲瑕朱絃駭羣聽任直唯疾讒亂雅猶惡鄭悄悄愠迫隘咄咄恥奔競西壠松桂林白雲森相映巖僧同棲止林叟畣嘯咏於時無美刺托物善比興藹然顔淵樂陋彼原憲病瑗乎知非久慧也安心竟怡性夀而康克戰道斯勝蕙草秋更緑松聲寒愈勁何當戲𤣥洲相期適遐迥廿三日聞耕雲至北村將來此自余來南邨忽忽數日矣犬豕混人目烏鳶聒人耳不見佳友生如逃空谷底足音聞跫然云胡而不喜曹君達卿婁江西渚隱君子也自號古民息景燕處以禮義悦心亦不求知於人今年七十三而耳目聰明體力强健有三男子皆能愉婉其容色以為養又信而智古之樂以悦生優㳺以佚老者吾昔聞而今見之矣耕學叟命為之詩隱處婁江渚逍遥古逸民苔石作牀坐青山為主賔商巖黃綺輩北牖羲皇人漁郎問津去源上桃花春蘧廬詩并序子蘧廬子蔡質賢也有逸人居長洲東荒寒寂寞之濵結茅以偃息其中名之曰蘧廬且曰人世等過客天地一蘧廬耳吾觀昔之富貴利達者其綺衣玉食朱户翠箔轉瞬化為荒煙蕩為冷風其骨未寒其子若孫已號寒啼飢於塗矣生死窮達之境利害毁譽之塲自其拘者觀之葢有不勝悲者自其達者觀之殆不直一笑也何則此身亦非吾之所有况身外事哉莊周氏之達生死齊物我是逰乎物之外者豈以一芥蔕於胸中莊周我所師也寜為喜晝悲夜貪榮無衰哉予嘗友其人而今聞其言如此葢可嘉也庚戌歳冬予凡一宿蘧廬賦贈天地一蘧廬生死猶旦暮奈何世中人逐逐不返顧此身非我有易晞等朝露世短謀則長嗟哉勞調度彼云財斯聚我以道為富坐知天下曠視我不出户榮公且行歌帶索何必惡寄叔方乖阻方徂秋忽然已改年樓前櫻桃花開落春風顚米船到家日雨砌溜涓涓緑酒仍滿眼素琴久無絃呼我共斟酌歡劇更惘然處窮則已固言達誰當先俯仰歎鳶魚浮沉各天淵慎勿傷本性木雕而土埏鸞翔安可挽青雲氣翩翩猶羡羲皇人清風北窗眠癸丑八月訪耕雲髙士於西巗因寫耕雲軒圖又為之詩芝田耒耜閒石廩山雲滿渚際荷衣翻巖前蘿帶緩埀露藹輕帷芳池沃清盥霞飡非腥腐物化自脩短空囷未足憂服食滋楨幹宿王耕雲山居城市厭煩燠江山玩清逺盥濯臨石湖吟嘯望雲巘范公逰集地登陟塵情遣悽悽靡遺構鬱鬱猶荒苑仙人王子晉抱道雲舒巻鳳吹翔河汾鶴巢來棲偃涼風縱逸棹溪水清涴涴何當采靈芝忘年從嵇阮周遜學辭親秋暑將事于役因寫幽磵寒松圖并詩以遺之亦若招隱之意云秋暑多病暍征夫怨行路瑟瑟幽澗松清隂滿庭户風聲雜湍激古音奏韶濩張幄儼停雲埀帷粲繁露諒哉如金玉周子美無度息景無狂馳笑言以胥晤附次韻周南老泠泠澗底泉迢迢溪上路隂壑生松風好山當牖户睠茲幽貞居歸來已遲莫應門幸有子兹行迫王度願言早還家衰年慰言晤拙逸先生賦古意見招次韻奉答楚狂昔悲歌鳳兮何徳衰行邁心揺揺薺青麥離離雨雲歎輕薄交道傷嶮巇鴻鵠志自逺燕雀棲其卑風吹枳棘藂月照琅玕枝姦慝與賢智邪正亦易推忠本由恕立義豈為利移瞳子分瞭眊履蹈知醇疵折栁以樊圃狂夫尚睢睢不以禮自防言動輕乖宜友焉不以道異端固紛披君看枯魚泣魴鯉慎所之題呉仲圭詩畫次韻元初真士嘗居嘉禾紫虚觀好與吳仲圭隱君逰故得其詩畫為多今年十月余始識元初即出示此幀命僕賦詩因走筆次吳隱君詩韻題於上隱君自號梅花道人云至正廿一年辛丑鴛湖在嘉禾湖水春浩湯家住梅花邨夢遶白雲鄉㺯一作染翰自清逸歌詩更悠長緬懷圖中人看雲杖桄榔附梅花道人原韻平林方漠漠野水正湯湯蒼莽日欲暮辛苦客異鄉草店月迴合村路迂更長渡頭人散後漁父正鳴榔清閟閣全集巻二
