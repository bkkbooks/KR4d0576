body:
  text: 清閟閣全集巻十二外紀下題雲林詩集張伯雨龎公有名言魚鳥託棲止而其遺子孫亦在安而已子有丘壑趣文弱與時背强豪方蛇呑貪黷亦虎噬何以犯多難適為田業累深泥没老象自拔須勇志連環將誰解旦暮迭興廢所以明哲徒置身興廢外賢哉蘧伯玉知非復何悔韓奕達人枕高志清時樂其間棄彼千金産俗事非所關逺偕方外士勝日相徃還放舟五湖上杖策遊名山百年見遺墨清風灑人間豈若鄙夫輩狥物遭時艱斯世與斯人邈兮不可攀張子宜亂離見說長為客客裏清幽近亦聞夕宿只歸書畫舫朝飡仍對鷺鷗羣潔身穢跡縁時晦寫竹題詩任夜分寂寞江郊君去後相思日暮隔重雲吳寛高人自號雲林子獨住雲林歳月深足底千峰幾兩屐人間六印一鈎金華陀無術醫清癖蘇晉長齋養素心寂寞小篷湖上路百年陳迹莫追尋阮籍疎狂甘自放清風高卧酒杯深池塘夢去忽生草丘壑移來不換金脫帽竹間朝沐髮焚香花㡳夜清心祇陀舊宅風烟古一片五湖何處尋題雲林竹枝虞集曾留閟閣齋中坐共聽鶯啼入户枝舊跡空看遺墨在娟娟寒玉想幽姿老鐵在素軒醉書懶瓚先生懶下樓先生避俗避如仇自言寫此三株樹清閟齋中筆已投曲江居士去年溪上泊輕舟笑弄滄浪狎海鷗雲去樓空無此客寒林留得數竿秋無名氏不見倪迂今幾春故山喬木𤨏浮雲晴牕展軸看圖畫淡墨蒼然對古人憶昔帶經東海鋤故山有錫遂奔吳正揮秋雨黄花淚忽見青山暮靄圗杳杳鶯啼緑樹風夕陽洲渚亂殘紅雲翁筆底無聲句數疊青山似剡中題元鎮天池石壁圖張伯雨嘗讀枕中記華山閟中吳神泉發其顛青壁繚其隅春風四山來羣緑互紛扶羽觴曲折行浮花與之俱采珠搴薜荔洗玉弄芙蕖聱叟頗好名石窪作魚湖鴻一志草堂挑烟遂成圗而此滌煩機閱世如樗蒲發興雲林子盥手為我摹居然縮地法挈入壺公壺題雲林三樹圖楊維禎不見倪迂今十載陸莊春雨帶經鋤祇陀林下三株樹為報桐孫長一枝雨後雲林圖浮雲載山山欲行橋頭雨餘春水生便須借榻雲林館卧聽仙家雞犬聲題雲林寫竹石寒雨贈錢自銘雲林色晻靄竹樹氣蕭森翠石留朝潤青樟生夕隂飄零滄海夢搖落故園心儗就歸舟訣應須買賦金題元鎮枯木竹石鄭元祐雲林子外生死解内敬為天使帶經而鋤倦即休亦復拈筆為林丘樹枝鱗皺岸石幽若有人兮在空谷招之不來兮雲慘瘁以令人愁題畫倪郎作畫如斵冰濁以浄之而獨清溪寒沙瘦既無滓石剥樹皴能有情珊瑚忽從鐵網出瑤草乃自齋房生譬之飲酒不求醉政自與物無虧成題元鎮畫并序王行東海倪君瓚字元鎮居南蘭陵之梁溪家故多貲不樂進取以詩酒縱適山林泉石間每援筆自圖其所遊境象好事者多得之庸人俗流求終不與晚年家益索時徃來吳城中隨處宿留一日雲間人有以財自雄者聞君名使使致綺縠縑布雜物直數百千館下君笑曰此人亦知有我將受之使出楮三數握前曰主願得佳迹為玩君即赩然曰是欲工藝我耶乃盡以所遺散與坐間寒客下及陪臺賤夫不留毫髮謂使曰趣持扇去語而主我畫不可賄得也其自許重如此此幅其盛年迹也法度修整氣韻清逸立方今之勝士其愛藏之故有以哉君逝矣見之令人増念因詩於上并志其概云平生泉石共襟期身後園林失舊姿最是令人久相念詩中圖畫畫中詩題畫馬治潦倒雲林百感生羞將野褐對塵纓蒼厓過雨吟秋色翠竹臨池寫月明寂寂松陵前日恨依依荆渚故人情春風離墨山頭路有約雲端與采榮雲林先生廿年前避地吳門士多從之遊而吾鄉伯昂隠君時年力方壯數亦漫浪松陵笠澤間於先生風義尢篤釣船書舫茶具筆牀日相徃還以詠歎今古為事楓江栁灣雲汀烟渚視皮陸風致盖無甚相逺矣此圖當得之雲林得意之時故特幽絶清逺可尚伯昂藏之巾笥已廿八年而先生自吳歸梁溪没且七載俯仰人事有足深慨者余放舟西陽渚間宿諸卜氏天大雨雪與伯昂坐卞鏞館中欵曲者累日旦起晴冰四簷日光凝寒諸峰玉立窓户殊不類人世也隠君因出此徵題呵筆用雲林韻甲子冬閏月廿日也瑤城月淡江南渚疎竹冷冷影寒翠畫舫不驚沙上鷗誰為嬋娟扶晚醉聽雨樓題詠至正廿五年四月廿七日黄鶴山人王叔明於盧生聽雨樓中畫生名恒字士恒時東海雲林生同在此樓玉雪坡周伯温至正八年二月十一日為盧山甫題樵人張雨雨中市井迷烟霧樓㡳雨聲無著處不知雨到耳根來還是耳根隨雨去好將此語問風幡聞見何時得暫閒鐘動雞鳴雨還作依然布被擁春寒荆蠻民倪瓚河濶樓低雨如洗祗疑身在孤篷底清晨倚檻看新晴依舊山光青滿几聽雨憐君隠市中我憂徭役苦為農田家那得風波險朝朝愁雨又愁風至正廿五年歲在己巳盧生恒攜至緑綺軒見示輒走筆次貞居外史詩韻以寄意云陶蓬寄亭中人暨諸名勝當不黙然也後十又八年四月九日記虚牖濛濛含宿霧瀑流澗響來何處江湖近向枕邊鳴林風又向簷前去挾水隨雲自徃還根塵不染性安閒多情一種嬌兒女淚滴天明翠被寒擬張外史倪隠君聽雨樓詩韻西澗老樵蘇大年湘簾蹙浪縈香霧幽人高卧雲深處月明叢桂小山空疎烟白鳥滄江去浮沈里社樂蕭閒大隠何妨市井間抛却喧秋清洗耳草樓六月雨聲寒塵生兩耳何由洗喜聽雨聲茅屋底灑然心地自清涼静對鑪熏時隠几乾坤納納懸壺中書田霑潤稱書農也勝江湖風浪惡客舟飄泊怨秋風倪隠君索和張外史聽雨樓詩走筆二首答之堅白老人書於素行精舎海氣雜嵐霧聽雨宜高處風雨無時無倐來又倐去搖搖心懸幡胡為不自閒老人曽聽雪無被不知寒頭白常不洗聽雨重屋底兩耳任喧聒坐隠烏皮几筆耕墨畦中自適如老農二仙隔今古神交在閬風曲江錢惟善一榻春聲雨滿樓杏梢㣲濕五更頭東風更緑江南岸賣劍家家盡買牛荷氣香飄竹外樓雨聲滴碎採菱舟南風一夜生新漲魚鳥還知此樂不積雨生涼轉蓐收碧梧初賈滿城秋鄰家不識余心樂也愛書聲在小樓天池嚴凝萬壑冰不堪寒雨灑孤燈一樓清氣猶宜雪紙帳生春睡未能醉翁饒介之城市不著耳江湖留此心樓高人更静惟有夜懷深渤海高啓春雲靄江郭鳩鳴朝夢餘樓中雨颯至煩抱澹云除歴歴樹頭亂蕭蕭牕影虛如何門外水泥潦没行車齊郡張紳山牕聽春雨冷氣襲病膚舖牀閉齋閣衣被薫香爐風燈苦屢挑夜茗更相呼煩囂悉屏逐妙裏在跏趺憶子草樓底兹情還有無尋陽張附鳯承平時貞居張道師與雲林倪徵君並以翰墨風致齊名吳中二人者亦雅相引重先君子與貞居游最早予時以童子侍坐隅尚能識其丰采今先君久已去諸孤貞居亦化去天下多故而予始得從雲林君游至正乙巳季夏之九日予謁君于盧士恒氏之聽雨樓獲觀近製詩若畫冲淡雅致令人塵慮洒然既而士恒出此巻徵題二君之作具在因賦存殁口號附于巻末以寓感慨之思云華陽洞裏烟霞閟雲石山中草樹荒惟有小樓曽宿處年年春雨滿滄浪黄冠野服神逾王畫筆詩篇老更奇白首故人無在者小樓殘燭雨來時淮南馬玉麟江雨飛來夜氣澄小樓高處冷于冰聲留焦葉頻欹枕影亂簷花獨對燈逺客異鄉生白髪故人今夕擁青綾致君堯舜慚無術思入湖天睡未能雲門山人張紳重題草樓聽雨夜春燈隔重簾瓶中新茗煮奩裏舊妝添風珮潛歸浦雲璈亂綴簷乍驚來湛湛更覺去纎纎頗被風相妬還疑雪與兼喜隨魚艇泊愁怕客牕淹頭白盧徵士高情苦未厭王謙觀張外史所題山甫盧隠君聽雨樓詩詞翰瀟灑令人有超然之想噫故物也士恒其慎藏之四月三十日寫于客居山風滿樓來雨脚耳底蕭蕭生逺情還丹化鶴去句曲破屋無人住洛城酒停深夜蒼燈在簾近餘寒濕葉鳴板上漆書空爪跡繞簷依舊落春聲檇李鮑恂吳郡盧君山甫舊有聽雨樓山甫殁殆二十年而斯樓尚存予抵呉惜不得見其人今其子士恒攜張外史所題詩來示余余覽之不勝感慨遂賦一首至正廿五年四月一日更深樓外何蕭瑟半帶滄江逺樹風疑似千秋霜葉下坐殘一穗燭花紅斯人雅致今安在此夕幽懷孰與同老我題詩成感慨雨聲有盡思無窮開封鄭元飛樓何凝隂雨氣正含霧蕭灑集羣霤淅瀝散高樹聲懸長風外坐想當瀑布習喧久漸息静聽乃真趣隂晴造化意年芳暗中度白髪如散絲慿君寫幽素卧龍山民王宥雲林夜澄寂有雨彌更佳漠漠著樹穏霏霏度簷斜入静意所便争喧競浮誇弛張任槖籥細大無根芽妙運出𤣥造至理忘紛拏變化本因妄聲聞耳生瑕不如且置之攝心静無譁危坐不須寐呼童剪燈花金陵嚴瑄層簷集飛霤深砌走鳴瀑餘聲發天籟清風入林屋風波任喧洶燕坐瞑雙目置身得蕭爽洗耳絶塵俗香穟鬱水沈簾花映湘竹篝燈動春酌剪韭留夜宿與客對牀眠清談未云足浚儀趙俶幽人愛樓居燕坐風雨夕高簷瀉飛湍空除隋殘滴傾耳疑枕流屏喧時岸幘江聲晚蕭蕭樹葉寒􅉡􅉡境絶迹更佳趣淡情自適霽曉恰憑䦨春深杏花赤淞上釣鰲生書於百花洲上一年過京口帆飛疾如走半江疎雨隔蓬聽瀉下驪珠三百斗一年過漢陽雪山翻怒瀧黄鶴磯頭泊船住醉聽秋雨眠西江一年過東海急雨亂灑船牕外洞庭帝子鳴鈞天蓬萊仙人鏘玉珮今年過長洲故人邀宿聽雨樓玉山顛倒恍惚醉一笑使我消離愁公本拏雲夫我亦聽雨客明朝大晴當奮飛萬里天風振鵬翼聽雨樓詩跋勝國之季兵變之餘前輩翰墨存者無幾間或獲一見如遇蜼彞兕敦不由不使人忻艶也聽雨樓詩句曲外史及一時名流所作詞翰兼美亦希世之寳也吳中盧士恒父一日出示於予巻中作者多予故友兹睹其翰墨儼若覿彼風度士恒其珍藏之勿輕示於人焉洪武二年春正月二日吳僧道衍題少年聽雨歌樓上銀燭昏羅帳壯年聽雨客舟中天濶雲低斷雁呌西風而今聽雨僧廬下鬢已星星也悲歡離合總無情一任空堦㸃滴到天明右竹山先生所作之詞予偶獲觀此巻因舉是詞成甫俾書巻末夫聽雨一也而詞中所云不同如此盖同者耳也不同者心也心之所發者情也情之遇於景接於物其感有不同成甫中年人有樓聽雨吾意其與在僧廬之下者同其情成甫乃曰吾聽雨吾知在吾之樓而已遂書竹山姓蔣名捷字勝慾義興人巻中諸先輩之先輩腔虞美人也韓奕題聽雨樓諸賢記張雨字伯雨號句曲外史武陵人學道三茅峰而才名滿天下若虞文靖公黄文獻公咸稱重焉先生妙于書人得片紙咸以為寳至今好事之家多蓄之客至則相與為玩先生詩法黄太史清新高邁不流於衆雖元氏翰林諸公亦自以為不逮也倪瓚字元鎮號雲林先生無錫人家最饒而先生脫畧紈綺一事於翰墨作為詩章妙絶一世人欲不服自不能不服也虞文靖公張外史伯雨深相契焉然先生性癖傲物多忤於時元末棄家業泛舟五湖三􅍩間興至則捉筆寫烟林小景或竹枝偶流於市好事者争貿之雖千金不靳也王蒙字叔明吳興人號黄鶴山人趙松雪之外孫也素好畫盡得外氏家法然不求妍於時惟筆意以寫其天機之妙為文章不尚矩度頃刻數千言可就君子咸以豪士目之蘇大年字昌齡揚州人元翰林編修天下亂寓姑蘇為文章有氣不喜衰颯江海襟懐亦人中之豪也饒介之號醉翁江西人元氏寓姑蘇以跌蕩自任工於書君子評之者謂渠不減懐素至今人家有之周伯温號玉雪坡饒州人為人慎重為元氏左丞天下亂流寓胥臺而無所就然妙於古篆得趙文敏公遺意字頗肥而玉潤可愛士君子至今寳之錢惟善字思復松江人元末進士詩得杜子美法不茍作作必致其妙張紳字仲紳濟南人慷慨激烈不𤨏𤨏於世事作為詩文雖不經意而自成一家能議論終日亹亹不休盖北方豪傑之士也歟為本朝浙江布政而沒馬玉麟高郵人元氏為長洲縣尹有政聲括蒼鄭明德先生有碑卒於偽吳鮑恂字仲孚嘉禾人元氏乙亥科易經進士為本朝文淵閣學士為人慎重不可狎而學行名天下有學易舉隅行於世後以事累卒於外趙俶字本初紹興人元氏乙亥科書經進士龍馬賦為時所稱許先生性耿介不易與人交交必久為本朝太學博士而卒張羽字來儀一名附鳯與高啟行輩也治易攻於文文學歐陽子甚縝密宛轉可愛雖前輩自謂不及也君本潯陽人元氏亂寓湖州為本朝太學博士而沒道衍字斯道姓姚氏姑蘇人𢎞才茂思為時所稱與張來儀高季迪輩為文辭相頡頏而澡思浴德則非諸君所能及故天下皆以參寥潛子目之皇上龍興以贊佐功封少師賜名廣孝盖又與元之劉秉忠並稱云高啟字季迪姑胥人身長七尺而好於詩得唐人體裁語精而意圓句穏而情暢雖前輩有所不及焉為本朝編修官後歸家卒王謙字鳴吉姑胥人以春秋學為府學教授王宥字敬助與高啓游能為文陶振吳江人有詩才然性不羈人或易之韓奕字公望吳之良醫也好與名僧游所云蔣竹山者則義興蔣氏也以宋詞名世其清新雅麗雖周美成張玉田不能過焉右聽雨樓詩巻其間所載皆一時名士誠可寳也然予觀此巻而人品有三其至高者聞而知之其次者事而知之其至次者交而知之若伯雨張公元鎮倪公其殆最高聞而知之者與自叔明先生以下予髫年曾事之自來儀以下予少年時曽交之總若干人皆能以文章名世者也然自衍公外多乾没無聞至如伯雨元鎮二先生若精金美玉不可冺没况其負超邁之才遺世獨立高潔無累周覽六合盡大觀而無遺乎予幼在鄉里時嘗聞吳城盧士恒家存此巻欲一見而不可得者無不愛惜今我友沈成甫偶得之誠可賀也成甫寄至京命余題始得一覽焚香展巻清風凜然使人毛骨頓爽予復何言姑述巻中作者諸先輩出處大畧以為諸賢記成甫姓沈名睿號存耕有才識善吟詩好與賢士大夫游予之布衣交然則觀斯巻者當仰其清風素範益勵其德哉勿以吾言為謬矣時永樂五年歲丁亥二月初吉翰林侍讀學士奉訓大夫錫山後學王達識右聽雨樓詩畫一巻元季及國初諸名公為吾蘇盧山甫父子之所作也永樂間流落錫山沈誠甫氏誠甫嘗求王内翰達善記巻中諸公出處之大畧藏之以為至寳竊念淳熬擣珍非遇易牙不足以知其味之美雲門韶濩非遇師曠不足以知其音之妙使後或非其人其不視為篋中之故紙而覆之醬瓿者鮮矣聞吾相城沈翁孟淵博雅好古其子若孫多賢而且才必能賞鑒乎此可以寳藏於永久不逺百里持來奉翁翁一見之喜乃以厚禮答之既而即瀕溪小樓扁以聽雨置巻坐右暇日輒游玩諷詠恍若接諸公之光儀而聆其罄欬也一時名人勝士登斯樓披斯巻未嘗不心醉神怡斯樓之名遂擅勝於東南是雖翁之高致所就然亦豈不以斯巻之所在乎或曰諸公無恙日翁多親炙之者惜乎斯巻不為翁作而為盧氏故物也予謂不然夏后氏之璜封父之繁弱豈為魯國之制耶魯之先公所得分器子孫世守之以為至寳也斯巻也其璜也其繁弱也翁之子孫寳而守之又奚知其為盧氏物耶翁之孫啟高出以示予僣贅于左方云成化庚子清明日長洲陳頎識題雲林竹鐵笛道人瑟瑟清風響翠濤青鸞飛影下亭臯何人吹斷參差玉滿地月明金錯刀張簡廣平舊作梅花賦鐵石心腸嫵媚辭高士巖前清賞足月明竹外寫横枝笠澤莊頭道士家書林風竹翠交加新梢便有凌雲勢高出牆簷掃落花永嘉文信粲粲碧玉枝託根在崑崙日出四海静影拂青雲端君王愛直節樹之黄金門華繁實且多持以慰青鸞如一道人海上琅玕碧玉枝紛紛蒼雪帶雲飛仙人拾得青鸞尾裁作朝元翠羽衣雲林寫竹與梅巖自比清貧太守饞蒼翠滿庭都似玉一枝先喜出松杉涼隂一片在灣碕墨捲蒼龍起硯池記得月明江上見秋風吹折玉參差楊基清閟閣前烟雨春梅花巖裏玉生塵老懐不聽參差曲却剪横枝贈野人謝徽風葉響秋林烟梢帶夕隂美人離思逺湘水夜來深王逢雲林不作桃花賦能為梅巖寫竹枝雨過粉香渾欲濕月明清影似曽移静臨童子敲茶臼隠接吾家洗硯池日暮天寒倚高翠絶勝雉尾露宫墀王宥堂上娟娟竹翛然悟澹游南風時隠几不復夢洋州周彞我愛雲林竹繞池繁隂映水翠漪漪十年不到蕭閒館却寫秋烟慰所思高啓秋思與秋影閒齋助夕清幽人夢回處烟烏月中鳴天台葛蒙美人華翠裾步入虚堂裏月落聽秋聲憶在湘江水雲林畫竹樹秀石饒介斷劍故留碧館刀終有神祗陀歲寒色不似醉時真于思緝喬木千章高出雲幽篁幾个石嶙峋平生丘壑真成癖莫怪烏藤來徃頻高巽志蒼然古木石巖幽移得江南一段秋共說倪君知籀法數竿瀟灑更風流唐肅木落秋吟夜露翻山空無人石榻寒不似君家子午谷雲旗晝下𤣥都壇薛毅夫雲林之樹森如玉春雨琅玕長更多使我臨風重懐想幽篁嘉木共婆娑王燧流光冉冉逐驚波文物空存晉永和遼鶴重尋舊城郭當時風致已無多永嘉陳允明長憶山中舊草廬蒼厓古木共扶疎今朝偶爾看圖畫便擬身同木石居張簡支機靈石墮星河夜半紅光發磵阿憶在樓神山下宿闕盧充賴清閟當年風度雲林此日襟期每向詩中見畫今於畫裏觀詩余銓三春雷雨蒼龍角萬里雲霄翠鳯毛怪得君家圗畫裏虚牕涼月夜蕭騷熊君元修徵予詩適雲林過而見之訝曰此予舊所作今忘之矣僕因戲之曰對面不識梁武違機優孟善為孫叔敖識者駭其扺掌談笑然九方臯巨眼當不在驪黄牝牡間也遂相與一笑且賦詩曰相思喜似人相對憶風神親見雲林面分明識主賓時至正癸夘二月一日姜漸題雲林生畫林亭逺岫癸夘歲夏五月初十日題灌園翁顧敬雲林八法寫倪迂夏木幽亭翠幾株雨後長洲政如此騎駝山色近如何高啓歸人渡水少空林掩烟舍獨立望秋山鐘鳴夕陽下尋陽張羽灑掃空齋住渾忘應世情身閒成道性家散剰詩名古器邀人玩新圖揀客呈可憐山水興投老失昇平此余處圍城時懐雲林詩也今道路既通猶未得一聚首為恨適志學徵君持此求題因書其上羽題迂繆生吕敏憶過梁溪宅於今向廿年賦詩清閟閣試茗惠山泉夜雨牽幽夢春雲黯逺天鄉情與離思看畫共茫然辛亥五月過𢎞道四齋又題一首葱蒨夏林緑高齋一例曛幽花埀法露逺岫歛歸雲停箑風初至移尊酒半醺明朝憶佳賞回首念離羣太原王行每看新圖憶舊遊逺情閒景共悠悠亂鴻沙渚烟中夕黄葉江村雨外秋亂後得安反訝夢醉來因感却生愁那能便結滄洲伴重向烟波覔釣舟武陵顧𢎞雲湧岡巒起伏烟籠半樹淒迷空見蘭亭筆法不逢䕫府詩題俞允青山隔横塘疎樹蔽幽徑山中人未歸閒亭秋色暝陳則落花愁殺未歸人亂後思家夢更頻縱有溪頭茆屋在也應芳草閉深春彭城金震開圖見新景翻思舊題處山閣曉來看寒江片帆去微微逺天雁漠漠遙汀樹無那鬱煩襟沈吟起延佇徐賁逺山有飛雲近山見歸鳥秋風滿空亭日落人來少王燧羣樹葉初下千山雲半收空亭門不掩禁得幾多秋俞貞木西神山下𤣥元館華表巍然鶴未歸寂寂小亭人不見夕陽雲影共依依曾烜故山何處最闗心亭外遙岑入望深却恨浪遊江海上漫教猿鶴守空林梁用行原野𣺌無際島嶼深更幽溪増一夜雨木落千山秋闕孤亭亦曽遊披圖宛在目此意良悠悠題元鎮雨竹陳旅落日楚江深鷓鴣啼逺林相思不可見池上寫春隂張仲簡幽篁孤石是行窩秋樹層層碧玉柯聽雨樓中居一月醉時揮灑若為多譚奕仲偉石根疎竹翠翛翛木葉霜空海甸秋晝静雲林人不到一簾烟雨夢南州錢沐自銘泉石膏肓二十年每逢山水即流連畫圖酷似幽人意嘉樹疎篁最可憐陸繼善十年不鼓江南楫木葉蕭蕭鬢影秋忽憶滿川風雨夕雲林岸口獨維舟陳基西池亭館帶芙蓉雲水蒼茫一萬重此日畫圖看不足滿簾秋雨夢吳松沈應幽鳥交啼磵樹中滿庭纎雨落花風相逢正值君多趣清露輕磨寫碧桐吳文泰淡烟秋影墨離離猶似雲林雨後時謾說騎鯨滄海去尚留寒碧想清姿題雲林竹樹虞堪逸筆清才鮑謝間空林竹樹石苔斑良宵月落偏悽斷遼海何年見鶴還天末逺峯生掩冉石間流磵落寒清因君寫得三株樹忽起孤雲野鶴情題雲林為文修上人畫竹石庭前樹子轉屈鐵石上竹君凌古青得見文殊參幻想也應重說浄名經又題畫為王明仲作東遊久不見倪寛落日秋風海樹寒一箇草堂偏窈窕王猷於我憶盤桓參差海樹珊瑚立窈裊風篁翡翠分尚想君家清閟閣臨池誰見搨鵞羣題雲林為張高士畫竹石古樹如何拾取支機石為託當年泛海槎八月河清風露白忽飛鸞鵲影交加侵晨好在不梳頭寫此疎篁古木秋清氣逼人當不得歲寒誰與說風流又个个竹弄雨丫丫樹撑烟還教米拜石癡絶伴清妍題雲林為薛鶴齋畫竹雲林寫竹如琅玕我昔愛之長相看鳯皇去矣秋影獨白鶴歸來遼海寒題元鎮墨竹高啓倪君好畫復耽詩瘦骨秋來似竹枝前夜夢回如得見紙牕斜影月低時題雲林所畫義興山水圗嘗啜陽羨茗不遊陽羨山銅官結秀色都在畫圖間樊川醉遊處水榭依沙樹雲入縣城來溪流太湖去我愛雲林生高歌無俗情石庭梅欲發須放酒船行題倪元鎮竹嘉陵江釣者楊基寫竹是傳神何曽要逼真惟君知此意與可定前身又疎篁結秋陰枯樹濕寒雨空庭鳥雀散索索莎雞語幽人在東沜泉石相與伍仿彿畫中真烟蘿深幾許題雲林畫張憲艮嶽恩榮雨露荒平泉銷廢子孫忙久無人下公庭拜賴有倪迂繼米狂題元鎮竹石懐南湖陸氏畫裏當年事如今跡已蕪對牀懷小陸移棹過南湖老樹春仍瘦幽篁雨欲扶一拳根下石依舊蘚糢糊飲雅宜山人書樓觀元鎮叔明詩畫栁長女垣低桃開小樓近慿闌看春色撫䯗歎天運主人愛逺客清酌倒芳醖坐深顙有泚飲餘臉生暈黄鶴素豪宕雲林靄聲聞畫圖寳名筆詞章騁雄韻諷誦心神驚披閲目力紊予生慕膏馥殘剰苦拾捃君教本家庭翰墨抱遺訓青顔羨軒冕白髮厭孤憤仰真明月珠俯愧蜣蜋糞高玩固可憐退思當自奮題雲林竹枝雲門山樵張紳牕前疎雨過石上晚雲生不是雲林叟無人有此情又春林無人白石香白雲飛來江上房扁舟載得吳娃去三十六灣春夢長題沈御史所藏元鎮竹枝張羽雲林之子有仙骨平生好潔如好色紛紛濁士等蟲沙嗚呼瓚也何由得憶昔嘗登清閟堂金黄寳鴨共焚香紹京墨妙僧繇畫示我不啻千明璫人間萬事如飛電洗玉池空人不見季子城東土一丘何人為著黔婁傳繡衣使者騎青驄曾聽竹枝湘水東歸來見此如夢寐巴陵洞庭生眼中江湖蒙翰今寂落君厚此圖良不薄愧我題詩愧故人黄鶴何年下寥廓題雲林竹枝南州有高士乃在延陵東清時不肯仕滅迹雲林中拂石坐蘿月弦琴寫秋風焚香誦黄老望雲送歸鴻門車常自滿尊酒無時空乗興寫滄洲古人未為工干戈困末路白首隨飛蓬名山乖如願羈遊無所終賴有車武子能哀阮籍窮傾壺醉陶令避堂延盖公流俗輕高賢貧賤困豪雄孤鳯混雞羣野鶴摧樊籠豈無梁鴻徒不聞臯伯通吾將傳遺逸清芬千載同雲林畫楓林岸石亂石荒漪口高峰古岸隈一從君去後誰放酒船來題雲林畫山林已肆平生志詩畫仍留没後名何事卷中縁㡳事若嫌塵土汨閒情山林舊宅去多年歲晚滄江泊釣船白首歸來訪鄰里廢池喬木思淒然君家别業惠山前宅有雲林户有泉一自别來如夢裏畫圖展巻思悠然倪元鎮畫淞江董紀良史地僻無人掃亭前長緑苔不知丁氏鶴何日可歸來為吳道子題雲林畫華幼武萬里乾坤一草亭呉山相對越山青祗憐脩竹最深處佳客長留醉不醒雲林畫山水竹石秋雲無影樹無聲湛湛長江鏡面平逺岫烟消明月上小亭危坐看潮生牕前梧竹倚高標簾㡳龍香不自燒記得醉眠清閟閣一庭春雨晚蕭蕭次韻雲林畫山光澹澹樹隂隂溪水湯湯漱玉琴此景不知何處有清風吹起鹿門心題雲林畫顧禄蕭散倪迂士詩工畫亦清吟情何浩蕩筆勢更縱横鄉里推高誼江湖足令名近傳騎鶴去想只在蓬瀛題元鎮畫徃年曾訪天隨子烟樹微茫過太湖雪色寒鱸臨水買翠隂春鳥隔林呼只今圖畫渾相似如此家山住得無皎皎白駒空谷裏令人搔首憶潛夫次雲林韻題畫胡寧千年石上苔痕裂落日溪回樹影深我亦江南樵隠者人間何處有雲林題雲林畫甬東顧盟偶因滌硯寫從容㸃染那能似畫工千載風流誰可擬令人猛憶米南宫題雲林墨竹姚廣孝開元寺裏長同宿笠澤湖邉每共過誰說江南君去後更無人聽竹枝歌題雲林墨竹詩巻倪瓚字元鎮號雲林常之錫山人也性迂疎而雅潔酷嗜詩畫居處事物一務清致綽然有宋米南宫之風名動湖海人莫不畏而愛之至正甲午避亂寓於笠澤扁舟徃來時入城府多託宿於仙佛之廬城南開元寺方厓禪師亦甚好清玩故多館穀焉余故得與雲林長共游息嘗寫竹枝與余而詩於上曰秋水汀洲飛鸊鵜湯休倚棹一題詩問師唱得誰家曲嫋嫋西風動竹枝世變後天各一方不得相㑹者五七年未嘗不想其風度也雲林於洪武辛亥卒於錫山之故里今已廿餘年方厓亦相繼入滅予客燕山不知老之將至興懐至此曷勝悵然近因友人知余性愛竹乃以雲林寫贈一菴長老竹梢見惠目觀嗟歎之不暇故道雲林與余平昔交接之好如此云二十一年八月十三日獨菴道衍跋題雲林畫曽日章梁鴻溪上草堂幽紅樹黄花幾度秋回首雲林人不見西風落日思悠悠題元鎮墨竹潘瓠齋雲林畫竹師蕭恱更愛燕人王澹游為問梁溪千尺影何如老可在湖州又落星灘上拾珊瑚淚灑倪寛舊畫圖夜鶴歸遲華表冷春雲散盡墨池枯九苞文彩俱零落一代風流更有無君若九原知我在應憐形影塞垣孤題雲林畫范致大高臺積雨霽望見溪南山離離翠玉堆楚楚青螺鬟美人移家去輕舟何時還空林忽見畫展然一怡顔東海生家故居梅李之平墟一夕攜母妻入五湖去以避人羣其筆墨流傳人間雖寸楮片縑皆不易得是圖余徃年在雲林中嘗見落筆伯鈞其寳之哉至今年又五六歲矣范致大記至正甲午六月三日題雲林畫次高徐韻王璲水流花謝歲華深江左風流不可尋留得當時陳迹在永和遺墨寫山隂清閟閣前芳草緑小蓬壺上落花多吳山西畔人何在遺墨空存晉永和逍遙天地一閒身浪迹江湖七十春惟有雲林堂上月於今猶照昔年人水流花謝白雲飛滄海桑田有是非莫問蘭亭舊踪跡當時文采古來稀又叢桂已消歇白雲亦悠悠當時鴻山宅花落空林秋平生山水趣晚歲江湖游撫巻三歎息空遺晉風流題元鎮所畫荆溪清逺二首銅官山下縱清游每為飡松十日留吹斷玉簫人去後莫雲空鎖洞庭秋清閟高人一散仙常留遺墨世間傳當時曽寫相思意誰信如今重惘然題雲林先生小景管時敏故家池館錫山阿門徑寧容俗士過清閟閣空詩社散蛛絲牕户落花多閣乃先生藏詩畫之所落花蛛網先生詩㑹中題也􅍩上相逢記昔年風姿奕奕似神仙如今看畫渾疑夢春樹雲林一惘然題雲林枯木寒藤祥止菴竹洲藤岸思依依閒却秋風小釣磯野水正平寒樹老眼中惟見鸊鵜飛題疎林逺岫圖上有周履道詩東海東吳兩故人别來二十四番春而今逺岫疎林外一抹殘陽一老身題雲林所畫竹石圗來復雲林筆有千鈞力圖來竹樹摩霄直隂崖火燒霹靂痕空江石露蜿蜒脊珊瑚交錯枯枝蟠春雨不洗苔花斑誰知中有烈士操傲世直壓冰霜寒我昔蘇臺識君面白苧烏紗目如電酒船每係芙蓉灣蘸碧吳江寫秋練别來零落歸青丘荒烟野水情悠悠開圖仿彿見顔色孤猿啼斷三山秋何郎作官重高潔愛此幽芳兩奇絶虚心能使淡無營廊廟何曾異巖穴此竹此樹人所憐古意颯爽疑通仙只恐風雲起平陸白日化龍飛上天雲林畫慎菴題茅亭結傍水雲深碧樹春晴翠滿林山鳥自啼人不到蒼蒼苔石自生隂跋雲林先生詩巻吳寛雲林徵君以雅潔為人所慕片紙流落亦多藏弃况與其人之先世者乎此中秋夜一詩及厠巤古體皆寫遺其鄉鄒惟高者其裔孫元饒以其家故物保之尢厪余嘗愛雲林詩能脫去元人濃麗之氣而得乎陶栁之法然世之知之者尚少特以其隠處山林之下耳閲雲林畫題東海何良俊王叔明畫倪雲林像上作層巒疎木林木下一人趺坐神意殊逺妙品也上有顧謹中書贊四句作鍾鼎篆倪雲林畫雅宜山圖是真蹟但逺出余家溪山春靄西園圖浦城春色溪山亭子之下又有二幅俱平平倪雲林畫寒渚詩意山水是贋本又竹石三幅二小蘆蓆片佳後一幅贋本又絹畫一小幅余見雲林畫晚年師荆闗用枯筆焦墨作斧擘朘極為蒼古此幅用水墨作麻皮朘全學巨然畫法與荆蠻民相類上詩跋一大篇字亦工緻規模大令當是少年作晚年又一變矣右華補菴家觀倪雲林畫竹與陳惟寅者一枝數葉常含雨氣自是妙品又小竹枝二幅俱佳沈石田學倪雲林一狹單條妙甚余所見石田學倪無過此幅者右袁謝湖家觀倪元鎮溪亭山色圖右紙畫乃丁未五月畫者張宣為士雍題云石滑巖前樹泉香樹杪風江山無限景都聚一亭中吳原博題云聽松菴裏試茶還第二泉頭更看山猶有去年詩興在雲林清閟墨斑斑卞華伯題云倪迂仙去幾時還留得溪亭對晚山老我今為亭上客啜茶閒試鷓鴣斑奚時亨題云朝看雲徃暮看還大抵幽人好住山倪老風流無處問野亭留得蘚痕斑書畫史著色倪雲林始在宋光禄民倩家後為徐太常所藏論元畫載考槃餘事屠隆評者謂士夫畫世獨尚之盖士氣畫者乃士林中能作𨽻家畫品全法氣運生動不求物趣以得天趣為高觀其曰寫而不曰畫者盖欲脫畫工院氣故耳此等謂之寄興但可取玩一世若云善畫何以上擬古人而為後世寳藏如趙松雪黄子久王叔明吳仲圭之四大家及錢舜舉倪雲林趙仲穆輩形神俱妙絶無邪學可埀久不磨此真士氣畫也雖宋人復起亦甘心服其天趣然亦得宋人之家法而一變者論臨畫今人臨畫惟求影響多用己意隨手茍簡雖極精工先乏天趣妙者亦板國朝戴文進臨摹宋人名畫得其三昩種種逼真效黄子久王叔明畫較勝二家沈石田有一種本色不甚稱摹倣諸舊筆意奪真獨於倪元鎮不似盖老筆過之也巖棲幽事陳繼儒倪元鎮寄松江府判官張德常詩後題云陰陽㝠隲宜少留意閒居尚可為之况身有職任而值饑者易為食乎仙官分置洞宫亦如世間局任者矣吾德常兄固知之也此皆盛德之言太平清話元宰為余摹雲林一幅題云陳仲醇悠悠忽忽土木形骸絶似嵇叔夜求之近代惟懶瓚得其半耳仲醇好瓚畫以為在子久山樵之上政是識韻人了不可得余為寫雲林山景一似吕安命駕妮古録祝允明評勝國人書倪元鎮如金錢野菊别存風韻倪元鎮所居名蝸牛廬焦光亦有蝸牛廬俗呼黄犢廬杜綰號雲林黄長睿亦號雲林子倪雲林又嘗號倪幻霞倪雲林又嘗自號滄浪漫士又號浄明菴主倪雲林生平不畫人物惟龍門僧一幅有之亦罕用圗書惟荆蠻民一印者其畫遂名荆蠻民米南宫海岳圗陳叔方嘗寄雲林柬云此圖拙古俗眼罕識前輩嘗評其畫云大米造妙入無言雲林胸次清曠筆意蕭逺當咄咄逼真矣暇日能寄小立軸一紙否耶倪迂畫在勝國時可稱逸品昔人以逸品置神品之上歴代維張志和盧鴻一可無愧色宋人内米襄陽在蹊徑之外馬和之超格律之中餘皆從陶鑄而來元之能者雖多然承率宋法稍加蕭散耳吳仲圭大有神氣黄子久特妙風格王叔明奄有前規而三家未洗縱横習氣獨雲林古淡天然米癡後一人而已小米雲山巻藏項希憲家後有素心道人及沂陽董復二跋雲林止題四字云倪瓚曽覽王維雪蕉曽在清閟閣楊廉夫題以短歌寳顔堂訂正畫說莫是龍趙大年畫平逺絶似右丞秀潤天成真宋之士大夫畫此一𣲖又傳之為倪雲林雲林工緻不敵而著色蒼古勝矣今作平逺及扇頭小景一以此二人為宗使人玩之不窮味外有味可也趙大年平逺寫湖天淼茫之景極不俗然不奈多皴雖云學維而維畫正有細皴者乃于重山疊嶂有之趙未能盡其法也張伯雨題倪迂畫云無畫史縱横習氣予家有此幀又其自題師子林圖云予此畫真得荆關遺意非王蒙輩所能夢見也其高自標置如此又顧謹中題迂畫云初以董源為宗及乎晚年畫益精詣而書法漫矣盖迂書絶工緻晚年乃失之而聚精於畫一變古法以天真幽淡為宗要亦所謂漸老漸熟者若不從董北苑築基不容易到耳縱横習氣即黄子久未斷幽淡兩言則趙呉興猶遜迂翁其胸次自别也題雲林畫董其昌増雲林畫入逸品江南人以有無為清俗勝國已有此語今益寥寥如珊瑚木難矣此幅用墨瀟灑尢可寳也沈石田每傲迂翁畫其師趙同魯見輒呼之曰又過矣又過矣盖迂翁妙處實不可學啓南力勝于韻故相去猶隔一塵也如此圖者蕭疎簡貴假令啓南見之當咄咄歎賞清閟閣全集巻十二
