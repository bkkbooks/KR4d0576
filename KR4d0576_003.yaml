body:
  text: 清閟閣全集巻三元倪瓚撰五言律詩積雨積雨生朝菌㣲風墮碧蓮鵞池汲書水鶴帳理琴絃屐躡苔衣破窻承樹影圓空林無與語長夏曲肱眠春日客懷白鶴煙霧逺滄洲雲海寛䕷蕪細雨濕桃李春風寒沉憂鬱不解離緒沓無端還憶郊園集琴醖共清歡與張貞居雲林堂宴集分得春字青苔網庭除曠然無俗塵依㣲樵徑接曲宻農圃隣鳴禽已變夏疎花尚駐春坐對盈樽酒欣從心所親秋日寄謝參軍岧嶤太華隱婉孌東山情學本猶龍老詩工阮步兵心期流水逺世事浮雲輕公府饒才彦琅琅玉雪明次韻寄王長史示病維摩室端居無俗情清齋久絶飲白首不論兵露壁蛩吟切風林鶴骨輕何時同一作王内史清咏向蟾一作相見眼增眀賦雪舟一舸星河渚空明玉氣浮懷仙李太白訪逵王子猷月色一作明如可掇曙光疑欲流銀屛雲母幛夢為笙鶴逰寄王道士宗晉王君舊隱地聞更結茅茨鶴氅春裁苧鵞羣雪泛池時歌緑水曲不負碧山期夜雨生芳一作春草令人起夢思題張徳常良常草堂二首一室良常洞幽深古大茅風瓢元自寂畦甕不知勞獨出逢騎虎初來學種桃還應白雲裏遲子共逰遨翠壁鄰丹竈青楓背草堂琴書聊卒歳麋鹿自成行疊澗一作澗水流杯滑飛花入座香寜無問津者及此繫舟航悼項山清上人幽曠山中樂飄颻物外踪梵餘閒憩石定起獨哦松花落春衣静雲垂澗户重依依種蓮處林暝只聞鐘埀虹亭虛閣春城外澄湖暮雨邊飛雲忽入户去鳥欲窮天林屋青西暎吳松碧左連登臨感時物快吸酒如川稽山草堂為韓致因賦稽山讀書處應近賀公湖磵月懸蘿鏡汀花落酒壺賣藥入城市扁舟在菰蒲逃名向深僻君豈伯休徒俞子中見過積雨衆芳歇新晴生緑隂獨眠方不愜多子復相尋鳴鹿在春野啼鶯聞逺林余懷良已罄咏嘯罷清琴邀張彦髙清風入庭户野客意悠哉一與佳人别堦前生緑苔參差松影亂一作鬱鬱松隂晚寂歴一作悄悄竹扉開我有盈樽酒懸榻待君來用韻重寄山齋秋聽雨髙卧興悠哉鹿飲荒池水蝸耕石逕苔寶瑟芳塵滿臨尊詎忍開長吟我有待躡屩子能來贈蕳上人初公經閣裏復遇蕳禪師好飲茅君酒狂吟杜牧詩錢唐江上去楊栁花飛時帆影青山隔依依夢見之題張氏藂竹軒髙軒自虚曠幽竹亦藂生苔石寒依玉風泉夜奏笙治冠輕可着醖酒緑因名好折青鸞尾仙壇埽月明逰善權洞載宜興縣志來窺善權洞一上李公樓水玦巖前引雲旌松際浮然燈長不夜埀釣只虚舟欲讀吳朝刻真成冒雪逰野眺寄友一作賦平野見話幽人屋荒城落日邊川原一作途漫浩浩煙樹靄芊芊野稻初収碧江魚上釣鮮何當剩沽酒直到爾門前寄徐仲清巖谷採靈藥蕭條棲遁情白雲簷下宿海鶴堦前鳴燕俎登春菌晨飱脯竹萌詩憑五瀉水好過蘭陵城贈劉道益并似陸明本作賦雲間陸能詩鄴下劉悲秋多逺思捩柁作清逰竹冷侵衣屨窻虚見女牛燈前一杯酒漂泊更維舟賦徳機徴君荆南精舍圖結廬溪水南勝處慊一作事足幽探夏果足山雨春衣染夕嵐石欹招鶴磴門俯射蛟潭日日縈歸夢蕭條雪滿簪次唐綦毋潛宿龍興寺韻寄方厓無家何處歸南渚有禪扉湘簟間秋水風一作池蓮墮粉一作羽衣硯池滋黯黯竹露浄㣲㣲社一作秋燕情如客攙君去槳飛贈謝長源公子太傅裔好於湖上居巻簾㣲雨裏岸幘晚風餘古刻秦斯篆𤣥經許掾書何當尋好事鼓枻及秋初贈墨生巗谷春風起桐花落澗紅隔水輕烟發收煤石竈中豹囊秘𤣥玉鵞池生白虹湯生法潘谷千載事還同雲槎軒己比溝中斷空思海上浮隨雲秋汎汎貫月夜悠悠無路通河漢憑誰問女牛漂揺非有待吾道付滄洲悼朱髙士秋日髙人逝㣲霜蕙草摧鵞羣空碧沼鶴影自層臺應御泠風出疑隨宻霧來杉松暮蕭瑟撫事有餘哀贈道益昔者劉髙士匡山曾結廬插籬培杞菊充棟著圖書鶴影秋雲外蛩吟夜雨餘茂深繩祖武息景在林居送徐元度還江西悠悠西江水綿綿江上山借問離羣鶴孤飛幾時還白雪亦忌潔青雲安可攀時時王子晉吹笙向人間題元朴上人壁蕭條江上寺迢遞白雲橫坐待髙僧久時聞落葉聲鴟夷懷往躅一作事張翰有餘情獨掉扁舟去門前潮未生贈沈文舉波光浮草閣苔色上春衣楊栁鶯啼暗櫻桃鳥啄稀榮名非所慕登覽竟忘歸泖水宜修禊重來坐釣磯七月十四日對雨雨簷驚瀉瀑江漲忽通渠古砌羅秋草荒畦綴晚蔬稍開雲表月還掩篋中書欲話幽貞意忘言已久如寄虞子賢天濶海漫漫崑山望眼寛桃源迷晉世松樹受秦官雨蘚鹿迒一作迹遍霜梧鸞影寒封題數行字聊爾問一作問竹平安徐伯樞歸耘軒作歸耘向何處近在東膠山白雲宿虚牖釣艇當荒灣彈琴送落月濯纓㺯潺湲寸田勿稂莠所願勤治芟贈張韓二君張仲情何厚韓康誼亦深賦詩論宿好聚首契初心阮籍惟須酒陶潛不解琴與君忘爾汝蕭散鶴鳴隂次韻酬彞齋見詒二首秋氣入幽居堦前樹影疎筋骸渾懶惰服食轉清虚薄晚魚潛渚新晴溜繞除茯苓期共煮悵望苦吟餘荆溪丘壑逺暇日得躋攀野客時相過髙人意自閒敲門看脩竹卜宅近青山勝事今寜有幽吟一解顔暮春期潘徵君不至風林驚宿雨澗户落殘花芳月忽已晚幽期良恐賖黃鸝念求友鸚鵡呼煮茶猶候犢車至心親寜憚遐義興王子明以竹菌餽余口占謝之竹下拾煙菌筠籃初送將亭亭似三秀楚楚異衆芳猶帶雨露氣更懷泉石鄉此日山中客笋蕨得新嘗贈公逺霜葉落欲盡晚山看更青躡將沙際屐坐久水邊亭俛仰已如夢漂揺同汎萍稻粱非所戀黃鵠思㝠㝠對雨懷張貞居户庭來逰絶園林飛雨滋芳氣初襲蕙圜文復散池裁書恐沾濕聽一作對溜謾懷思清溪已可汎方舟幸及兹附次元鎮見懷韻張天雨𤣥句何蕭蕭咀味生華滋換着空頂幘把巻適臨池憐君柔緩情起我淹留思丘園嵗將晏幽期方自茲送僧聞説四明道山川似若耶去依阿育墖還宿梵王家野市一作望井封殘雪江船聚晚沙光公强健否持底作生涯贈王光大荆溪王隱士相見每從容借地仍栽竹巢雲獨傍松青苔盤石浄嘉樹緑隂重約我同棲遁嵩髙第幾峯聽雨樓上看春雨玉笙悲逺天辛夷紅染一作㸃筆芳草緑揺煙冉冉侵書幌𡨕𡨕濕釣船新愁嫌㸃滴元不到鷗邊送李徴君逰荆溪因寄王司丞何處尋狂客故人王子猷花落庭前樹風吹溪上舟紫笋生春雨緑蘋滿芳洲心隨酒船發悵望不能休五雲書室幽深隱者宅迢遞少㣲山賀公鏡湖曲李白棹歌還雨几研苔碧風軒江竹斑韓衆近何似晏景白雲間雨霽呈徳常積雨琴絲緩㳂堦蘚碧滋泥途方汨没茅屋且棲遲酒向隣家貰杯從野老持便應繇一作從此去海上候安期答明卿林靄去鶴唳孤煙原上邨稧澗緑雲滿換幘晴景暄處和斯遺隘抱冲自寡言君亦固窮節衆溺何當援張天民溪亭罨畫溪亭月當窗影更妍朱絃彈緑水細栁舞春烟杜牧何年宅山僧棲夜禪張公一杯酒獨醉羲皇前雨几雨几唯生睡邨醪不解愁泥塗深溺象身世眇浮漚徑草紛披濕林扉慘淡秋何人富春渚五月披羊裘寄張景昭煙渚落日後風林清嘯餘輕舟下天際髙人遺素書笋脯炊菰米松醪薦菊葅子有林壑趣江海一迂疎荒邨踽踽荒邨客悠悠逺遁情竹梧秋雨碧荷芰晚波明穴鼠能人拱池鵞類鶴鳴蕭條阮遥集幾屐了餘生答光大空谷枉嘉藻幽吟當素一作廪秋詩鏗清廟瑟書聳屈盧矛學業余多愧才華子獨優飛鸞天外羽斯世邈難儔寄東白上人楓林散霞綺湖水淡秋烟忽憶白一作北麻漾初春掉酒船羽客借鱠具髙僧醉棲禪何時來甫里痛飲菊花前酬雲浦尋真狎隱淪息景絶風塵屈子能安義陶公每任真山中宜餌术江上憶羮蓴亦欲從棲遯柴車為爾巾題丘氏壁我愛丘君宅蕭然隱者風石邊蒙細篠井上植髙桐墨沼鵞羣白雲窗藥蕋紅咏歌當上已修禊樂融融桂花桂花留晚色簾影淡秋光靡靡風還落菲菲夜未央玉繩低缺月金鴨罷焚香忽起故園想泠然歸夢長寄章心逺江海章髙士相違已半年青山雲冉冉白鶴影翩翩坐看神鼇下行吟秋水邊何當拾瑶草遲子華峰一作山巔賦雪蓬手把玉麈尾身披素綺裘梨花縈夜月柳絮入虚舟不作饑鳶咏其如載酒逰因懷剡溪興烟水暮悠悠輓張徳常孝弟由天性清貞有祖風宦逰江郭逺歸隱曲林通嗜古真成癖歌詩信已工有才悲賈傅荏苒百年中畫寄王雲浦蕭散賢公子衡門似水清花間青鳥過砌下緑苔生山色排簷入江波照眼明開圖想幽境欲為寫閒情髙進道水竹居我愛髙隱士移家水竹邊白雲行鏡裏翠雨落堦前獨坐敷書席相過趂釣船何當重來此為醉酒如川寄王叔眀能詩何水部愛石米南宮允爾一作矣英才最居然外祖風釣絲煙霧外船影畫圖中他日千金積陶朱術偶同秋日贈張茂實久客東海上秋風吹練裙放言愛莊叟笑癖如陸雲采藥清晨出哦詩静夜聞滄浪可濯足吾與爾為羣期友人不至山寺擁爐夜風吹如怒濤獨吟何水部還思王騎曹曠達余所羨阻别心增勞來兹慰幽寂輕舟幸即操義興吳國良用桐烟製墨將逰吳中求售賦詩以速其行生住荆溪上桐花收夕烟墨成羣玉秘囊售百金傳孰謂奚珪勝徒稱潘谷仙老松端媿汝法已入𤣥𤣥一作桐法更清妍題方厓墨蘭蕭散重居寺春風蕙草生幽林蒼蘚地緑葉紫璚莖早悟聞思入終由幻化成虚空描不盡明月照敷榮為唐景玉畫丘壑圖因題丹經留玉斧真籙佩青童蛻跡氛埃外怡情巗穴中吹笙緱嶺月理詠舞雩風欲畫𤣥洲趣揮毫清興同題風竹圖贈于静逺故人于静逺訪我到南湖作黍蔬親瀹開筵酒屢沽臨流同嘯咏剪燭尚歌呼長夜清無寐還為風竹圖題畫甫里林居静江湖逺浸山漁舟衝雨出巢鶴帶雲還漉酒松肪滑敷茵楮雪閒春風一來過似泊武陵灣為文舉畫泖山圖因題華亭西畔路來訪舊時踪月浸半江水蓮開九朶峯酒杯時可把林叟或相從興盡泠然去雲濤起壑松畫竹寄王彞齋荆南山色裏翠竹宻縁溪冉冉春煙薄𡨕𡨕暮雨迷夢長蝴蝶化行逺鷓鴣啼舊日栽桃李清隂自滿蹊題李遵道山居圖披圖慘不樂日暮渺余思坐石看雲處空齋對榻時世途悲荏苒墨氣尚淋漓惆悵騎鯨客於今豈有之贈王生䝉泉曉鏡拂秋水晴簷度白雲青春去浩浩艷蕊落紛紛道在形神豫心由瞭眊分君其慎語黙世事豈余聞畫江天晚色贈志學不見呂君久題詩懷不忘風聲渾落葉山影半斜陽獨鶴來遲暮孤帆出渺茫為圖秋色去留寄讀書堂題山隂丘壑圖寄趙士瞻吾愛趙徴士清才能逸羣昔營山隂宅今在吳松濆月牖自理詠春羮偏美芹逺懷松上鶴寫寄嶺頭雲八月十五夜湖上翫月平湖秋似練寒月白於銀泫泫衣上露青青水裏蘋歡言一杯酒聊樂百年身兹夕對澄景況值髙懷人三月四日邂逅徳方郎官九成掾史於荆溪之上相從及旬而别因九成徴余畫并賦詩以贈剡掾學阮掾宛然西晉風百年聊復爾三語將無同載酒來溪上看山入剡中孤帆逐雲影烟雨滿春空題漁樵友巻釣水復樵山逃名宇宙間一篙春水淨半畝落花閒鷗鳥時親狎松雲共往還厭聞塵世事緬邈不相關題畫贈王仲和有引南湖陸𤣥素髙士幽居今王仲和居之水木清華户庭幽邃余嘗寓其家四年蕭然忘世慮也仲和以此幀索畫竹石畫已并詩其上以寫惓惓之懷𤣥素仲和外舅也故尤感余故人之思乙巳初月十七日曾住南湖宅於今已十年叢筠還自翳喬木故依然雨雜鳴渠溜雲連煮术烟何時重相過爛醉得佳眠過惠山重過湛公宅因嘗陸子泉佛香松葉裏僧飯石巗前市駿唯憐馬池荒憶種蓮清心有妙契塵事久終捐送宗天章歸廬山屛風第九疊歸伴鶴巢松五老峰前路東林寺裏鐘宗雷憂入社陶謝莽遺蹤我亦名山隱他年何處逢題畫贈張𤣥度有引𤣥度好文學工詞翰藹然如虹之氣真江南澤中千里駒也十二月十四日侍乃翁訪僕江渚相與話舊踟蹰深動故園之感因想像喬木佳石翳沒於荒筠草蔓之中遂寫此意并賦詩以贈焉蕭條江渚上舟檝晚相過巻幔吟青嶂臨流寫白鵞壯心千里馬歸夢五湖波園石荒筠翳風前怳浩歌奉寄剡九成州府今為掾風埃多厚顔香芹渾滿澗去鶴未巢山思逐春雲亂心隨野水閒章君應話我樗散碧巗間寄張徳常卜宅近溪西雲煙咫尺迷晝眠同野鶴晨起候林雞舊種松三徑春栽菊滿畦來禽與青李囊致不封題送王叔明連榻卧聽雨劇談清更真少年英邁氣求子不多人仕禄豈云貴貝琛非所珍當希陋巷者樂道不知貧寫秋林逺岫圖贈約齋因題五言韋刺史此地數曾逰無復緑隂静空悲紅樹秋市聲晨浩浩雲影暮悠悠徴士冲襟勝邀余共茗甌賦謝王彞齋不面纔經宿題書細作行心親情戀戀事往意茫茫酒榼浮松蕋羊腔截玉肪歌詩報佳貺期此共徜徉三芳圖丹桂月光落猗蘭琴調清獨憐秋鶴瘦相對夜江橫芳烈誰先後才華孰重輕道心安有染無物惱閒情題墨一作題墨竹贈李文逺義興李文逺墨法似潘衡麋角膠偏勝桐花烟更清紫雲腴泛泛𤣥璧理庚庚安得龍香劑霜枝寫月明題畫贈九成吳山春雨浄江渚暮潮平解䌫欣初霽開帆已到城剡君有髙趣樽酒慰閒情醉吐真丘壑毫端一笑成畫竹寄張天民良常南洞口聞有埽塵齋竹影春當户泉聲夜遶堦自矜霜兎健安有魯魚乖截得青鸞尾因風寄好懷贈陸隱君甫里髙人後風流有裔孫愛山仍愛畫留饌復留樽每看雲眠石因尋竹款門今朝嵐翠濕應是雨翻盆寓法藏禪寺載宜興縣志風雨入城府禪扉三日留清齋聊㺯翰曉浴更梳頭石鉢香烟細經幢樹影稠移舟未褰霽少泊聽鳴鳩浦城春色圖寫贈遜學七閩嵐翠合山色浦城髙春靄浮青壁晴曛醉碧桃吟猿儔木客飛瀑亂松濤夢入千峰裏雲霄一羽毛聞鶯送别鄭徴士春日陽關道鶯聲滿上林來從金谷曉飛度玉樓隂栁嫰難分色歌停稍辨音明朝空解語人去落花深新涼戲呈甘白閒静幽人宅蕭條樂圃亭炎暑浹旬劇逺山當户青涼生猶病瘥愁解如酒醒卧看風篁影落月滿階庭贈郭本齋髙人郭本齋輕舟東渡淮賣藥不二價向人多好懷世方憂暍死我豈與時乖欲覓金光草相期弱水涯畫贈耕雲戢枻泊清陂禪居獨下帷軒扉雨寥落草木晚離披野老無機事江鷗更不疑虚舟身世逺萍葉任飄吹贈陳維寅有䟦十二月九日夜與維寅友契篝燈清話而門外北風號寒霜月滿地牕户閴寂樹影零亂吾二人或語或黙寤寐千載世間榮辱悠悠之話不以汚吾齒舌也人言我迂謬今固自若素履本如此豈以人言易吾操哉維寅言歸因賦詩并書此為贈慎勿以示顯貴者必大笑以為謬語也十三日瓚書於蝸牛廬中歳壬寅陳君有古道夜話赴幽期翳翳燈吐焰寥寥月入帷氷凘醨酒味霜氣折琴絲明月吳門道寒汀獨爾思六月六日盧氏客樓對雨一首呈維寅無家隨地客小閣看雲眠涉夏雨寒甚似秋風颯然舞鸞悲鏡影飛雁落箏絃好轉船頭去江湖萬里天題郭天錫畫并序天錫掾郎與予交最久死别忽忽二十餘載念之悵恨如何可言錫山弓河上𤣥元道館錫麓𤣥丘精舍其畫壁最多今或為軍旅之居或為狐兎之窟頹垣遺址風景亦異雖予之故鄉乃若異鄉矣不歸吾土亦已十年因勝伯徴君攜此巻相示為之展玩感慨并叙述其疇昔相與之所以然者其中有不能自已也捉筆淒然乆之至正二十三年嵗在癸夘十二月十日夜笠澤蝸牛廬中郭髯余所愛詩畫總名家水際三义路毫端五色霞米顛船每泊陶令酒能賖猶憶相過處清吟夜煮茶十一月一日燈下戲寫竹石霜柯并題久客令人厭為生只自憐每書空咄咄聊偃腹便便野竹寒煙外霜柯夕照邊五湖風月迥好在轉漁船惟允契友工為詩歌而圍棋鼓琴無一不造其妙雖㳺名公卿間無意於仕進故寫竹枝奉贈又賦此詩岷江陳秀士棲隱闔閭城覓句仍工畫看山不愛名棋枰消永日琴調寄閒情摩捋鬚髯美春苗紫過纓寄友吳淞江上宅青翠映丹楓欲覓幽人去遥憐雅好同珍圖藏顧陸蓮社憶雷宗聞道秋風夜清琴寫澗松八月廿日為叔平畫紫芝山房圖并賦山房臨碧海奕奕紫芝榮雲上飛鳬舄月中聞鳳笙术烟生石竈竹雪灑茆楹誰見陳髙士希夷善養生有立徴君名其齋曰端居室讀書學道咏歌先王之遺風扵其中為之題贈五畝幽人宅端居思泬寥圖書充棟積心跡去人遥巻慢松風入當堦蘭雪飄善求顔子意陋巷樂簞瓢徐良夫耕漁軒僕來軒中自七日至此凡四日矣風雨乍晴神情開朗又與耕雲耕漁笑言娛樂如行玉山中文采自足照映人也喜而賦此詩溪水東西合山家髙下居琴書忘産業踪跡隱樵漁積雨客留宿新晴人趂墟厭喧來洗耳清泚遶前除至正癸亥秋七月三日乘雨至西園因寫此圖賦詩以紀勝逰卜宅清溪上烹茶秋樹根書堂㣲雨霽石榻古苔痕松葉飄琴薦荷香罩酒罇邵公敦古道幽尚竟誰論宿樂圃林居予來城郭而暑氣熾甚偶憩甘白先生之樂圃林居不覺數日相與䕃茂樹臨清池誦羲文之象爻彈有虞之南風遂以永日忽忽已淹留久如閒成此詩以寓笑樂耳甲寅六月十六日暮投齋館静城郭似山林落月半牀影凉風孤鶴音汀雲縈逺夢桐露濕清琴喧卑静塵慮蕭瑟動長吟為耕雲賦山居髙木埀帷宻清池拭鏡明蟲書葉字古風織浪紋輕悄悄悲秋意悠悠惜别情古人雖已矣得失未須驚示友人子處窮愁際我居憂患中貪饕如鬼國喜怒屬狙公莫笑淮隂俛誰同鮑叔風雪汀留雁迹飛舞任西東題梅花道人墨菜詩巻肉食固多鄙菜烹元自癯曉畦含露氣夜鼎煮雲腴春醪時一進林筍與之俱㳺戲入三昧披圖聊我娛孤雲用王叔明韻煙浦寒汀雨吳山楚水春絶無凝滯跡本是不羈人鸛鶴同棲息蛟龍任屈伸自嗟猶有累斯世有吾身五言絶句題臨水蘭蘭生幽谷中倒影還自照無人作妍㬉春風發㣲笑和趙魏公張外史詠𤣥洲十景菌山奕奕三素雲團團如車葢下有採芝仙㳺神與天會羅姑洞玉晨啓𤣥扉靈篇㖟飛仙錬景返洞宮保真億萬年霞駕海混淪青瑶流煥爛雲錦光飛軿駕神君宛在旬山陽鶴臺胎仙集丹臺真宰降𤣥居翕忽神飈散燒香禮太虚桐葉源宻葉䕃方壇珍林寄深谷華源逺莫窮時有幽人宿𤣥洲精舍步虚朝東華髙嘯追逺逰𤣥館㖟妙道逍遥宴神州紫軒虚林想遺躅壇館廢仍存落葉藏丹竈清晨雲氣温隱居松蒼雲乘白鶴傳説手栽松山室清眠夜千巖聞勁風玉像龕玉標明霞秀靈炁混合成流光映金宮雲斾招萬靈題自畫二首東海有病夫自云繆且迂書壁寫絹楮豈其狂之餘青林藏曲宻逺水間㣲茫飛鷺浴鳬處人家半夕陽夜作古木怪石因題夜逰西園渚初月光炯炯徙倚巖石下愛此林木影雨竹雨過瀟湘渚風生渭水波暮窻揮醉墨翠霧濕煙蘿二月廿二日潘子素王叔明來訪臨别為寫水傍樹林圖積雨開新霽汀洲生緑蘋臨流望逺岫歸思忽如雲寫竹枝為子中陳君子中髙世士脱帽著黃冠久勵氷霜操虚心共歳寒題鶴海月生殘夜遼天入暮秋安期應有待清唳起𤣥洲題畫鶴白鶴何僊僊翠石亦岌岌風日媚幽芳春禽飛相及題王叔明小畫餘不溪上路不到已三年范蠡扁舟小披圖思惘然題夏圭紈扇圖孰識琴中趣山峩水深深馬史妙於畫無言會古音題畫三首筆峰雖小劣景物亦清新蕭瑟風林晚江湖有逸民杳杳碧山岑森森灌木隂幽亭足清眺臨風聊鼓琴江城秋雨後竹石曉蒼蒼聊以規摹此留看宿鳳凰荆溪載宜興縣志荆溪清逺地水秀石幽貞誰識懷歸者終期憒憒情題秋亭曉色圖園林夏雨歇旭日照蒼苔誰見竹亭裏孤坐興悠哉寄友風雨暮蕭蕭髙人共寂寥何時截湘玉踏月夜吹簫菜圃食菜雖云美荼苦薺自甘獨勝髙陽徒羶葷自飫酣春江獨釣圖春洲菰蔣緑江水似空虚望山以髙咏釣志一作意釣不在魚墨竹明月臨虚一作書幌疎篁舞翠鸞獨吟苔石上霜葉媚天寒題畫與溥泉息景憩烟霞澄懷卧丘壑久遲蘇仙君莫驚松上鶴題畫二首荆溪山水勝不到十年餘蔣氏遺基上寒藤學草書雨過黃陵廟風生湘水波當時卸帆處苔石倚喬柯畫竹為景周寫脩竹種丹房亭亭枝葉茂青寜忽自生拾取延人夀題畫贈彦貞二首翠竹並竒石蒼蒼留古柯眀窗坐相對試問興如何逺山清欲滴疎林淡生煙春潮晚來急維定渡頭船贈宋仲温宋君天下士畫竹能鼓琴來我北渚下相從論古心題秋林圖一作陳則題雲林畫林亭逺岫雲開見山髙木落知風勁亭下不逢人夕陽澹秋影六言絶句田舍二首山鳥下窺窻牖春風時過柴門避世何須鄭谷作書已絶巨源映水五株楊栁當窻一樹櫻桃灑埽石間蘿月吟哦琴裏松濤畫竹珍重黃華父子遺風得似洋州松雪於今寞寞房山去後休休為曾髙士畫湖山舊隱厭聽殘春風雨捲簾坐看青山波上鷗浮天逺林間鶴帶雲還題畫八首雨過黃陵廟下雲生玉女井邊野雉雊鳴斜日鷓鴣啼破林烟官畫溪頭喚渡銅罨山下尋僧水榭汀橋曲曲風林雲磴層層髙栁喬柯小閣水光山色衡門未老作閒居賦無錢對北海樽舟泊溪流曲曲鳥啼烟樹重重獨思白鶴遺址好居五老雲峰孝侯廟前雨過罨畫溪頭日曛舊迹如今夢裏春風愁亂行雲月下參差雙玉燈前蕭散孤鴻寄興只消毫楮寫懷不用絲桐竹上誰彈清淚如鉛春雨斑斑滿眼湘江波浪望窮白鳥飛還髙樹長松共晚蒼筠野石同貞珍重王家公子翩翩白鶴神清南邨草堂雲溶溶兮履渚波剡剡兮侵扉觀魚泳而自樂狎鷗馴以不飛雲溪佳處誰覓雲溪佳處渚花汀竹迷藏去鶴原邊倚杖浮鷗波上鳴榔已酉八月廿六日謾題田父聊同爾汝狂夫從問如何昔日揮金豪俠今朝苦行頭佗題竹黃陵廟前雨過邯鄲谷口風生愛殺山人清致縱橫淡寫秋聲我愛焦君味道筆端㸃綴清新規模虎兒早歳未窺北苑入神題溪山雪霽圖贈以中張君水影山容黯淡雲林翠一作細篠蕭疎誰見重居寺裏雪晴沙際吟餘贈潘仁仲瓶内花簪白鶴庭中池養金魚馴虎只憑丹竈活人惟留素書燕乳燕乳雛成竟去鸞悲影隻難雙借問榮歸故里何如髙卧北牕壬子十一月五日余遇牧軒於吳門客邸求寫贈安素髙士并賦石潤苔痕雨過竹隂樹影雲深聞道安素齋裏能容狂客孤吟至正癸夘九月望日畫贈勝伯徴君并題江渚暮潮初落風林霜葉渾稀倚杖柴門閴寂懷人山色依㣲東吳十詠望洞庭一望洞庭秋水相看一作逢南浦孤篷江干有興騷客閒居久約漁翁泛石湖遥接太湖惘然尚留赤壁圖景越來溪水東西香雪寒梅飄影逰靈巖寺此山勝景𤣥賞舊逰今日皆非籃輿林間烟暝爛柯谷口忘歸登姑胥山吳王館娃西子兩情斷送長流麋鹿淚沾荒草故人汗漫重逰泊橫塘山寺㣲茫深渡寒煙蒼莽橫塘杖梢自挑村酒船頭猶夢漁郎懷甫里笻行依依故里石刋翰墨糢糊龎公力田二頃拾遺扁舟五湖過盤門將軍南過吳國魚龍跳下江潮無限吁嗟陳一作神跡怕聞凄凉洞簫過獨墅短棹㣲風窈窕片帆落日橫斜舍傍誰開酒肆牛疲知是田家過車坊漾蕩舟滄波萬頃揺櫓白鷗渚傍不知新月東起回頭過盡東方歸闔閭浦極目煙江盡頭屈指揺城渡口世人不理曲肱自餉黄雞白酒題良常草堂圖和靖處士嘗賦詩曰山水未深魚鳥少此生猶擬再移居只應天竺溪流上獨木為橋小結廬以中之大父鶴溪先生自金壇移居荆溪因以中相過話處士舊詩戲為圖此結屋正臨流水開門巧對長松為待神芝三秀移居華岳西峰至正戊戌八月便過岷翁出趙宗漢鴈山髙隱圖索題遂作短句聊博一笑傑閣突兀雲外細路委曲烟中對嶺臨谿未逺度阡越陌難通清閟閣全集巻三
