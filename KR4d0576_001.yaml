body:
  text: 清閟閣全集卷一元倪瓚撰四言詩至正十年十月草三日余以事來荆溪重居寺主邀余寓其寺之東院凡四閲月待遇如一日余將歸乃命大覺懺除垢業使悉清淨乃為寫寺南山畫己因畫説偈我行域中求理勝最遺其愛憎出乎內外去來作一作住止夫豈有礙依桑或宿御風亦邁雲行水流逰戲自在乃幻巗居現於室內照胸中山歷歷不昧如波底月光燭盼睞如鏡中燈是火非詒根塵未淨自相翳晦耳目所移有若盲瞶心想之微蟻穴堤壞辴然一笑了此幻界義興異夢篇辛卯之歲寅月壬戌我寢未興户闔於室爰夢鬼物黯淡慘栗或禽而角或獸而􅢅夔足駿奔豕形人立往來離合飛搏跳擲紛攘千態怪技百出豫茲泊然抱沖守一廓如太虛雲斂無迹晨雞既鳴冠櫛斯畢涉庭而詠已化奚恤春風惟振亮月在席凋瘁何損榮華匪益獨以圓悟境無順逆愚夫説夢轉墮迷惑滔滔天下病者良極傒我大雄拯此羣溺至正乙未素衣詩素衣內自省也督輸官租羈縶憂憤思棄田廬斂裳宵遁焉素衣涅兮在彼公庭載傷迫隘中心怔營彼苛者虎胡恤爾氓視氓如豵寧辟尤詬禮以自持省焉內疚雖曰先業念毋蕩失守而不遷致此幽鬱身辱親殆孝違義屈蔚蔚荒塗行邁靡通雍雍鳴鳳世莫之逢夕風凄薄曷其有旦吁嗟民生實罹百患先師遺訓豈或敢忘簞瓢稱賢樂道無殃豫獨何為悽其悲傷空谷有芝窈窕且廓爰宅希靜菽水和樂載弋載釣我心不怍安以致養寤寐忘憂修我初服息焉優遊徐良夫耕漁軒鄧山之下其水舒舒林廬田圃君子攸居載耕載漁爰讀我書唐虞緬邈愴矣其悲棲遲衡門聊得我娛敬慎誠篤德罔三二四勿是克一作事三益來一作斯萃彼溺於利我以吾義彼自暴棄我以仁智匪今之同惟古是嗜虛邪逍遙隱約斯世題畫義興之山維水瀰瀰載逰載咏操觚挾几聊樂一日百歲奚俟五言古詩春日雲林齋居池泉春漲深徑苔夕隂滿諷詠紫霞篇馳情華陽館晴嵐拂書幌飛花浮茗碗階下松粉黃窗間雲氣暖石梁蘿蔦埀翳翳行蹤斷非與世相違𡨕棲久忘返次韻懷張外史緬懷蕭間館乃在華陽天焚一作燒香坐幽一作當陽谷濯纓向清泉真靈浮空至樓觀與雲連彈琴明月下飄飄舞胎仙雨中寄孟集英英西山雲翳翳終日雨清池散圜文空林絶行屨野性夙所賦好懷誰共語燒香對長松相與成賔主聽袁子方彈琴蕙帳凝夕清髙堂流月明芳琴發綺席列坐散煩纓回翔别鵠意縹眇孤鸞鳴一寫氷霜操掩抑寄餘情贈天寧福上人荆溪霜落後銅官日出初自櫛頭上髮更理篋中書上人從定起咏言方繞除邂逅發微笑幻身同太虛十二月十七日過與之洛澗山居留宿忽大雪作及明起視户外巖岫如玉琢削竹樹壓倒徑無行迹飄瞥竟日至暮未已雪深尺餘因賦詩留别世途縈荏苒歲晏不知歸密雪竹林夜挑燈共掩扉蕭條塵慮淨諷咏玄言微遇此巖中賞心事悵多違别張天民鳴雁將北歸徘徊舊棲處江湖春水多欲去仍回顧稻粱豈余謀繒繳非所慮猶為氣機使暄冷逐來去寥寥天宇寬彼此同一寓風萍無定蹤易散聊為聚君看網中魚在疚猶相喣夜泊芙蓉洲寄張鍊師芙蓉猶滿渚疏桐已隕霜泊舟菰蒲中吳山隱微陽因懷靜默士竹林閟玄房煮茗汲寒澗燒丹生夜光憶與鄭郯輩間咏步修廊時子有所適顧瞻重徜徉庭下生苔蘚牖間翻詩章奕勢鄭老勝酒榼郯生將雅歌雜詼諧列坐飛羽觴子歸日已晚棗栗亦傾筐揮手輒謝别暮宿荒城傍遲明趍所期待子鄭公堂晨往遂至昏企望徒倀倀乃嗟仙真馭固非世所望惻惻理歸棹泛泛秋浦長還尋甫里陸更醉山隂王素冠斯馳贈喜知終未忘余茲將逺適旅泊猶倣徨微風動虛碧初月照石梁曠望對清景賦詩託陳郎茯苓思同煮夜雨共匡牀蕭間道館聽袁南宮彈琴是日風雨蕭然有感而作玉琴轉清亮風雨更飄颻疏桐蔭髙館朱槿耀芳條生物曷可遏撫事發長謡弱齡陪清宴櫛髮想埀髫相見日以老離居夢且遙秋江渺雲水去鶴影搖搖送髙太守之秦郵秦漢置牧守猶古之侯伯封建而郡縣仁政固不易漢宣知所本留意二千石慎哉髙侯車願循古轍迹蕭間館夜坐隱几忽不寐竹露下泠泠清燈淡斜月薄惟張寒廳躁煩息中動希靜無外聆窅然玄虛際詎知有身形和吳寅夫對雨見懷溽雲變隂晦零雨隨風濤的皪集蓮池飄颻灑蘭臯朱絲緩瑶瑟緑錢生寶刀撫事增慨慷端居倦逰遨處世每慙栁懷人徒詠陶脆質愛靈藥間情宣弱毫次陶蓬韻送葉參謀歸金華手把玉芙蓉青天騎白龍出入人間世飛鴻踏雪蹤瑶草粲可拾羣峰森玉立璧月挂天南離離星斗濕君昔在山時玉韞山有輝因同白雲出更與白雲歸白雲無定處豈只山中住河漢共縈紆經天復東注金華牧羊人遊戲不生嗔笑拂巗前石行看海底塵手調白羽箭陋彼磨銅硯一語不投機歸歟寧再見士豈始隗乎全趙匪相如項王疑亞父竟爾龍為魚擾擾何時已百年聊寄耳良也報仇歸言從赤松子去山今幾年還山大學仙天台司馬宅雲氣近相連偶成積雨不為休蕭條使人愁哀吟四壁靜病卧百蟲秋開門望原野江湖漭交流誰能載美酒為我散煩憂次曹都水韻二首杜陵布衣翁許身稷禹行賦詩原正始感事多哀傷煌煌萬丈焰岌岌數仞墻君能仰餘輝假日尚一作髙升堂弛擔息荒途日暮將安之挾彈狂逰子鬬雞輕薄兒衆方巴人唱獨歌陽春詩天門何嚴邃緑窗隱罘罳贈錢羽士鍊師好神仙望拜金母臺亹亹應玄運煌煌秀靈荄天風流瓊響夕露調玉杯鳳棲池上竹雨添階下苔時見兩青鳥碧海傳書來感此忽自笑飄然遺氛埃送甘允北上翔鴻縱髙姿流水去不息枉道别友生揚舲望京國婉孌前途憩蕭條餘景匿神京衣冠會左右金陽宅驅馬流星繁埀軒春霧集嘉子玉質朗早通金閨籍行逢明主顧入補詞臣職束帶向晨趍陪宴終日昃芳年易為晚所願崇令德英英白雲飛渺渺青山隔秋風應節起萬里思親客遲子返舊居銜杯數相覿雙寺精舍新秋追和戎昱長安秋夕秋暑晚差涼茗餘眠獨蚤清風振庭柯寒蛩吟露草晨興面流水西望吳門道不知人事劇但見青山好寄段吉甫昔者段干木踰垣避其君𡨕翳巖穴間清風扇炎氛德綿百世下吉甫賢且文神鸞養竒采芳芷結幽芬回視當世士雞鶩正紛紜區區事夸敓子獨介不羣舍瑟作而嘆此道誰復云送章鍊師并寄鄭有道良覿忽云阻桐花今亦繁落日滿洲渚揚舲念孤鶱因懷息機叟藴真從灌園晨掃石上雲佇子接清言玄文館讀書有引余友玄中真師在錫之東郭門立靜舍名玄文館幽潔敞朗可以間處至順壬申嵗六月余寓是兼旬謝絶塵事遊心淡泊清晨櫛沐竟終日與古書古人相對形忘道接翛然自得也且西神山下有泉味甚甘冽與常水異館去山不出五里故得昕夕取泉以資茗荈余讀書研道之暇時飲水自樂焉乃賦詩記事真館何沉沉寥廓神明居陽庭肅宏敞丹林鬱扶疏眷言茲逰息脫屣榮利區簷榱初日麗池臺涼雨餘焚香破幽寂飲水聊舒徐潛心觀道妙諷咏古人書懷澄神自適意愜理無遺誰云黃唐逺泊然天地初回首撫八荒紛攘蚍蜉如願從逍遙逰何許崑崙墟述懷讀書衡茅下秋深黃葉多原上見逺山被褐起行歌依依墟里間農叟荷蓧過華林散清月寒水淡無波遐哉棲遁情身外豈有它人生行樂耳富貴將如何蛛絲網落花落花綴蛛網蜀錦一規紅既映綺疏外復照碧池中含悽戀餘景散魄曳微風昔人問榮穢詎識本俱空冬日窗上水影日池浮湛淡霞牖上縈回敷腴三素雲照耀青蓮臺髙流輝自下含漪斂復開尸坐以默觀靜極自春回雪泉為王光大賦髙齋面絶壁林密徑難尋風落松上雪零亂幽澗隂皓潔映鶴氅清圓和瑶琴間咏以自樂聊用忘華簪丙子嵗十月八日夜泊閶門將還溪上有懷友仁陸徴君明發辭吳會移舟夜淹泊空宇埀繁星微雲暝前郭沈沈抱沖素悄悄傷離索歸掃松徑苔遲君踐幽約聽袁員外彈琴有引至正四年十一月袁員外來林下為留兼旬臘月十七日快雷初霽庭無來迹與僕靜坐因取琴鼓之古音蕭寥如茂松之徑風春壑之流氷員外時年八十有二顔貌筋力未如四五十許人為言甫弱冠遭逢盛明初宰當塗過九華山道逢神人與棗食之後數數見夢寐間若冥感玄遇者員外韜耀蘊真仕祿以自給不為人所知豈郭恕先之流歟為賦五言以贈郎官調緑綺谷雪賞初晴兩忘絃與手流泉松吹聲問言踰八十云嘗見河清挂帆望九華神人歘相迎啖以海上棗歡愛若平生玄遇寧復得惜哉遺姓名早春對雨寄懷張外史林卧苦泥雨憂來不可絶掀帷望天際春風吹木末飛蘿散成霧細草緑如髮念子獨髙世南山修隱訣取瑟和流泉操瓢酌明月神安形不凋迹髙行自潔思之不可見飢渴何由歇願為鸞鵠翔南逰拂松雪懷常州學博強行之君在西溪上年年楊栁春提壺坐栁下邀我見情真青葉已埀帶白花還覆蘋别來今見栁思爾采芳芹戊寅十二月丹丘柯博士過林下有賦次韻答之積雪被長坂卧疴守中林山川雖云阻舟楫肯見尋傾蓋何必舊相知亦已深驚風飄枯條清池冒重隂聨翩雙黃鵠飛鳴緑水潯顧望思鬱紆徘徊發悲吟願言齊羽􅢅金石固其心歡樂胡由替白髮一作黃期滿簪己卯正月十八日與申屠彥德逰虎丘得客字余適偶入城本是山中客舟經二王宅弔古覽陳迹松隂始亭午嵐氣忽斂夕欲去仍徘徊題詩滿苔石送友仁之京師春風吹蘭茝佳人將逺逰逺逰何當還神京鬱雲浮眷言英邁志飛轡不可留豈無金閨彥與子結綢繆河山風氣雄江水日夜流遙瞻雲中雁庶以慰離憂啄木何處啄木鳥飛止於喬林微形亦以勞終日聞其音所願木向茂不使螙日侵吁嗟人之徒曾不如鳥心江隂袁仲徴作軒名篔林日夕嘯咏其下至正十二年二月草四日訪余南蘭陵寓舍徴僕賦詩遂走筆應請然不能盡道軒中清事也風生篔簹谷雲迷渭水原蕭蕭春雨後翳翳清隂繁憶昔文使君燒笋具盤餐彭城詩適至大笑飯為噴風流成異代寂寞今誰論夫君暨陽隱字徴其姓袁二仲接徠逰子猷時到門冠同薩縣製坐對宜城尊翠羽共棲杔鳳雛亦孤鶱載誦偃竹記忽若聞清言邈哉古人迹尚友不可諼杜真人聽松軒計籌白石頂聞有丹丘生和玉飲晨露褰林餐絳英止鶴眠松警螢火照書明為善得仙道翛然不近名擬隂常侍一首寄劉祕監趙員外幽并遊俠地都城百雉連河漢瞻疑近雲鳬信是仙樓分霞欲曙花將月共妍摛毫傾藻思獻賦足為傳還知跨烏鵲夜宿綵雲邊玉壺中插瑞香水仙梅花戲咏寒梅標素豔幽卉㺯妍姿團團紫綺樹共耀青陽時折英欲遺逺但恐傷華滋置之玉壺氷芳馨消歇遲秋夜賦清漏下數刻疏鐘仍獨聞零露漙夕影端居澄俗氛恬淡斯寡欲榮名非所欣樂矣咏王風忘年棲白雲述懷嗟余幼失怙教養自大兄勵志務為學守義思居貞閉户讀書史出門求友生放筆作詞賦覽時多論評白眼視俗物清言屈時英貴富烏足道所思埀令名大兄忽捐館母氏繼淪傾慟哭肺肝裂練祥寒暑并釣耕奉生母公私日侵凌黽勉二十載人事浩縱橫輸租膏血盡役官憂病嬰抑鬱事汙俗紛攘心獨驚罄折拜胥吏戴星候公庭昔日春草暉今如雪中萌寧不思引去緬焉起深情實恐貽親憂夫何逺道行遺業忍即棄吞聲還力耕非為螻蟻計興已浮滄溟雲霾龍蛇噬不復辨渭涇邈邈巖澗阿靈芝煜紫莖有志而弗遂悲歌歲崢嶸冶長在縲絏仲尼猶亟稱嵇康肆宏放刑僇固其徵被褐以懷玉天爵非外榮賤辱行豈玷表暴徒自矜蘭生蕭艾中未嘗損芳馨泊舟泊舟嘉樹下開牖碧江潯慨然念黃落景憩惜清隂多暇觀魚鳥容與一登臨蛻迹塵喧久欲寡天機深寄王光大春服始輕體嘉樹欲垂隂夫椒結秀色江流涵碧深晴絲正髙下好鳥亦嚶吟豈無伐木詩怡此風雩心次韻酬友人處世若過客踽踽行道孤願友吉德士邈焉如鳳雛人而無恆心未易為醫巫往者不可作玉匣埋珠襦枳棘何榛榛上有鴟梟呼維桐鸞棲止來匪應時需卓犖千里馬壯氣塞九衢駑駘豈其偶齷齪當鹽車龍可豢而致魚鮪固充厨未聞商山翁受廛稅以租俗人難與言長吟野踟蹰青松在澗壑坐閲霜栁枯所嗟鄭亂雅復惡紫奪朱至道安可言多金豈禎符忽為躄躠者憔悴悲路隅簞瓢咏王風耿耿心勤劬次韻姑蘇錢塘懷古六首西子承吳寵餘蹤見古臺空遺昔時月無復昔人來臺邊越兵路幾見起兵埃釀酒劒池水玉壺清若無揮杯送落月山鬼共歌呼松間燈如漆白骨漫寒蕪耕鑿古隧穿乃吳桓王墓金雁隨泠風黃腸畢呈露物情一作悲歌異今昔踟蹰緩歸步仙人悲世換宴景在清都寒暑自來往英雄生釣屠錢塘江畔栁風雨夜啼烏江山國破後弔古一經行輦路苔花碧御溝菰葉生古迹今寧有新城江上橫南山靈石澗翠壁掩松關張君已厭世乘螭遂不還蘿磴餘幽躅今復誰躋攀贈惟寅隱几方熟睡故人來扣扉一笑無言説清坐淡忘機衣上松蘿雨袖中南澗薇知爾山中來山中無是非三十不娶妻四十不出仕逍遙巖岫間翳名以自肆何曾問理亂豈復陳美刺髙懷如漢隂終老無機事送惟寅春江煙靄緑逺樹明晴旭歸雁影斜斜鳴聲斷復續陳君挂帆去似與雁相逐水際白雲度山中甘雨足安得從耦耕柴門藝松菊去去且入城懷抱向誰傾姚公有古道虛夷多逺情俾爾遂髙隱狂歌樂幽貞至正二十三年正月草日余與諸友集於貞松白雪軒其地林石竒勝窗牖明潔且主人好文尚古有文武材款坐設肴醴相與嘯咏以小謝雲中辨江樹分韻各賦得辨字境靜塵慮清雨餘山光變池館閟虛間琴酌申繾綣蔚哉春木榮憩我飛翮倦石間有題字苔蝕已難辨對春樹端坐對春樹影落身上衣美人手所成紉縫願無違步庭悲往躅瞻景惜餘暉芳襟沾露濕蘭珮委風微凝思自的的染澤尚依依晨雞催夢短夜鵲逐魂飛歡愛自茲畢憔悴損容輝送致用遊閩韓衆禹穴來語我長生訣偶坐聽春雨雨止即言别乃知茅君山貞居相往還山經許寄我依依師友間貞居登真久識子十年後掣箱出遺文猶作蛟鼉吼子去逰七閩漁浦桃花春白鷗飛送爾停橈採緑蘋幔亭幾日到言笑邈無因慿將棹歌去歌向武夷君送馬生送子淮南行繫舟江岸栁翠影舞晴煙落我杯中酒舉杯向落日春水浮天碧時見白鷗飛雪光翻綺席應笑披羊裘獨釣江邊石寄楊廉夫吳松江水春汀洲多緑蘋彈琴吹鐵笛中有古衣巾我欲載美酒長歌東問津漁舟狎鷗鳥花下訪秦人寄李隱者南汀新月色照見水中蘋便欲乘清影緣源訪隱淪君住鈿山湖緑酒松花春夢披寒雪去疑是剡溪濵寄韓介石江上雨雲歇夕陽歌吹濛朱絃彈緑綺令我憶韓終魚戲弱藻下鳥飛明鏡中夢乘清浦月直過霅溪東次韻呈張德常陶公興寓酒杜老愁亦酌豪傑千載人處世何磊落吐詞蔚忠義安貧務簡約嗟哉嚇腐鳶邈矣鳴臯鶴朱火朱火日方永涼風拂琴絲麋鹿逰臺苑燕雀悲火帷蕩然京輔地無復漢官儀衆芳日蕪穢隂凝方自茲寄穹窿主者山雲淡縱橫幽鳥跂上下寂寥非世欣自足怡靜者平生卧逰趣屋壁何勞寫一作畫還期煮茯苓地爐同夜話題原道西溪草堂春水孤村迥荆溪罨畫西晚日鳴榔起山雨竹雞啼櫻桃花已落䕷蕪緑未齊酒船尋賀監蚤晚到幽棲煮石山房汲澗煮白石雲棲南澗隈敲石發新火荆薪藉餘灰坐候升降理靜觀寒燠媒遂忘石鼎沸乍疑山雨來丹成同此術鶴化詎能猜我亦餐金液清淺笑蓬萊出郭我初來城郭新緑餘薔薇今我既出郭秋蓮落紅衣郊居豈為是市隱勿云非去去將何從西山行路微塵坌夸毗海遊潛四月餘賦歸亦無家塊處蝸牛廬身世一逆旅成虧分疾徐反已內自觀此心同太虛聽錢文則彈琴牛鳴野窖中雞登山木上黃鍾雜姑洗舂容以清亮别鵠暮鳴飛流水春演漾愛爾絃手忘令我形神暢憶昔擅能事宋袁余所向錢君生獨後超軼絶塵鞅操琴晚聞道月斧揮天匠杳如清廟瑟朱絃聽歎唱古道久寂寥古音亦淪喪促軫淚沾纓歌詩重悲悵贈王仲和荒城夜風雨草木曉離披桂馥逗虛牖苔文滋硯池弄翰聊寄逸永日以自怡且盡一日樂明朝非所知酬張德機見贈嘉藻枉我前令人意也消展咏當庭一作前除清隂起涼飇出何去巗穴隱何逃市朝仙師赤城霞旦旦存神標贈張士行雲門有逸客非仕亦非隱玉井千尺泉此士難汲引結交雲林叟不顧俗嘲哂我拙唯任真子德常戒謹相知既有素力學仰顔閔久别見容色英資固天稟欲疏不能忘欲褻不可近贈友生春林積雨晴汀一作江渚煙波緑谷鳥語綿蠻澗泉聲斷續蘿徑無來蹤空山聞伐木時援清琴坐還同白雲宿九日過彥行和韻二首蕩舟煙景晚舉杯當素秋黃花忽在眼白髮乃滿頭臨流發悲嘆援琴歌楚調罷席更淹留明月波間照何事鹿皮翁逃名隱屠釣九日喜初晴登髙向何處山色見微茫波光淡容與鼓枻逐輕鷗看雲覓新句適值無懷民相對澄神慮對酒題詩石壁上把酒長松間逺水白雲度晴天孤鶴還虛亭映苔竹聊此息躋攀坐久日已暮春鳥聲關關贈野處民水聲轉屋西山翠浮屋東牀前苔滋雨門外松吟風怡然無世一作外慮心廣神為充曲肱以飲水至樂在其中擊壤歌往古寧知事王公靈鶴辭陶公職仙署子良亦冥通所修楊許業存思在祝融周卿宅丹元末胤仰仙宗神明接祈禱虛夷恆恪恭飛霞煥玉檢流響徹金宮白鶴翔香煙仙仙載泠風舞影緑雲上命侣青田中晨去瑶草春暮歸海塵濛真靈忽降室羽車儼浮空步虛酌明水逶迤清夜終陸德中祈雨有感辟榖清虛久晨窗餐絳霞濯神咸池水宴景丹元家憂國悲民瘼旱郊起雷車枯魚出涸轍稿苗生稻花我住清江渚種芹繞江沙忽乘蓮葉舟贈我仙掌茶擬訪安期生為覓棗如瓜卧病旱憂命觴斚抱疾忽經旬止酒卻腥腐端居謝喧塵粗穢除內滯清虛以怡神江雲載飛雨飄飄灑衣巾矯首詠玄虛精思候仙真道園逰恬淡心兵息狂狺泠然風濤靜鼓枻銀河津戒哉貪叨子病源果何因清閟閣全集卷一
