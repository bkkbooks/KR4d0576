body:
  text: 清閟閣全集巻九元倪瓚撰樂府小桃紅陸莊風景又蕭條堪歎還堪笑世事茫茫更誰料訪漁樵後庭玉樹當時調可憐商女不知亡國吹向紫鸞簫一江秋水淡寒煙水影明如練眼底離愁數行雁寫晴天白一作緑蘋紅蓼參差見吳歌蕩槳一聲哀怨驚起鷺鷗眠五湖煙水未歸身天地雙蓬髩白酒新篘㑹隣近主酬賔百年世事興亡運青山數㸃漁舟一葉聊且避風塵踏莎行春渚芹蒲秋郊梨棗西風沃野収紅稻簷前炙背媚晴陽天涯轉瞬凄芳草魯望漁村陶朱烟島髙風峻節如今掃黄雞啄黍濁醪香開門迎笑東隣老鷓鴣天笠澤沿洄十五年親知情義日堪憐偷兒三顧吾何有俗士羣譏自省愆聊復爾豈其然田翁輕慢牧童顛乃知造物深相與急使江湖棹去船江城子滿城風雨近重陽溼秋光暗横塘蕭瑟汀蒲岸栁送凄凉親舊登髙前日夢松菊徑也應荒堪將何物比愁長緑泱泱遶秋江流到天涯盤屈九回腸烟外青薲飛白鳥歸路阻思微茫蝶戀花夜永愁人偏起早客髩蕭蕭鏡裏看枯槁雨葉鋪庭風為掃閒門寂寞生秋草行路難行悲逺道說著客行真箇令人惱久客還家貧亦好無家謾自傷懷抱清平樂在荆溪作汀煙溪樹總是傷心處望㫁溪流東北注夢逐孤雲歸去山花野鳥初春漁郎樵叟南津誰識摧頽老子醉人推罵從嗔凭欄人贈吳國良客有吳郎吹洞簫明月沉江春霧曉湘靈不可招水雲中環珮揺人月圓傷心莫問前朝事重上越王臺鷓鴣啼處東風草緑殘照花開悵然孤嘯青山故國喬木蒼苔當時明月依依素影何處飛来驚回一枕當年夢漁唱起南津畫屏雲嶂池塘春草無限消魂舊家應在梧桐覆井楊桺藏門閒身空老孤篷聽雨燈火江村太常引傷逝門前楊桺密藏鴉春事到桐華敲火試新茶想月珮雲衣故家苔生雨館塵凝錦瑟寂寞聽鳴蛙芳草際天涯蝶栩栩春暉夢華殿前歡搵啼紅杏花消息雨聲中十年一覺揚州夢春水如空雁波寒寫去踪離愁重南浦行雲送氷弦玉柱彈怨東風水仙子東風花外小紅樓南浦山横眉黛愁春寒不管花枝瘦無情水自流簷間燕語嬌柔驚回幽夢難尋舊遊落日簾鈎吹簫聲㫁更登樓獨自凭欄獨自愁斜陽緑慘紅消瘦長江天際流百般嬌千種温柔金縷曲新聲低按碧油車名園共遊絳綃裙羅襪如鈎折桂令擬張鳴善草茫茫秦漢陵闕世代興亡却便似月影圓缺山人室堆案圖書當牕松桂滿地薇蕨侯門深何須刺謁白雲閒自可怡悅到如今世事難說天地間不見一箇英雄不見一箇豪傑又辛亥過陸莊片帆輕水逺山長鴻雁将来菊蕊初黄碧海鯨鯢蘭苕翡翠風露鴛鴦問音信何人蔕當想情懷舊日風光楊桺池塘隨處凋零無限思量水仙子因觀花間集作香腮玉膩髩蟬輕翡翠釵梁碧燕横新妝懶歩紅芳逕小重山雲一作空畫屏繡簾風煖春醒烟草粘飛絮蛛絲落英無限傷情江城子感舊牕前翠影溼芭蕉雨瀟瀟思無聊夢入故一作郷園山水碧迢迢依舊當年行樂地香徑杳緑苔饒沉香火底坐吹簫憶妖嬈想風標同歩芙蓉花畔赤欄橋漁唱一聲驚夢覺無覔處不堪招桺梢青贈妓小璚英樓上玉笙吹徹露冷飛璚珮玦黛淺含顰香殘棲夢子規啼月揚州徃事荒涼有多少愁縈思結燕語空梁鷗盟寒渚畫欄飄雪南郷子東林橋雨篷夢歸篷上雨潺潺篷底幽人夢故山磵戶林扉元不閉蕭閒只有飛雲可徃還波冷玉珊珊一壑松風引珮環咏得池塘春草句更闌行盡千峰半霎間太常引夀彞齋桺隂濯足水侵磯香度野薔薇芳草緑萋萋問何事王孫未歸一壺濁酒一聲清唱簾幙燕雙飛風暖試輕衣介眉夀遥瞻翠微鵲橋仙富豪休恃英雄休使一旦繁華如洗鵲巢何事借鳩居數載主三易矣東家烟起西家烟起無復碧翬朱啓我来重宿半間雲舊製唯餘此耳憶秦娥昨日嘗賦憶秦娥一首以介石齋前木樨盛開俾具一巵酒無使花神笑人寂寞蓋以風雨傷懷耳兹重改呈又作一首共寫呈君今却不可黙黙也扶疎玉蟾宫樹影闌干曲闌干曲一襟香露㡬枝金粟姮娥鏡裏秋雲緑無端風雨聲相續聲相續不須澄霽為酤醽醁參差玉笙聲暮起瑶臺曲瑶臺曲輕風香浸夜涼肌粟黄雲巧綴飛霞緑清吟未㫁秋霖續秋霖續恐孤花意倒尊中醁如夢令削跡松陵華㝢藏密白雲深處造物已安排萬事何須先慮歸去歸去海鶴山猿同住贊釋迦牟尼佛贊稽首無上具足尊無人我衆生夀者千偈瀾翻了無說拈花傳燈長不夜無浄居士寳雲菴懶瓉述鶴林周𤣥初像贊棲真紫虚之上館宴景致道之𤣥宫劒影拂三珠樹之朗月佩聲鏘七星檜之靈風導之紫鸞笙從以白玉童變化隐顯如左元放其召致鬼物似齊少翁嘘陽吸隂以贊育元化封山召雲以役使社公琴三疊兮百神欣恱舞胎仙於絳霄寥廓中者耶金粟道人小像贊謂其有意於榮進與詠歌彈琴誦古人之書謂其濶略於世故與能廓充先世之業昌大其門閭逍遥户庭名聞京師忽自逸於塵氛之外駕扁舟於五湖性印朗月身同太虚非欲㑹𤣥覺於一致而貫通於儒者耶立菴像贊貌侵而骨立色敷而内腴斯遯世之士列仙之臞隨時以守其分守獨以樂其迂寓乎外或頹然浄名方丈之室或悠然莊周㝠漠之區及其探於中則身處仁行蹈義師慕乎聖哲而弗殊𤣥冠野服蕭散紆徐是殆所謂逃於禪游於老而據於儒者乎鶴溪先生像贊家庭教子佩學詩學禮之言巗穴置身有憂國憂民之色是知克仁而夀能文而徳也趙士瞻小像贊處乎寂寞之濱乃有恱豫之色將儕於列仙癯於山澤我知之矣豈登山臨水以忘歸貧賤不足為其憂富貴不足為其懌者非耶陳天倪處士像贊其介特孤峭非松瀑之甥而能然歟其好學能文蓋嘗從遊於草廬棲遲衡門之下鼓瑟動操之間令衆山響與之俱童冠風雩以閒咏逮乎暮春之初王季野像贊粹然春温者猶有若翁素履之徳容也凛乎秋清者得乎湘纍楚騷之遺風也與時上下人莫知其所存乎中也匪以吾義吾將曷從也喬木鶯鳴雲山鶴飛輕薄紛紛吾何是非登山臨水聊逍遥以忘歸徳常張先生像贊錢唐王生思善畵徳常時年四十二矣徳常髙情虚夷意度閒雅顧非顧長康之邱壑置身曹將軍之凌烟潤色又那縁得其氣韻耶王生葢亦見其善者㡬耳今日因過徳常草堂出此圖求贊且欲作樹石其旁乃先綴數語像上樹石俟它日補為之誦詩讀書佩先師之格言登山臨水得曠士之樂全非仕非隠其㡬其天雲不雨而常潤玉雖工而匪鐫其據於儒依於老逃於禪者歟題跋題唐張長史春草帖右唐張長史春草帖鋒頴纖悉可尋其源而麻紙松煤古意溢目真是為唐人法書之冠晉跡不可復見得見此跡亦希世之珍乎顔平原書家之集大成者猶言杜詩韓文張法亦出於此也因與袁君子英獲觀陳彦㢘氏賞歎竟日壬子人日題題唐懐素酒狂帖癸丑八月廿一日觀於耕漁軒時積雨初霽殘暑猶熾王季耕自其山居折桂花一枝以石罌注水挿花著几格間户庭閴寂香氣郁然展玩此卷久之如在世外也題東坡村醪帖坡翁此巻筆意比徐季海尤覺天真爛漫也癸丑中秋同王季耕觀於徐良夫之耕漁軒題黄子久畫本朝畵山林水石髙尚書之氣韻閒逸趙榮禄之筆墨峻㧞黄子久之逸邁王叔明之秀潤清新其品第固自有甲乙之分然皆予歛袵無間言者外此則非予所知矣此巻雖非黄傑思要亦自有一種風氣也至正十二年三月七日與明道尊師謁張先生出此示余遂得縱觀東海倪瓚題跋陳惟寅作闗侯論三國之君其才智雖互有短長其實皆命世之雄也將帥如闗侯軰亦何可多得哉惟寅博學能文識古今治亂之體人物才智之短長感事傷時故為之慷慨著論如此題天香深處巻後周遜學讀書養親孜孜嗜古學行隠居而急義昔董生下帷不窺園揚子校書不以仕進為念周君有其志焉自宋道國公濓溪先生之裔有八世伯祖寓建寧之浦城登紹聖四年乙未科仕至吏部尚書德業昭著五子皆進士榮顯於朝所居有仙桂堂天香亭天雨清芬樓戶庭之間桂樹紛列秋風扇凉香氣逺逹髙祖始来居吳祖紫華先生仕隠樂道每求活人於死地隂功及物奕奕然向顯異矣年六十六微示疾十許日對客坐語如常時及午正容歛衣翛然而逝葬常熟虞仲山下後二十七年冢為盜所發徃易棺歛膚體如生遍生髭髪爪甲皆長寸餘因改葬吳縣道山之原見者莫不歎異遜學長身玉立勤儉自持遇人有禮節而純篤能盡力於孝養卓然頴出乎流俗矣左丞相伯温甫深期其必紹隆乎祖徳也既名其端居之室曰傳桂又曰天香深處周公其善夫取喻矣匪芳之馨惟徳之馨繩其祖父光逺以有耀非子其誰哉若夫山毓秀而石韞玉川容媚而蚌蔵珠空谷蘭芳幽林芝孕徳盛而業充又何患人之不知也已七月廿三日倪瓚書於巻後題紫華周公碑傳行狀後紫華上卿游心恬淡之園濯神清泠之渚仕雖不顯利澤甚溥遇真仙故晚得尸解上道是學道之士非祖宗流慶骨神合仙精修𠖇契何由仙靈降室哉觀陶貞白㝠通記庶知之耳因讀上卿碑及傳為之慨然久之壬子九月二十日倪瓚書跋蔡君謨墨蹟蔡公書法真有唐人風粹然如琢玉米老雖追蹤晉人絕軌其氣象怒張如子路未見夫子時難與比倫也辛亥三月九日跋趙松雪詩稿趙榮禄髙情散朗殆似晉宋間人故其文章翰墨如珊瑚玉樹自足照映清時雖寸縑尺楮散落人間莫不以為寳也今人工詩文字畫非不能粉澤妍媚山雞野鶩文彩亦爾斕斑若其神韻則與孔翠殊致此無他固在人品何如耳此巻張徳常得之榮禄之子仲穆盧山甫二月廿日見過田舎㩦以示僕因題至正二年壬午嵗也題陳惟允畵荆溪圖東坡先生嘗曰一入荆溪便覺意思豁然欲買田其間種橘作小亭名以楚頌卒不遂其志杜樊川作水榭正當荆溪之上其遺址僧結菴以居至今歴歴可考見葢荆溪山水之勝善權離墨銅官諸山岡隴之起伏雲霞之吞吐具區滙於其左苕霅引於其前凡仙佛之所宫髙人逸流之所宅殆不可以計數也覺軒王先生韞真潛徳於其間修天爵以恒貴去人欲以求仁埀子若孫皆循循雅飭弗違先生志也其曾孫允同静而有志簡而能文與予為姻契故予知其義方之訓有自来矣河之始逹也涓涓不止才濫觴焉楩楠松栢千尺之材出於萌蘖之微由其源沈而本深耳允同命予友陳君惟允繪為荆溪圖以示不忘鄉都之意他日指圖而歎曰某樹也吾祖之所封植也某丘也吾父之所㳺登也寧無愓然有感於中乎若允同之一舉足話言而不敢忘其祖若父者非教之有素而能然哉吾固知其中多隠君子既樂善於一世又能使其將来之未艾葢亦山川之鍾秀粹美而致然乎嵗己亥五月十三日東海生倪瓚漫書題師子林圖予與趙君善長以意商確作師子林圖真得荆闗遺意非王蒙所夢見也四海名公宜寳之懶瓚記題張貞居書卷貞居真人詩文字畫皆為本朝道品第一雖獲片楮隻字猶為世人寳藏况彦亷所得若是之富且妙邪舒巻累日欣慨交心噫師友淪没古道寂寥今之才士方髙自標致子方憂古之君子終陸沉耳吾知前人好修不以為賢於流俗而遂已不患人之不知栗里翁志不得遂飲酒賦詩但自陶寫而已豈求傳哉壬子初月八日題題宣伯炯書本朝書法之妙若趙榮禄虞奎章之篆𨽻行草無不如意范清江張貞居之楷法清勁絶俗鮮于奉常巙相國之草聖圓活姿媚迨元戎周左丞之篆籀古雅亦何讓前人哉宣君伯炯正書法度森嚴得法於薛子立氏而或過之伯炯已矣工字學者智未及此也跋畵至正辛丑十二月廿四日徳常明公自吳城將還嘉定道出甫里棙柁相就語俯仰十霜恍若隔世為留信宿夜闌更秉燭相對如夢寐者甚似為僕發也明日微雪作寒户無来迹獨與明公逍遥渚際隔江遥望天平靈巗諸山在荒煙逺靄中濃纖出没依約如畵渚上踈林枯桺似我容髪蕭蕭可憐生不能滿百其所以異於草木者獨情好耳年逾五十日覺死生忙能不為之撫舊事而縱逺情乎眀公復命畵江濱寂寞之意并書相與乖離感慨之情徳常今為嘉定二府於民有恵政即昔日之良常山人也朱陽館主蕭閒仙卿倪瓚言跋畵竹以中每愛余畵竹余之竹聊以寫胸中逸氣耳豈復較其似與非葉之繁與疎枝之斜與直哉或塗抹久之它人視以為麻為蘆僕亦不能强辨為竹真没奈覽者何但不知以中視為何物耳跋環慶王氏所藏趙榮禄六帖右趙榮禄與覺軒先生手簡共六紙有以知交誼之深家世之舊也先生學行純正為宋琅琊王仲寳之後仕至蘭谿州判官今獲觀於其孫光大之彞齋老成典刑不可復見矣尚賴翰墨文章有以想其風流哉時庚子二月十日倪瓚題跋畵巻後余與宗普道兄别十有六年矣忽邂逅吳下杯酒陳情不能相舎老杜所謂夜闌更秉燭相對如夢寐者諷詠斯語相與愴然人生良㑹不易而况艱虞契濶若此者乎以十餘載而僅一面則人生果能㡬㑹邪悲慨未有若此言也明日道兄將歸錢塘余亦鼓柁煙波之外因寫圖賦詩以寓别後戀戀不盡之情云爾至正十四年二月十二日倪瓚葑門客樓書是日昔刺正卿陸季和願思恭同集題畵巻無錫王容溪先生嘗賦如夢令云林上一溪春水林下數峰嵐翠中有隠居人茆屋數間而已無事無事石上坐看雲起髙房山嘗繪之為圖貞居詩云歌此芙蓉窈窕章山隂茅宇日凄涼不是筆端天與巧落割雲山與侍郎今亡已夫余戲用其意為圖贈仲冕辛亥春倪瓚附王梧溪跋予謝病將還鄉壠道謁梁侍郎顧先生祠就宿寳雲禪舎是夕王仲冕相與論心久之而去明日過仲冕見先友倪幼霞畵且獲觀王容溪張貞居二公詩詞適仲冕徵賦苽村亦為長短句一闋衰憊之餘一時清興殊灑然也簷聳數株松子邨遶一灣菰米鷗外迥聞雞望望雲山烟水多此多此酒進玉盤雙鯉梧溪老人王逢時年六十有五題畵正月十四日舟過吳江第四橋大風浪中貯水一瓢而去乃賦小詩曰松陵第四橋前水風急猶須貯一瓢敲火煮茶歌白苧怒濤翻雪小停橈是夜泊舟吳江城外人家水月皓然與希言清咏久之明日題壁詩曰人家近住江城外月色波光上下天風景自佳時俗異泊舟閒詠白雲篇十五日與希言謁三髙祠望江上諸山為寫隔江山色圖并賦詩贈别白鷗飛處夕陽明山色隔江睂黛横試看三髙祠下水悠悠中有别離情十九日雨畱陶篷戲寫逺樹石岫并録三詩用發一笑倪瓚附吳澹雲詩跋曾過吳江訪隠淪三髙祠下賦詩頻屋梁落月原非夢野水疎篁是寫真富貴行窩空舊業太平風韻憶斯人長疑祗在鷗波上破衲焚香理釣緍雲林髙士清才雅望嘗遯世吳中變名易服嘗駕一小舟出東市門以沉烟㶿馥波上為物色所得區區親承道徳者十年徳原先生亦以文墨見愛今皆逝去憗遺殘齒七十有七矣文禎特示圖咏恍若對面以成三歎不知存没為間惡得無慨也洪武壬午春花朝日華亭澹雲吳哲識題畵至正五年三月八日𤣥素先生来林下瓚乃賦詩曰吳淞江水春暎空浪波沄沄霞影紅畊田鑿井居其左令我長懐甫里翁夢見維舟江畔桺剝啄敲門散杯酒整冠起接平生歡石逕蘭芳重㩦手雨後共行林下正見恵山先生命瓚寫之畵訖因書此詩於上張外史陳先生見之必大笑也倪瓚記附用韻題畵上詩陳方佳樹隂森欲礙空畵成夜落燈花紅絶憐帶經自鋤者未忍竟别天隨翁汾湖春雲散髙栁湖水微茫緑於酒翁歸天末見青山臨風莫負揮絃手題荆溪清逺圖荆溪吳國良工製墨善吹簫好與賢士大夫遊張貞居每館寓其家艤舟籬傍興盡便返故國良得貞居翰墨為多今年夏予以事至郡中泊舟文忠祠後國良便從溪上具小舟相就語為援簫作三五弄慰予寂寞并以新製桐花煙墨為贈予嘉其思致近古遂寫荆溪清逺圖以遺之實至正十年四月廿一日也東海倪生記畵龍門獨歩圖載秣陵盛時奉城山總錄雲林逸人為復菴長老寫龍門獨歩恩公昔住太平日林下相逢壊色袍行到龍門無脚力右肩褊袒喫櫻桃此詩乃張伯雨外史訪㫁江恩公所作者也余嘗與外史有師友之義乙巳嵗余訪復菴留山中者數日復菴誦此詩不輟口余既寫圖遂書於其上云題畵夏圭所作千巗競秀圖巖岫縈廻層見叠出林木樓觀深邃清逺亦非庸工俗吏所能造也葢李唐者其源亦出於荆范之間夏圭馬逺輩又法李唐故其形模若此便如馬和之人物犬馬未嘗不知祖吳生而師龍眠耳錢塘詹仲華以端石一華邦憲墨半丸古玉璏一易此巻至正四年十二月廿四日倪瓚記題仙山圖仙山圖陳君惟允所畵秀潤清逺深得趙榮祿筆意其人已矣今不可復得辛亥十二月二日瓚重覽紫華周公碑傳癸丑七月廿九日重覽若夫楊髙龔三君子之著述顔真卿詩語之隠微余雖不識上卿於心見上卿政績在人隂功及物又能進修上道其尸解而遊仙復何疑哉瓚又題題周遜學府君遺翰後周遜學氏之先大父制機府君之手書猶足以想見前人風流也遜學寳藏以傳之子孫孝思豈有窮哉壬子九月十三日獲覩於眀善齋之西軒題王畊雲所藏墨蹟畊雲所藏子山平章仲舉承㫖暨兄季野員外三公遺墨一巻癸丑八月六日来訪畊雲於鳳岡山室出此相示以娛樂俾予評之余謂子山之書風流沓拖如王謝家子弟無一㸃寒陋氣可與鮮于奉常相照暎也仲舉書絶去險陋似褚河南其為樂章亞於遺山先生季野書骨肉豐美有虞永興意度詩詞亦伉爽不凡余之所見若此不知畊雲然余言耶載妮古録髙房山清節雅尚有馬先生亦其國人遂號彦敬葢司馬慕藺之意也倪元鎮言題王右軍楷書帖載文氏停雲館帖陶隠君與梁武論書表云右軍名蹟合有數首黄庭曹娥畵贊樂毅論是已當時臨榻偽寫已多况今日乎此刻尤有筆意真可寳也倪瓚為公采題書次韻惟寅髙士姑蘓錢塘懐古六詩跋載文氏停雲館帖惟寅徵君古所謂獨行士也安貧志道居吳市二十年葢若一日真外混光塵中分涇渭而確乎不為外物移其守余獨深知其人他人有不得而知之者也賦詩翰墨特其餘事耳去年秋偕叔明友兄訪余江渚出此六詩相示諷詠之餘因同叔明用韻各和成章今年余病㿃下疾㡬半載惟寅凡兩来問余十一月一日覺體中稍佳惟寅命余寫出遂復書此至正廿二年壬寅歲倪瓚記清閟閣全集巻九
