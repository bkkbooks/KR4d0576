body:
  text: 清閟閣全集卷九元倪瓚撰樂府小桃紅陸莊風景又蕭條堪歎還堪笑世事茫茫更誰料訪漁樵後庭玉樹當時調可憐商女不知亡國吹向紫鸞簫一江秋水淡寒煙水影明如練眼底離愁數行雁寫晴天白一作緑蘋紅蓼參差見吳歌蕩槳一聲哀怨驚起鷺鷗眠五湖煙水未歸身天地雙蓬鬢白酒新篘會鄰近主酬賔百年世事興亡運青山數點漁舟一葉聊且避風塵踏莎行春渚芹蒲秋郊梨棗西風沃野收紅稻簷前炙背媚晴陽天涯轉瞬凄芳草魯望漁村陶朱煙島髙風峻節如今掃黃雞啄黍濁醪香開門迎笑東鄰老鷓鴣天笠澤沿洄十五年親知情義日堪憐偷兒三顧吾何有俗士羣譏自省愆聊復爾豈其然田翁輕慢牧童顛乃知造物深相與急使江湖棹去船江城子滿城風雨近重陽溼秋光暗橫塘蕭瑟汀蒲岸栁送凄涼親舊登髙前日夢松菊徑也應荒堪將何物比愁長緑泱泱繞秋江流到天涯盤屈九回腸煙外青薲飛白鳥歸路阻思微茫蝶戀花夜永愁人偏起早客鬢蕭蕭鏡裏看枯稿雨葉鋪庭風為掃間門寂寞生秋草行路難行悲逺道説著客行真箇令人惱久客還家貧亦好無家謾自傷懷抱清平樂在荆溪作汀煙溪樹總是傷心處望斷溪流東北注夢逐孤雲歸去山花野鳥初春漁郎樵叟南津誰識摧頽老子醉人推罵從嗔憑欄人贈吳國良客有吳郎吹洞簫明月沉江春霧曉湘靈不可招水雲中環珮搖人月圓傷心莫問前朝事重上越王臺鷓鴣啼處東風草緑殘照花開悵然孤嘯青山故國喬木蒼苔當時明月依依素影何處飛來驚回一枕當年夢漁唱起南津畫屏雲嶂池塘春草無限消魂舊家應在梧桐覆井楊柳藏門間身空老孤篷聽雨燈火江村太常引傷逝門前楊柳密藏鴉春事到桐華敲火試新茶想月珮雲衣故家苔生雨館塵凝錦瑟寂寞聽鳴蛙芳草際天涯蝶栩栩春暉夢華殿前歡搵啼紅杏花消息雨聲中十年一覺揚州夢春水如空雁波寒寫去蹤離愁重南浦行雲送氷弦玉柱彈怨東風水仙子東風花外小紅樓南浦山橫眉黛愁春寒不管花枝瘦無情水自流簷間燕語嬌柔驚回幽夢難尋舊遊落日簾鈎吹簫聲斷更登樓獨自憑欄獨自愁斜陽緑慘紅消瘦長江天際流百般嬌千種溫柔金縷曲新聲低按碧油車名園共遊絳綃裙羅襪如鈎折桂令擬張鳴善草茫茫秦漢陵闕世代興亡却便似月影圓缺山人室堆案圖書當窗松桂滿地薇蕨侯門深何須刺謁白雲間自可怡悅到如今世事難説天地間不見一箇英雄不見一箇豪傑又辛亥過陸莊片帆輕水逺山長鴻雁將來菊蕊初黃碧海鯨鯢蘭苕翡翠風露鴛鴦問音信何人蒂當想情懷舊日風光楊柳池塘隨處凋零無限思量水仙子因觀花間集作香腮玉膩鬢蟬輕翡翠叉梁碧燕橫新妝懶步紅芳徑小重山雲一作空畫屏繡簾風暖春醒煙草粘飛絮蛛絲落英無限傷情江城子感舊窗前翠影溼芭蕉雨瀟瀟思無聊夢入故一作鄉園山水碧迢迢依舊當年行樂地香徑杳緑苔饒沉香火底坐吹簫憶妖嬈想風標同步芙蓉花畔赤欄橋漁唱一聲驚夢覺無覔處不堪招柳梢青贈妓小璚英樓上玉笙吹徹露冷飛璚珮玦黛淺含顰香殘棲夢子規啼月揚州往事荒涼有多少愁縈思結燕語空梁鷗盟寒渚畫欄飄雪南鄉子東林橋雨篷夢歸篷上雨潺潺篷底幽人夢故山澗戶林扉元不閉蕭間只有飛雲可往還波冷玉珊珊一壑松風引珮環咏得池塘春草句更闌行盡千峰半霎間太常引夀彞齋柳隂濯足水侵磯香度野薔薇芳草緑萋萋問何事王孫未歸一壺濁酒一聲清唱簾幕燕雙飛風暖試輕衣介眉夀遙瞻翠微鵲橋仙富豪休恃英雄休使一旦繁華如洗鵲巢何事借鳩居數載主三易矣東家煙起西家煙起無復碧翬朱啓我來重宿半間雲舊製唯餘此耳憶秦娥昨日嘗賦憶秦娥一首以介石齋前木樨盛開俾具一巵酒無使花神笑人寂寞蓋以風雨傷懷耳兹重改呈又作一首共寫呈君今却不可默默也扶疏玉蟾宫樹影闌干曲闌干曲一襟香露幾枝金粟姮娥鏡裏秋雲緑無端風雨聲相續聲相續不須澄霽為酤醽醁參差玉笙聲暮起瑶臺曲瑶臺曲輕風香浸夜涼肌粟黃雲巧綴飛霞緑清吟未斷秋霖續秋霖續恐孤花意倒尊中醁如夢令削迹松陵華宇藏密白雲深處造物已安排萬事何須先慮歸去歸去海鶴山猿同住贊釋迦牟尼佛贊稽首無上具足尊無人我衆生夀者千偈瀾翻了無説拈花傳燈長不夜無淨居士寶雲菴懶瓉述鶴林周玄初像贊棲真紫虛之上館宴景致道之玄宫劒影拂三珠樹之朗月佩聲鏘七星檜之靈風導之紫鸞笙從以白玉童變化隱顯如左元放其召致鬼物似齊少翁噓陽吸隂以贊育元化封山召雲以役使社公琴三疊兮百神欣恱舞胎仙於絳霄寥廓中者耶金粟道人小像贊謂其有意於榮進與詠歌彈琴誦古人之書謂其濶略於世故與能廓充先世之業昌大其門閭逍遙户庭名聞京師忽自逸於塵氛之外駕扁舟於五湖性印朗月身同太虛非欲會玄覺於一致而貫通於儒者耶立菴像贊貌侵而骨立色敷而內腴斯遁世之士列仙之臞隨時以守其分守獨以樂其迂寓乎外或頽然淨名方丈之室或悠然莊周冥漠之區及其探於中則身處仁行蹈義師慕乎聖哲而弗殊玄冠野服蕭散紆徐是殆所謂逃於禪遊於老而據於儒者乎鶴溪先生像贊家庭教子佩學詩學禮之言巗穴置身有憂國憂民之色是知克仁而夀能文而德也趙士瞻小像贊處乎寂寞之濱乃有恱豫之色將儕於列仙癯於山澤我知之矣豈登山臨水以忘歸貧賤不足為其憂富貴不足為其懌者非耶陳天倪處士像贊其介特孤峭非松瀑之甥而能然歟其好學能文蓋嘗從遊於草廬棲遲衡門之下鼓瑟動操之間令衆山響與之俱童冠風雩以間咏逮乎暮春之初王季野像贊粹然春溫者猶有若翁素履之德容也凛乎秋清者得乎湘纍楚騷之遺風也與時上下人莫知其所存乎中也匪以吾義吾將曷從也喬木鶯鳴雲山鶴飛輕薄紛紛吾何是非登山臨水聊逍遙以忘歸德常張先生像贊錢唐王生思善畫德常時年四十二矣德常髙情虛夷意度間雅顧非顧長康之邱壑置身曹將軍之凌煙潤色又那緣得其氣韻耶王生蓋亦見其善者幾耳今日因過德常草堂出此圖求贊且欲作樹石其旁乃先綴數語像上樹石俟它日補為之誦詩讀書佩先師之格言登山臨水得曠士之樂全非仕非隱其幾其天雲不雨而常潤玉雖工而匪鐫其據於儒依於老逃於禪者歟題跋題唐張長史春草帖右唐張長史春草帖鋒頴纖悉可尋其源而麻紙松煤古意溢目真是為唐人法書之冠晉迹不可復見得見此迹亦希世之珍乎顔平原書家之集大成者猶言杜詩韓文張法亦出於此也因與袁君子英獲觀陳彥廉氏賞歎竟日壬子人日題題唐懷素酒狂帖癸丑八月草一日觀於耕漁軒時積雨初霽殘暑猶熾王季耕自其山居折桂花一枝以石罌注水插花著几格間户庭閴寂香氣郁然展玩此卷久之如在世外也題東坡村醪帖坡翁此卷筆意比徐季海尤覺天真爛漫也癸丑中秋同王季耕觀於徐良夫之耕漁軒題黃子久畫本朝畫山林水石髙尚書之氣韻間逸趙榮祿之筆墨峻拔黃子久之逸邁王叔明之秀潤清新其品第固自有甲乙之分然皆豫斂袵無間言者外此則非豫所知矣此卷雖非黃傑思要亦自有一種風氣也至正十二年三月七日與明道尊師謁張先生出此示余遂得縱觀東海倪瓚題跋陳惟寅作關侯論三國之君其才智雖互有短長其實皆命世之雄也將帥如關侯輩亦何可多得哉惟寅博學能文識古今治亂之體人物才智之短長感事傷時故為之慷慨著論如此題天香深處卷後周遜學讀書養親孜孜嗜古學行隱居而急義昔董生下帷不窺園揚子校書不以仕進為念周君有其志焉自宋道國公濓溪先生之裔有八世伯祖寓建寧之浦城登紹聖四年乙未科仕至吏部尚書德業昭著五子皆進士榮顯於朝所居有仙桂堂天香亭天雨清芬樓戶庭之間桂樹紛列秋風扇涼香氣逺逹髙祖始來居吳祖紫華先生仕隱樂道每求活人於死地隂功及物奕奕然向顯異矣年六十六微示疾十許日對客坐語如常時及午正容斂衣翛然而逝葬常熟虞仲山下後二十七年冢為盜所發往易棺斂膚體如生遍生髭髮爪甲皆長寸餘因改葬吳縣道山之原見者莫不歎異遜學長身玉立勤儉自持遇人有禮節而純篤能盡力於孝養卓然頴出乎流俗矣左丞相伯溫甫深期其必紹隆乎祖德也既名其端居之室曰傳桂又曰天香深處周公其善夫取喻矣匪芳之馨惟德之馨繩其祖父光逺以有耀非子其誰哉若夫山育秀而石韞玉川容媚而蚌藏珠空谷蘭芳幽林芝孕德盛而業充又何患人之不知也已七月草三日倪瓚書於卷後題紫華周公碑傳行狀後紫華上卿遊心恬淡之園濯神清泠之渚仕雖不顯利澤甚溥遇真仙故晚得尸解上道是學道之士非祖宗流慶骨神合仙精修冥契何由仙靈降室哉觀陶貞白冥通記庶知之耳因讀上卿碑及傳為之慨然久之壬子九月二十日倪瓚書跋蔡君謨墨迹蔡公書法真有唐人風粹然如琢玉米老雖追蹤晉人絶軌其氣象怒張如子路未見夫子時難與比倫也辛亥三月九日跋趙松雪詩稿趙榮祿髙情散朗殆似晉宋間人故其文章翰墨如珊瑚玉樹自足照映清時雖寸縑尺楮散落人間莫不以為寶也今人工詩文字畫非不能粉澤妍媚山雞野鶩文彩亦爾斕斑若其神韻則與孔翠殊致此無他固在人品何如耳此卷張德常得之榮祿之子仲穆盧山甫二月草日見過田舍㩦以示僕因題至正二年壬午嵗也題陳惟允畫荆溪圖東坡先生嘗曰一入荆溪便覺意思豁然欲買田其間種橘作小亭名以楚頌卒不遂其志杜樊川作水榭正當荆溪之上其遺址僧結菴以居至今歷歷可考見蓋荆溪山水之勝善權離墨銅官諸山岡隴之起伏雲霞之吞吐具區滙於其左苕霅引於其前凡仙佛之所宫髙人逸流之所宅殆不可以計數也覺軒王先生韞真潛德於其間修天爵以恆貴去人欲以求仁埀子若孫皆循循雅飭弗違先生志也其曾孫允同靜而有志簡而能文與豫為姻契故豫知其義方之訓有自來矣河之始逹也涓涓不止才濫觴焉楩楠松柏千尺之材出於萌蘖之微由其源沈而本深耳允同命豫友陳君惟允繪為荆溪圖以示不忘鄉都之意他日指圖而歎曰某樹也吾祖之所封植也某丘也吾父之所遊登也寧無愓然有感於中乎若允同之一舉足話言而不敢忘其祖若父者非教之有素而能然哉吾固知其中多隱君子既樂善於一世又能使其將來之未艾蓋亦山川之鍾秀粹美而致然乎嵗己亥五月十三日東海生倪瓚漫書題師子林圖豫與趙君善長以意商確作師子林圖真得荆關遺意非王蒙所夢見也四海名公宜寶之懶瓚記題張貞居書卷貞居真人詩文字畫皆為本朝道品第一雖獲片楮隻字猶為世人寶藏况彥亷所得若是之富且妙邪舒卷纍日欣慨交心噫師友淪沒古道寂寥今之才士方髙自標致子方憂古之君子終陸沉耳吾知前人好修不以為賢於流俗而遂已不患人之不知栗里翁志不得遂飲酒賦詩但自陶寫而已豈求傳哉壬子初月八日題題宣伯炯書本朝書法之妙若趙榮祿虞奎章之篆𨽻行草無不如意范清江張貞居之楷法清徑絶俗鮮于奉常巙相國之草聖圓活姿媚逮元戎周左丞之篆籀古雅亦何讓前人哉宣君伯炯正書法度森嚴得法於薛子立氏而或過之伯炯已矣工字學者智未及此也跋畫至正辛丑十二月草四日德常明公自吳城將還嘉定道出甫里棙柁相就語俯仰十霜恍若隔世為留信宿夜闌更秉燭相對如夢寐者甚似為僕發也明日微雪作寒户無來迹獨與明公逍遙渚際隔江遙望天平靈巗諸山在荒煙逺靄中濃纖出沒依約如畫渚上踈林枯柳似我容髮蕭蕭可憐生不能滿百其所以異於草木者獨情好耳年逾五十日覺死生忙能不為之撫舊事而縱逺情乎眀公復命畫江濱寂寞之意并書相與乖離感慨之情德常今為嘉定二府於民有惠政即昔日之良常山人也朱陽館主蕭間仙卿倪瓚言跋畫竹以中每愛余畫竹余之竹聊以寫胸中逸氣耳豈復較其似與非葉之繁與疏枝之斜與直哉或塗抹久之它人視以為麻為蘆僕亦不能強辨為竹真沒奈覽者何但不知以中視為何物耳跋環慶王氏所藏趙榮祿六帖右趙榮祿與覺軒先生手簡共六紙有以知交誼之深家世之舊也先生學行純正為宋琅琊王仲寶之後仕至蘭溪州判官今獲觀於其孫光大之彞齋老成典刑不可復見矣尚賴翰墨文章有以想其風流哉時庚子二月十日倪瓚題跋畫卷後余與宗普道兄别十有六年矣忽邂逅吳下杯酒陳情不能相舍老杜所謂夜闌更秉燭相對如夢寐者諷詠斯語相與愴然人生良會不易而况艱虞契濶若此者乎以十餘載而僅一面則人生果能幾會邪悲慨未有若此言也明日道兄將歸錢塘余亦鼓柁煙波之外因寫圖賦詩以寓别後戀戀不盡之情云爾至正十四年二月十二日倪瓚葑門客樓書是日昔刺正卿陸季和願思恭同集題畫卷無錫王容溪先生嘗賦如夢令云林上一溪春水林下數峰嵐翠中有隱居人茆屋數間而已無事無事石上坐看雲起髙房山嘗繪之為圖貞居詩云歌此芙蓉窈窕章山隂茅宇日凄涼不是筆端天與巧落割雲山與侍郎今亡已夫余戲用其意為圖贈仲冕辛亥春倪瓚附王梧溪跋豫謝病將還鄉壠道謁梁侍郎顧先生祠就宿寶雲禪舍是夕王仲冕相與論心久之而去明日過仲冕見先友倪幼霞畫且獲觀王容溪張貞居二公詩詞適仲冕徵賦苽村亦為長短句一闋衰憊之餘一時清興殊灑然也簷聳數株松子村繞一灣菰米鷗外迥聞雞望望雲山煙水多此多此酒進玉盤雙鯉梧溪老人王逢時年六十有五題畫正月十四日舟過吳江第四橋大風浪中貯水一瓢而去乃賦小詩曰松陵第四橋前水風急猶須貯一瓢敲火煮茶歌白苧怒濤翻雪小停橈是夜泊舟吳江城外人家水月皓然與希言清咏久之明日題壁詩曰人家近住江城外月色波光上下天風景自佳時俗異泊舟間詠白雲篇十五日與希言謁三髙祠望江上諸山為寫隔江山色圖并賦詩贈别白鷗飛處夕陽明山色隔江睂黛橫試看三髙祠下水悠悠中有别離情十九日雨留陶篷戲寫逺樹石岫并録三詩用發一笑倪瓚附吳淡雲詩跋曾過吳江訪隱淪三髙祠下賦詩頻屋梁落月原非夢野水疏篁是寫真富貴行窩空舊業太平風韻憶斯人長疑祗在鷗波上破衲焚香理釣緍雲林髙士清才雅望嘗遁世吳中變名易服嘗駕一小舟出東市門以沉煙㶿馥波上為物色所得區區親承道德者十年德原先生亦以文墨見愛今皆逝去憗遺殘齒七十有七矣文禎特示圖咏恍若對面以成三歎不知存沒為間惡得無慨也洪武壬午春花朝日華亭淡雲吳哲識題畫至正五年三月八日玄素先生來林下瓚乃賦詩曰吳淞江水春映空浪波沄沄霞影紅耕田鑿井居其左令我長懷甫里翁夢見維舟江畔柳剝啄敲門散杯酒整冠起接平生歡石徑蘭芳重㩦手雨後共行林下正見惠山先生命瓚寫之畫訖因書此詩於上張外史陳先生見之必大笑也倪瓚記附用韻題畫上詩陳方佳樹隂森欲礙空畫成夜落燈花紅絶憐帶經自鋤者未忍竟别天隨翁汾湖春雲散髙栁湖水微茫緑於酒翁歸天末見青山臨風莫負揮絃手題荆溪清逺圖荆溪吳國良工製墨善吹簫好與賢士大夫遊張貞居每館寓其家艤舟籬傍興盡便返故國良得貞居翰墨為多今年夏豫以事至郡中泊舟文忠祠後國良便從溪上具小舟相就語為援簫作三五弄慰豫寂寞并以新製桐花煙墨為贈豫嘉其思致近古遂寫荆溪清逺圖以遺之實至正十年四月草一日也東海倪生記畫龍門獨步圖載秣陵盛時奉城山總録雲林逸人為復菴長老寫龍門獨步恩公昔住太平日林下相逢壞色袍行到龍門無腳力右肩褊袒喫櫻桃此詩乃張伯雨外史訪斷江恩公所作者也余嘗與外史有師友之義乙巳嵗余訪復菴留山中者數日復菴誦此詩不輟口余既寫圖遂書於其上云題畫夏圭所作千巗競秀圖巖岫縈回層見疊出林木樓觀深邃清逺亦非庸工俗吏所能造也蓋李唐者其源亦出於荆范之間夏圭馬逺輩又法李唐故其形模若此便如馬和之人物犬馬未嘗不知祖吳生而師龍眠耳錢塘詹仲華以端石一華邦憲墨半丸古玉璏一易此卷至正四年十二月草四日倪瓚記題仙山圖仙山圖陳君惟允所畫秀潤清逺深得趙榮祿筆意其人已矣今不可復得辛亥十二月二日瓚重覽紫華周公碑傳癸丑七月草九日重覽若夫楊髙龔三君子之著述顔真卿詩語之隱微余雖不識上卿於心見上卿政績在人隂功及物又能進修上道其尸解而遊仙復何疑哉瓚又題題周遜學府君遺翰後周遜學氏之先大父制機府君之手書猶足以想見前人風流也遜學寶藏以傳之子孫孝思豈有窮哉壬子九月十三日獲覩於眀善齋之西軒題王耕雲所藏墨迹耕雲所藏子山平章仲舉承旨暨兄季野員外三公遺墨一卷癸丑八月六日來訪耕雲於鳳岡山室出此相示以娛樂俾豫評之余謂子山之書風流沓拖如王謝家子弟無一點寒陋氣可與鮮于奉常相照映也仲舉書絶去險陋似褚河南其為樂章亞於遺山先生季野書骨肉豐美有虞永興意度詩詞亦伉爽不凡余之所見若此不知耕雲然余言耶載妮古録髙房山清節雅尚有馬先生亦其國人遂號彥敬蓋司馬慕藺之意也倪元鎮言題王右軍楷書帖載文氏停雲館帖陶隱君與梁武論書表云右軍名迹合有數首黃庭曹娥畫贊樂毅論是已當時臨榻偽寫已多况今日乎此刻尤有筆意真可寶也倪瓚為公采題書次韻惟寅髙士姑蘇錢塘懷古六詩跋載文氏停雲館帖惟寅徵君古所謂獨行士也安貧志道居吳市二十年蓋若一日真外混光塵中分涇渭而確乎不為外物移其守余獨深知其人他人有不得而知之者也賦詩翰墨特其餘事耳去年秋偕叔明友兄訪余江渚出此六詩相示諷詠之餘因同叔明用韻各和成章今年余病帶下疾幾半載惟寅凡兩來問余十一月一日覺體中稍佳惟寅命余寫出遂復書此至正草二年壬寅歲倪瓚記清閟閣全集卷九
